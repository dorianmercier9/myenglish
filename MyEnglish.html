business_phrases:{label:'Business avancé',icon:'🎯',color:'#EEF2FF',tc:'#1a246a',cards:[
// LV1 — expressions business très courantes
{en:'To be fair',fr:'Pour être juste / en toute honnêteté',ctx:'Concéder un point tout en maintenant sa position.',lv:1},
{en:'Having said that…',fr:'Cela dit…',ctx:'Pour introduire une nuance ou un retournement.',lv:1},
{en:'As it stands',fr:'En l\'état actuel des choses',ctx:'"As it stands, we can\'t meet the deadline."',lv:1},
{en:'For what it\'s worth',fr:'Pour ce que ça vaut',ctx:'Donner un avis avec une certaine humilité.',lv:1},
{en:'More often than not',fr:'Plus souvent qu\'autrement / la plupart du temps',ctx:'"More often than not, clients underestimate costs."',lv:1},
{en:'By and large',fr:'Dans l\'ensemble / en règle générale',ctx:'"By and large, the project went well."',lv:1},
{en:'In hindsight',fr:'Avec le recul',ctx:'"In hindsight, we should have started earlier."',lv:1},
{en:'On the face of it',fr:'À première vue / en apparence',ctx:'"On the face of it, the proposal looks solid."',lv:1},
{en:'In the pipeline',fr:'En préparation / dans les tuyaux',ctx:'"We have three new products in the pipeline."',lv:1},
{en:'If anything',fr:'Si quoi que ce soit / si c\'est le cas',ctx:'"If anything, this makes it more complex."',lv:1},
{en:'Going forward',fr:'Désormais / à l\'avenir',ctx:'"Going forward, all requests must go through the portal."',lv:1},
// LV2 — expressions business intermédiaires
{en:'To put something on the back burner',fr:'Mettre quelque chose en attente',ctx:'"Let\'s put this on the back burner for now."',lv:2},
{en:'To get the green light',fr:'Obtenir le feu vert',ctx:'"We got the green light from management."',lv:2},
{en:'To set the record straight',fr:'Rétablir les faits',ctx:'"Let me set the record straight on what happened."',lv:2},
{en:'To draw the line',fr:'Poser une limite / refuser d\'aller plus loin',ctx:'"I draw the line at working weekends."',lv:2},
{en:'To be in over one\'s head',fr:'Être dépassé par les événements',ctx:'"He took on too much and is in over his head."',lv:2},
{en:'To cut one\'s losses',fr:'Limiter les dégâts / arrêter les frais',ctx:'"Sometimes it\'s better to cut your losses."',lv:2},
{en:'To talk someone through something',fr:'Guider quelqu\'un pas à pas',ctx:'"Let me talk you through the process."',lv:2},
{en:'To take something at face value',fr:'Prendre quelque chose pour argent comptant',ctx:'"Don\'t take his promises at face value."',lv:2},
{en:'To move the goalposts',fr:'Changer les règles du jeu en cours de route',ctx:'"They keep moving the goalposts — it\'s impossible to plan."',lv:2},
{en:'A zero-sum game',fr:'Un jeu à somme nulle',ctx:'Ce que l\'un gagne, l\'autre le perd.',lv:2},
{en:'Low-hanging fruit',fr:'Les gains faciles / les victoires rapides',ctx:'"Let\'s go after the low-hanging fruit first."',lv:2},
{en:'To hedge one\'s bets',fr:'Ne pas mettre tous ses œufs dans le même panier',ctx:'Diversifier ses options pour réduire le risque.',lv:2},
{en:'To think outside the box',fr:'Sortir des sentiers battus',ctx:'Très overused mais incontournable en business.',lv:2},
{en:'To get a foot in the door',fr:'Mettre le pied dans la porte',ctx:'"This internship will help you get a foot in the door."',lv:2},
{en:'A win-win situation',fr:'Une situation gagnant-gagnant',ctx:'"This deal is a win-win for both parties."',lv:2},
// LV3 — business avancé / niveau natif
{en:'To underscore a point',fr:'Souligner / mettre en avant un point',ctx:'"I want to underscore the importance of this deadline."',lv:3},
{en:'To connect the dots',fr:'Faire le lien entre les éléments',ctx:'"Let me help you connect the dots."',lv:3},
{en:'To get ahead of something',fr:'Anticiper / prendre les devants',ctx:'"We need to get ahead of this before it escalates."',lv:3},
{en:'To split the difference',fr:'Couper la poire en deux',ctx:'"Why don\'t we split the difference at 45?"',lv:3},
{en:'To be on the cusp of something',fr:'Être sur le point de / à l\'orée de',ctx:'"We\'re on the cusp of a major breakthrough."',lv:3},
{en:'To cast doubt on',fr:'Jeter le doute sur',ctx:'"His findings cast doubt on the entire methodology."',lv:3},
{en:'To make a compelling case',fr:'Présenter un argument convaincant',ctx:'"You\'ll need to make a compelling case to the board."',lv:3},
{en:'To boil the ocean',fr:'Vouloir tout résoudre d\'un coup / voir trop grand',ctx:'"Don\'t try to boil the ocean — focus on one thing."',lv:3},
{en:'A paradigm shift',fr:'Un changement de paradigme',ctx:'Overused but essential to recognize.',lv:3},
{en:'To have a vested interest',fr:'Avoir un intérêt direct dans la chose',ctx:'"He has a vested interest in keeping the contract."',lv:3},
{en:'To run something up the flagpole',fr:'Tester une idée auprès de la hiérarchie',ctx:'"Let\'s run this idea up the flagpole and see what management thinks."',lv:3},
{en:'To future-proof a solution',fr:'Pérenniser une solution / la rendre durable',ctx:'"We need to future-proof this architecture."',lv:3},
{en:'A moving target',fr:'Une cible mouvante',ctx:'"Client requirements are a moving target — they change constantly."',lv:3},
{en:'To put someone on the spot',fr:'Mettre quelqu\'un dans l\'embarras',ctx:'"Don\'t put me on the spot in front of everyone."',lv:3},
{en:'To steal a march on competitors',fr:'Prendre de l\'avance sur ses concurrents',ctx:'"We need to steal a march before they launch their product."',lv:3},

,{en:"We need to think strategically.",fr:"Nous devons penser stratégiquement.",ctx:"Prise de décision.",lv:1},
{en:"Let's be pragmatic about this.",fr:"Soyons pragmatiques là-dessus.",ctx:"Pour aller à l'essentiel.",lv:2},
{en:"This is a win-win situation.",fr:"C'est une situation gagnant-gagnant.",ctx:"Résultat positif pour les deux parties.",lv:1},
{en:"We need to be transparent.",fr:"Nous devons être transparents.",ctx:"Communication ouverte.",lv:1},
{en:"This is a pivotal moment.",fr:"C'est un moment charnière.",ctx:"Tournant décisif.",lv:2},
{en:"We need to be agile.",fr:"Nous devons être agiles.",ctx:"Adaptabilité.",lv:1},
{en:"This will have a significant impact.",fr:"Cela aura un impact significatif.",ctx:"Importance d'une décision.",lv:1},
{en:"We need to maximize efficiency.",fr:"Nous devons maximiser l'efficacité.",ctx:"Optimisation.",lv:1},
{en:"Let's focus on what matters most.",fr:"Concentrons-nous sur ce qui compte le plus.",ctx:"Priorisation.",lv:1},
{en:"We need a robust plan.",fr:"Nous avons besoin d'un plan solide.",ctx:"Planification.",lv:1},
{en:"This is a paradigm shift.",fr:"C'est un changement de paradigme.",ctx:"Transformation profonde.",lv:3},
{en:"We need to be results-oriented.",fr:"Nous devons être orientés résultats.",ctx:"Culture de performance.",lv:2},
{en:"Let's not reinvent the wheel.",fr:"Ne réinventons pas la roue.",ctx:"Utiliser ce qui existe déjà.",lv:1},
{en:"We need to future-proof our approach.",fr:"Nous devons pérenniser notre approche.",ctx:"Anticiper les changements futurs.",lv:3},
{en:"This is a game-changer.",fr:"Ça change la donne.",ctx:"Innovation ou décision majeure.",lv:1},
{en:"We need to be competitive.",fr:"Nous devons être compétitifs.",ctx:"Contexte marché.",lv:1},
{en:"Let's seize this opportunity.",fr:"Saisissons cette opportunité.",ctx:"Appel à l'action.",lv:1},
{en:"We need to stay ahead of the curve.",fr:"Nous devons rester en avance sur notre temps.",ctx:"Innovation continue.",lv:2},
{en:"This requires a cross-functional approach.",fr:"Cela nécessite une approche transversale.",ctx:"Collaboration inter-équipes.",lv:2},
{en:"We need to take ownership.",fr:"Nous devons prendre nos responsabilités.",ctx:"Accountability.",lv:2}
,{en:"We need to course-correct.",fr:"Nous devons rectifier le tir.",ctx:"Réajustement de stratégie.",lv:1},
{en:"Let's take a data-driven approach.",fr:"Adoptons une approche basée sur les données.",ctx:"Décision éclairée.",lv:2},
{en:"We need to be more customer-centric.",fr:"Nous devons être plus centrés sur le client.",ctx:"Culture client.",lv:2},
{en:"This is a key differentiator.",fr:"C'est un facteur de différenciation clé.",ctx:"Avantage concurrentiel.",lv:2},
{en:"We need to align incentives.",fr:"Nous devons aligner les incitations.",ctx:"Gestion des parties prenantes.",lv:3},
{en:"Let's not lose focus.",fr:"Ne perdons pas le cap.",ctx:"Concentration sur les priorités.",lv:1},
{en:"This is low-risk, high-reward.",fr:"C'est faible risque, forte récompense.",ctx:"Évaluation d'opportunité.",lv:2},
{en:"We need to validate our assumptions.",fr:"Nous devons valider nos hypothèses.",ctx:"Rigueur analytique.",lv:2},
{en:"This has a ripple effect.",fr:"Cela a un effet en cascade.",ctx:"Conséquences indirectes.",lv:2},
{en:"We're at an inflection point.",fr:"Nous sommes à un tournant.",ctx:"Moment de changement majeur.",lv:3},
{en:"Let's pressure-test this idea.",fr:"Testons cette idée sous pression.",ctx:"Validation robuste.",lv:2},
{en:"We need to be intentional about this.",fr:"Nous devons être délibérés dans notre approche.",ctx:"Décision réfléchie.",lv:2},
{en:"This is best-in-class.",fr:"C'est ce qui se fait de mieux.",ctx:"Standard d'excellence.",lv:2},
{en:"We need to move with urgency.",fr:"Nous devons agir avec urgence.",ctx:"Mobilisation rapide.",lv:1},
{en:"Let's not over-engineer this.",fr:"N'over-enginéerons pas ça.",ctx:"Garder les choses simples.",lv:2},
{en:"We need to get granular.",fr:"Nous devons aller dans le détail.",ctx:"Analyse fine.",lv:2},
{en:"This is a force multiplier.",fr:"C'est un multiplicateur de force.",ctx:"Effet de levier.",lv:3},
{en:"We need to iterate quickly.",fr:"Nous devons itérer rapidement.",ctx:"Méthode agile.",lv:2},
{en:"Let's benchmark this.",fr:"Comparons-le aux références du marché.",ctx:"Analyse comparative.",lv:2},
{en:"This is non-negotiable.",fr:"C'est non négociable.",ctx:"Position ferme.",lv:1},
{en:"We need to de-prioritize this.",fr:"Nous devons dé-prioriser ça.",ctx:"Gestion des priorités.",lv:2},
{en:"Let's get to the root of the problem.",fr:"Allons à la racine du problème.",ctx:"Analyse causale.",lv:1},
{en:"This needs a holistic approach.",fr:"Cela nécessite une approche holistique.",ctx:"Vision d'ensemble.",lv:2},
{en:"We need to build trust.",fr:"Nous devons construire la confiance.",ctx:"Relation client/équipe.",lv:1},
{en:"Let's be strategic, not reactive.",fr:"Soyons stratégiques, pas réactifs.",ctx:"Posture proactive.",lv:2}]},
grammar:{label:'Grammaire en contexte',icon:'🧠',color:'#F0F8FF',tc:'#1a3a6a',cards:[
// LV1 — structures de base mal maîtrisées
{en:'Although / Even though',fr:'Bien que / Même si',ctx:'"Although it was risky, we proceeded." + indicatif en anglais.',lv:1},
{en:'Unless',fr:'Sauf si / à moins que',ctx:'"Unless we act now, we\'ll miss the window."',lv:1},
{en:'Due to / Owing to',fr:'En raison de / dû à',ctx:'"Due to the storm, flights were cancelled." + nom.',lv:1},
{en:'So as to / In order to',fr:'Afin de / pour',ctx:'"We restructured so as to reduce costs."',lv:1},
{en:'Either… or…',fr:'Soit… soit…',ctx:'"Either we fix it now, or we accept the consequences."',lv:1},
{en:'Neither… nor…',fr:'Ni… ni…',ctx:'"Neither the client nor the team was informed."',lv:1},
{en:'Despite + noun',fr:'Malgré + nom',ctx:'"Despite the setbacks, we delivered on time."',lv:1},
{en:'Rather than',fr:'Plutôt que de',ctx:'"Rather than complaining, let\'s find a solution."',lv:1},
{en:'The sooner… the better',fr:'Plus tôt… mieux c\'est',ctx:'"The sooner we address this, the better."',lv:1},
{en:'It is worth + gerund',fr:'Ça vaut la peine de',ctx:'"It\'s worth noting that the figures are estimates."',lv:1},
// LV2 — structures intermédiaires
{en:'Whereas',fr:'Alors que / tandis que (contraste)',ctx:'"Sales went up, whereas costs remained stable."',lv:2},
{en:'By the time',fr:'Au moment où / d\'ici à ce que',ctx:'"By the time you read this, the deal will be done."',lv:2},
{en:'There is no point in + gerund',fr:'Ça ne sert à rien de',ctx:'"There\'s no point in rushing if we\'re going to make mistakes."',lv:2},
{en:'Provided that / As long as',fr:'À condition que / tant que',ctx:'"We\'ll proceed, provided that the budget is approved."',lv:2},
{en:'Given that',fr:'Étant donné que / sachant que',ctx:'"Given that the deadline is tomorrow, we need to act fast."',lv:2},
{en:'What + subject + verb',fr:'Ce que / ce qui (proposition nominale)',ctx:'"What concerns me is the timeline."',lv:2},
{en:'The fact that',fr:'Le fait que',ctx:'"The fact that they agreed surprised us all."',lv:2},
{en:'Not until',fr:'Ce n\'est qu\'à partir de',ctx:'"Not until Friday will we have the final results."',lv:2},
{en:'In so far as',fr:'Dans la mesure où / pour autant que',ctx:'"Insofar as I know, the deal is still on the table."',lv:2},
{en:'With a view to',fr:'Dans le but de / en vue de',ctx:'"We\'re restructuring with a view to improving efficiency."',lv:2},
// LV3 — structures avancées
{en:'It goes without saying that',fr:'Il va sans dire que',ctx:'"It goes without saying that quality is non-negotiable."',lv:3},
{en:'Needless to say',fr:'Inutile de dire / cela va sans dire',ctx:'"Needless to say, we were disappointed."',lv:3},
{en:'Be that as it may',fr:'Quoi qu\'il en soit',ctx:'"Be that as it may, we still need a solution."',lv:3},
{en:'Were it not for',fr:'N\'eût été / sans',ctx:'"Were it not for your help, we would have failed."',lv:3},
{en:'So much so that',fr:'À tel point que',ctx:'"The demand increased, so much so that we ran out of stock."',lv:3},
{en:'On the grounds that',fr:'Au motif que / au prétexte que',ctx:'"They rejected it on the grounds that it was too risky."',lv:3},
{en:'To the extent that',fr:'Dans la mesure où',ctx:'"To the extent that resources allow, we will expand."',lv:3},
{en:'Had I known earlier, I would have acted differently.',fr:'Si j\'avais su plus tôt, j\'aurais agi différemment.',ctx:'Inversion conditionnelle avancée — structure sans "if".',lv:3},
{en:'No sooner had she arrived than the problems started.',fr:'À peine était-elle arrivée que les problèmes ont commencé.',ctx:'No sooner… than = à peine… que. Structure inversée avancée.',lv:3},
{en:'Lest',fr:'De peur que / de crainte de',ctx:'"We must act now, lest we lose the opportunity." Très formel.',lv:3},
{en:'What with the delays and the budget cuts',fr:'Entre les retards et les coupes budgétaires',ctx:'What with = étant donné / vu (liste de causes). Registre soutenu.',lv:3},
{en:'By virtue of his experience',fr:'En vertu de son expérience / grâce à son expérience',ctx:'By virtue of = en vertu de / grâce à.',lv:3},
{en:'Subject to board approval',fr:'Sous réserve de l\'approbation du conseil',ctx:'Subject to = conditionné par. Très utilisé en contrats.',lv:3},
{en:'Pursuant to our agreement',fr:'Conformément à notre accord',ctx:'Pursuant to = conformément à. Très formel, contrats et emails officiels.',lv:3},
{en:'With immediate effect',fr:'Avec effet immédiat',ctx:'"The change applies with immediate effect." Très formel.',lv:3},
{en:'I\'d rather not say.',fr:'Je préférerais ne pas le dire.',ctx:'Would rather + not + verb. Refus poli.',lv:2},
{en:'That\'s beside the point.',fr:'C\'est hors sujet.',ctx:'Pour recentrer une conversation qui dévie.',lv:2},
{en:'Let\'s cross that bridge when we come to it.',fr:'On verra le moment venu / on résoudra ce problème quand il se posera.',ctx:'Ne pas s\'inquiéter par avance d\'un problème hypothétique.',lv:2},
{en:'The jury is still out on that.',fr:'La question n\'est pas encore tranchée.',ctx:'L\'opinion n\'est pas encore formée / le résultat n\'est pas encore connu.',lv:3},
{en:'To read between the lines',fr:'Lire entre les lignes',ctx:'"Read between the lines — he\'s not happy."',lv:1},
{en:'To keep tabs on something',fr:'Garder un œil sur quelque chose / surveiller',ctx:'"Keep tabs on the project costs."',lv:2},
{en:'To go through the motions',fr:'Faire les choses mécaniquement / sans conviction',ctx:'"He\'s just going through the motions — he\'s not engaged."',lv:3},
{en:'To cut to the chase',fr:'Aller droit au but',ctx:'"Let\'s cut to the chase — what\'s the real issue?"',lv:2},
{en:'On the same wavelength',fr:'Sur la même longueur d\'onde',ctx:'"We\'re on the same wavelength about the strategy."',lv:1},
{en:'To think on one\'s feet',fr:'Réagir rapidement / improviser sous pression',ctx:'"She thinks on her feet — great in client meetings."',lv:2},
{en:'To bite the dust',fr:'Mordre la poussière / échouer',ctx:'"Three startups bit the dust during the recession."',lv:3},
{en:'To be up to speed',fr:'Être au courant / à jour',ctx:'"Can you bring me up to speed on the project?"',lv:1},
{en:'To cover one\'s bases',fr:'Se couvrir / parer à toutes les éventualités',ctx:'"We\'ve covered all our bases before the launch."',lv:2},
{en:'To get the picture',fr:'Comprendre la situation / saisir',ctx:'"I get the picture — no need to explain further."',lv:1},
{en:'A ballpark figure',fr:'Une estimation approximative',ctx:'"Can you give me a ballpark figure for the project?"',lv:1},
{en:'To be on the cards',fr:'Être probable / être dans les tuyaux',ctx:'"A merger is on the cards for next year."',lv:3},
{en:'To run rings around someone',fr:'Surclasser quelqu\'un / le laisser loin derrière',ctx:'"She runs rings around the competition."',lv:3},
{en:'To put two and two together',fr:'Faire le rapprochement / tirer ses propres conclusions',ctx:'"It didn\'t take long to put two and two together."',lv:3},
{en:'To go back to basics',fr:'Revenir aux fondamentaux / repartir de zéro',ctx:'"We need to go back to basics and rethink the strategy."',lv:2}
,{en:"Not only did we meet the deadline, but we also exceeded expectations.",fr:"Non seulement nous avons respecté le délai, mais nous avons également dépassé les attentes.",ctx:"Not only... but also — structure emphatique formelle.",lv:3},
{en:"The more data we collect, the better our predictions.",fr:"Plus nous collectons de données, meilleures sont nos prédictions.",ctx:"The more... the more — comparatif de proportionnalité.",lv:2},
{en:"Despite the challenges, we delivered on time.",fr:"Malgré les difficultés, nous avons livré dans les délais.",ctx:"Despite + nom — concession sans verbe conjugué.",lv:2},
{en:"It's not until you face pressure that you discover your limits.",fr:"C'est seulement quand on fait face à la pression qu'on découvre ses limites.",ctx:"It's not until — structure emphatique pour retarder l'information clé.",lv:3},
{en:"Provided that the budget is approved, we can start immediately.",fr:"À condition que le budget soit approuvé, nous pouvons commencer immédiatement.",ctx:"Provided that — condition formelle.",lv:2},
{en:"I wish I had more time.",fr:"J'aimerais avoir plus de temps.",ctx:"Wish + past — regret sur la situation présente.",lv:2},
{en:"Whatever happens, we'll find a solution.",fr:"Quoi qu'il arrive, nous trouverons une solution.",ctx:"Whatever — concession générale.",lv:2},
{en:"She speaks as if she owns the place.",fr:"Elle parle comme si elle était chez elle.",ctx:"As if + past — comparaison hypothétique.",lv:3},
{en:"Having reviewed all options, I recommend option B.",fr:"Après avoir examiné toutes les options, je recommande l'option B.",ctx:"Participe passé en tête de phrase — style formel.",lv:3},
{en:"The deadline having been moved, we need to reallocate resources.",fr:"Le délai ayant été déplacé, nous devons réaffecter les ressources.",ctx:"Participe parfait absolu — style très formel.",lv:3},
{en:"It goes without saying that quality is our priority.",fr:"Il va sans dire que la qualité est notre priorité.",ctx:"It goes without saying — évidence formelle.",lv:2},
{en:"This is by far the best solution.",fr:"C'est de loin la meilleure solution.",ctx:"By far — superlatif renforcé.",lv:1},
{en:"I'd sooner resign than compromise on ethics.",fr:"Je préférerais démissionner plutôt que de compromettre l'éthique.",ctx:"Would sooner — préférence forte (registre formel).",lv:3}
,{en:"The fact that he resigned came as a surprise.",fr:"Le fait qu'il ait démissionné a été une surprise.",ctx:"The fact that — nominalisation d'une clause.",lv:3},
{en:"What matters most is consistent effort.",fr:"Ce qui compte le plus, c'est l'effort constant.",ctx:"What matters most — sujet relatif emphase.",lv:2},
{en:"It is essential that the team be informed.",fr:"Il est essentiel que l'équipe soit informée.",ctx:"It is essential that + subjonctif formel.",lv:3},
{en:"Rarely do we see such dedication.",fr:"Rarement voyons-nous un tel dévouement.",ctx:"Rarely + inversion — emphase formelle.",lv:3},
{en:"Not until the final review did we spot the error.",fr:"Ce n'est qu'à la revue finale que nous avons repéré l'erreur.",ctx:"Not until + inversion.",lv:3},
{en:"The more you practice, the more natural it becomes.",fr:"Plus vous pratiquez, plus ça devient naturel.",ctx:"Double comparatif.",lv:1},
{en:"Either the timeline or the budget needs to change.",fr:"Soit le calendrier, soit le budget doit changer.",ctx:"Either...or — structure alternative.",lv:2},
{en:"Neither option is without risk.",fr:"Aucune des options n'est sans risque.",ctx:"Neither — double négation formelle.",lv:2},
{en:"This is the most complex project I have ever managed.",fr:"C'est le projet le plus complexe que j'aie jamais géré.",ctx:"Superlatif + Present Perfect.",lv:1},
{en:"Should any issues arise, please contact me immediately.",fr:"Si des problèmes surviennent, contactez-moi immédiatement.",ctx:"Should + inversion — conditionnel formel.",lv:3}]
},
// ─── RÉUNIONS & PRÉSENTATIONS ────────────────────────────────
meetings:{label:'Réunions & présentations',icon:'🎤',color:'#EAF2FF',tc:'#1a3a5c',cards:[
// LV1 — essentiels pour participer
{en:"Let's get started.",fr:"On commence.",ctx:"Pour ouvrir une réunion sans fioritures.",lv:1},
{en:"Can everyone hear me?",fr:"Est-ce que tout le monde m'entend ?",ctx:"En début de call.",lv:1},
{en:"Let me share my screen.",fr:"Je vais partager mon écran.",ctx:"En réunion virtuelle.",lv:1},
{en:"I'd like to add something.",fr:"J'aimerais ajouter quelque chose.",ctx:"Pour intervenir poliment.",lv:1},
{en:"Could you repeat that, please?",fr:"Pourriez-vous répéter, s'il vous plaît ?",ctx:"Sans perdre la face.",lv:1},
{en:"Let me clarify.",fr:"Permettez-moi de préciser.",ctx:"Pour corriger une incompréhension.",lv:1},
{en:"To summarize what we've discussed so far...",fr:"Pour résumer ce dont nous avons discuté jusqu'ici...",ctx:"Pour faire un point intermédiaire.",lv:1},
{en:"Any questions at this stage?",fr:"Des questions à ce stade ?",ctx:"Pour ouvrir la discussion.",lv:1},
{en:"Let's move on to the next point.",fr:"Passons au point suivant.",ctx:"Pour avancer dans l'ordre du jour.",lv:1},
{en:"We're running out of time.",fr:"Nous manquons de temps.",ctx:"Pour accélérer.",lv:1},
// LV2 — animer et structurer
{en:"I'd like to kick things off with a quick overview.",fr:"Je voudrais commencer par un aperçu rapide.",ctx:"Pour ouvrir une présentation.",lv:2},
{en:"Let's table that for now and come back to it later.",fr:"Mettons ça de côté pour l'instant et revenons-y plus tard.",ctx:"Pour ne pas s'éloigner du sujet.",lv:2},
{en:"I think we need to park this discussion.",fr:"Je pense qu'on doit mettre cette discussion en attente.",ctx:"Quand un sujet s'emballe.",lv:2},
{en:"Let me hand it over to Sarah for the next section.",fr:"Je passe la parole à Sarah pour la section suivante.",ctx:"Pour transitionner entre intervenants.",lv:2},
{en:"Could we stay on track?",fr:"Pourrions-nous rester sur le sujet ?",ctx:"Pour recadrer poliment.",lv:2},
{en:"I'd like to build on what John just said.",fr:"J'aimerais rebondir sur ce que John vient de dire.",ctx:"Pour enchaîner naturellement.",lv:2},
{en:"To wrap up, the key takeaways are...",fr:"Pour conclure, les points clés sont...",ctx:"Pour clore une présentation.",lv:2},
{en:"Does everyone agree on the next steps?",fr:"Tout le monde est d'accord sur les prochaines étapes ?",ctx:"Pour valider avant de clôturer.",lv:2},
{en:"Let's make sure we're aligned on this.",fr:"Assurons-nous qu'on est tous alignés là-dessus.",ctx:"Pour éviter les malentendus.",lv:2},
{en:"I'll send the minutes after the meeting.",fr:"J'enverrai le compte-rendu après la réunion.",ctx:"Standard de fin de meeting.",lv:2},
// LV3 — maîtrise complète
{en:"Before we dive in, let me set the context.",fr:"Avant d'entrer dans le vif du sujet, laissez-moi poser le contexte.",ctx:"Pour une présentation structurée.",lv:3},
{en:"I'd like to challenge that assumption.",fr:"J'aimerais remettre en question cette hypothèse.",ctx:"Pour débattre sans agressivité.",lv:3},
{en:"That's a valid point, but have you considered...?",fr:"C'est un point valide, mais avez-vous envisagé...?",ctx:"Pour nuancer sans rejeter.",lv:3},
{en:"Let's take a step back and look at the bigger picture.",fr:"Prenons du recul et regardons la situation dans son ensemble.",ctx:"Quand on est trop dans les détails.",lv:3},
{en:"I think we're talking at cross purposes here.",fr:"Je pense qu'on ne parle pas de la même chose.",ctx:"Pour identifier un malentendu.",lv:3},
{en:"Could we action that before the end of the week?",fr:"Pourrait-on traiter ça avant la fin de la semaine ?",ctx:"Pour donner une deadline claire.",lv:3},

,{en:"I'd like to open the floor for questions.",fr:"Je souhaite ouvrir le débat aux questions.",ctx:"Pour inviter les questions.",lv:2},
{en:"Let's do a quick round of introductions.",fr:"Faisons un rapide tour de présentations.",ctx:"Début de réunion avec nouveaux participants.",lv:1},
{en:"We have a lot to cover today.",fr:"Nous avons beaucoup à aborder aujourd'hui.",ctx:"Pour cadrer la réunion.",lv:1},
{en:"Let's stick to the agenda.",fr:"Tenons-nous à l'ordre du jour.",ctx:"Pour ne pas déborder.",lv:2},
{en:"I'll follow up with you after the call.",fr:"Je vous recontacte après l'appel.",ctx:"Engagement post-réunion.",lv:1},
{en:"Can we take this offline?",fr:"Peut-on en discuter en dehors de la réunion ?",ctx:"Pour éviter de monopoliser le temps.",lv:2},
{en:"Let me pull up the slides.",fr:"Laissez-moi afficher les diapositives.",ctx:"En réunion virtuelle.",lv:1},
{en:"We're on slide three.",fr:"Nous en sommes à la diapositive trois.",ctx:"Pour orienter les participants.",lv:1},
{en:"I'd like to flag a risk here.",fr:"J'aimerais signaler un risque ici.",ctx:"Pour alerter sans alarmisme.",lv:2},
{en:"Any objections before we move on?",fr:"Des objections avant de continuer ?",ctx:"Pour valider avant d'avancer.",lv:2},
{en:"Let's circle back on this next week.",fr:"Revenons là-dessus la semaine prochaine.",ctx:"Pour différer sans oublier.",lv:2},
{en:"I think we've beaten this one to death.",fr:"Je pense qu'on a suffisamment débattu de ce point.",ctx:"Pour clore une discussion qui s'éternise.",lv:3},
{en:"Could you elaborate on that?",fr:"Pourriez-vous développer ce point ?",ctx:"Pour demander plus de détails.",lv:1},
{en:"That's exactly what I was going to say.",fr:"C'est exactement ce que j'allais dire.",ctx:"Pour rebondir et confirmer.",lv:1},
{en:"We need a decision by end of day.",fr:"Nous avons besoin d'une décision avant la fin de la journée.",ctx:"Pour imposer une deadline.",lv:2}
,{en:"I'd like to get everyone's input on this.",fr:"J'aimerais recueillir l'avis de chacun.",ctx:"Pour une décision collective.",lv:2},
{en:"We're running five minutes over.",fr:"Nous avons cinq minutes de retard.",ctx:"Gestion du temps.",lv:1},
{en:"Let's put a pin in that.",fr:"Mettons ça en suspens.",ctx:"Pour différer sans oublier.",lv:2},
{en:"I'll add that to the parking lot.",fr:"Je l'ajoute à la liste des sujets en attente.",ctx:"Gestion de l'ordre du jour.",lv:2},
{en:"Can we get a show of hands?",fr:"Peut-on faire un vote à main levée ?",ctx:"Pour sonder rapidement.",lv:1},
{en:"I think we've reached a consensus.",fr:"Je pense qu'on a atteint un consensus.",ctx:"Pour clore un débat.",lv:2},
{en:"Let's reconvene next Tuesday.",fr:"Réunissons-nous à nouveau mardi prochain.",ctx:"Pour planifier la prochaine réunion.",lv:1},
{en:"Who's taking the minutes?",fr:"Qui prend les notes ?",ctx:"Organisation de réunion.",lv:1},
{en:"I'd like to challenge that.",fr:"J'aimerais remettre cela en question.",ctx:"Pour débattre poliment.",lv:2},
{en:"Can you run us through that again?",fr:"Pouvez-vous nous réexpliquer ça ?",ctx:"Pour demander une clarification.",lv:1}
,{en:"I'd like to set some ground rules.",fr:"J'aimerais établir quelques règles de base.",ctx:"Début de réunion.",lv:2},
{en:"Let's do a temperature check.",fr:"Faisons un sondage rapide de l'humeur.",ctx:"Vérifier l'adhésion.",lv:2},
{en:"I need five minutes to collect my thoughts.",fr:"J'ai besoin de cinq minutes pour rassembler mes idées.",ctx:"Pause réflexion.",lv:1},
{en:"Can we schedule a follow-up?",fr:"Peut-on planifier un suivi ?",ctx:"Organisation après réunion.",lv:1},
{en:"I'll share the recording afterwards.",fr:"Je partagerai l'enregistrement ensuite.",ctx:"Réunion virtuelle.",lv:1},
{en:"Is everyone dialed in?",fr:"Est-ce que tout le monde est connecté ?",ctx:"Début de call.",lv:1},
{en:"Let me mute myself.",fr:"Je vais me mettre en sourdine.",ctx:"Réunion virtuelle.",lv:1},
{en:"You're on mute.",fr:"Votre micro est coupé.",ctx:"Erreur classique en visio.",lv:1},
{en:"I think we've covered everything.",fr:"Je pense qu'on a tout couvert.",ctx:"Clôture de réunion.",lv:1},
{en:"Let's pick this up next time.",fr:"Reprenons ça la prochaine fois.",ctx:"Reporter un point.",lv:1}]},

// ─── NÉGOCIATION & INFLUENCE ──────────────────────────────────
negotiation:{label:'Négociation & influence',icon:'🤝',color:'#EAF2FF',tc:'#1a3a5c',cards:[
// LV1 — bases de la négociation pro
{en:"I understand your point.",fr:"Je comprends votre point de vue.",ctx:"Pour montrer qu'on écoute.",lv:1},
{en:"That works for me.",fr:"Ça me convient.",ctx:"Pour valider une proposition.",lv:1},
{en:"I'm not sure we can do that.",fr:"Je ne suis pas sûr qu'on puisse faire ça.",ctx:"Refus soft.",lv:1},
{en:"What if we...?",fr:"Et si on...?",ctx:"Pour proposer une alternative.",lv:1},
{en:"Can we find a middle ground?",fr:"Peut-on trouver un compromis ?",ctx:"Pour débloquer une situation.",lv:1},
{en:"We need to discuss the terms.",fr:"Nous devons discuter des conditions.",ctx:"Avant toute négociation.",lv:1},
{en:"That's beyond my authority.",fr:"Ça dépasse mon périmètre de décision.",ctx:"Pour ne pas s'engager trop vite.",lv:1},

oral:{label:'Discours oral & prise de parole',icon:'🎙️',color:'#FEF9E7',tc:'#7d6608',cards:[
// LV1 — gagner du temps
{en:'Let me think about that for a moment.',fr:'Laissez-moi y réfléchir un instant.',ctx:'Gagner du temps sans perdre la face.',lv:1},
{en:'That\'s a great question.',fr:'C\'est une excellente question.',ctx:'Transition standard avant de répondre.',lv:1},
{en:'How shall I put it?',fr:'Comment dire...',ctx:'Chercher ses mots à l\'oral.',lv:1},
{en:'What I mean is...',fr:'Ce que je veux dire, c\'est...',ctx:'Reformuler après une hésitation.',lv:1},
{en:'Let me rephrase that.',fr:'Permettez-moi de reformuler.',ctx:'Clarifier après une confusion.',lv:1},
{en:'Off the top of my head...',fr:'Comme ça, sans réfléchir...',ctx:'Réponse spontanée non exhaustive.',lv:1},
{en:'If I had to guess...',fr:'Si je devais deviner...',ctx:'Réponse incertaine mais tentée.',lv:1},
{en:'I\'m not entirely sure, but...',fr:'Je ne suis pas entièrement sûr, mais...',ctx:'Incertitude exprimée élégamment.',lv:1},
{en:'Give me a second.',fr:'Donnez-moi une seconde.',ctx:'Pause pour réfléchir.',lv:1},
{en:'Just to make sure I understand correctly...',fr:'Juste pour m\'assurer que je comprends bien...',ctx:'Reformuler avant de répondre.',lv:1},
// LV1 — reprendre le fil
{en:'Where were we?',fr:'Où en étions-nous ?',ctx:'Reprendre après une interruption.',lv:1},
{en:'As I was saying...',fr:'Comme je le disais...',ctx:'Reprendre son discours.',lv:1},
{en:'Going back to what I said earlier...',fr:'Pour revenir à ce que je disais...',ctx:'Référence à un point précédent.',lv:1},
{en:'To get back on track...',fr:'Pour revenir au sujet...',ctx:'Recentrer la conversation.',lv:1},
{en:'If I may continue...',fr:'Si je peux continuer...',ctx:'Reprendre après une interruption.',lv:1},
// LV1 — demander des clarifications
{en:'Could you say that again?',fr:'Pourriez-vous répéter ?',ctx:'Ne pas avoir compris.',lv:1},
{en:'Sorry, I didn\'t catch that.',fr:'Désolé, je n\'ai pas saisi.',ctx:'Problème de compréhension à l\'oral.',lv:1},
{en:'Could you be more specific?',fr:'Pourriez-vous être plus précis ?',ctx:'Demande de précision.',lv:1},
{en:'What exactly do you mean by...?',fr:'Que voulez-vous dire exactement par... ?',ctx:'Clarification d\'un terme.',lv:1},
{en:'If I understand you correctly...',fr:'Si je vous comprends correctement...',ctx:'Reformuler pour confirmer.',lv:1},
{en:'Are you saying that...?',fr:'Voulez-vous dire que... ?',ctx:'Vérifier sa compréhension.',lv:1},
// LV2 — structurer son discours oral
{en:'First and foremost...',fr:'Avant tout... / Premièrement et surtout...',ctx:'Introduire le point le plus important.',lv:2},
{en:'Let me walk you through this.',fr:'Permettez-moi de vous expliquer cela étape par étape.',ctx:'Présentation structurée.',lv:1},
{en:'To give you some context...',fr:'Pour vous situer dans le contexte...',ctx:'Poser le contexte avant d\'expliquer.',lv:1},
{en:'The bottom line is...',fr:'L\'essentiel, c\'est...',ctx:'Résumer en une phrase clé.',lv:1},
{en:'Long story short...',fr:'Pour faire court...',ctx:'Résumer rapidement.',lv:1},
{en:'To cut to the chase...',fr:'Pour aller droit au but...',ctx:'Sauter les préliminaires.',lv:1},
{en:'My point is...',fr:'Ce que je veux dire, c\'est...',ctx:'Clarifier son argument principal.',lv:1},
{en:'What I\'m getting at is...',fr:'Ce à quoi je veux en venir, c\'est...',ctx:'Diriger vers sa conclusion.',lv:2},
{en:'The key takeaway here is...',fr:'Le message clé à retenir est...',ctx:'Résumer pour l\'audience.',lv:2},
{en:'Let me put it differently.',fr:'Permettez-moi de le formuler différemment.',ctx:'Reformuler après incompréhension.',lv:1},
// LV2 — gérer les interruptions et la parole
{en:'If I could just finish my thought...',fr:'Si je pouvais juste terminer ma pensée...',ctx:'Tenir la parole face à une interruption.',lv:2},
{en:'Could I just add something here?',fr:'Puis-je juste ajouter quelque chose ici ?',ctx:'Prendre la parole poliment.',lv:1},
{en:'I\'d like to pick up on what you said.',fr:'J\'aimerais rebondir sur ce que vous avez dit.',ctx:'Répondre à un point précis.',lv:2},
{en:'That\'s a fair point, but...',fr:'C\'est un point valide, mais...',ctx:'Concéder avant de contredire.',lv:1},
{en:'With respect, I think...',fr:'Avec tout le respect que je vous dois, je pense...',ctx:'Désaccord poli.',lv:2},
{en:'I take your point, however...',fr:'J\'entends votre argument, cependant...',ctx:'Accepter puis nuancer.',lv:2},
{en:'Building on what was just said...',fr:'En m\'appuyant sur ce qui vient d\'être dit...',ctx:'Enchaîner naturellement.',lv:2},
// LV2 — gérer l'imprécision et le doute
{en:'I could be wrong, but...',fr:'Je me trompe peut-être, mais...',ctx:'Exprimer sa position avec humilité.',lv:1},
{en:'I may be out of my depth here, but...',fr:'Ce n\'est peut-être pas mon domaine, mais...',ctx:'Reconnaître ses limites avant de s\'exprimer.',lv:2},
{en:'This is just my read on it.',fr:'C\'est juste mon interprétation.',ctx:'Relativiser son opinion.',lv:2},
{en:'Don\'t quote me on this.',fr:'Ne me citez pas là-dessus.',ctx:'Information incertaine partagée.',lv:2},
{en:'Take that with a grain of salt.',fr:'Prenez ça avec des pincettes.',ctx:'Douter de l\'information partagée.',lv:2},
{en:'I\'m speculating here.',fr:'Je spécule là.',ctx:'Signal d\'incertitude.',lv:2},
{en:'To the best of my knowledge...',fr:'À ma connaissance...',ctx:'Affirmer sans être certain à 100%.',lv:2},
// LV3 — registre oral formel avancé
{en:'I would venture to say...',fr:'Je me permettrais de dire...',ctx:'Introduire une opinion audacieuse avec humilité.',lv:3},
{en:'It would be remiss of me not to mention...',fr:'Ce serait une erreur de ma part de ne pas mentionner...',ctx:'Introduire un point essentiel.',lv:3},
{en:'I find myself compelled to raise a concern.',fr:'Je me trouve dans l\'obligation de soulever une préoccupation.',ctx:'Prendre la parole formellement pour alerter.',lv:3},
{en:'With all due respect...',fr:'Avec tout le respect que je vous dois...',ctx:'Désaccord respectueux.',lv:2},
{en:'If I may be so bold...',fr:'Si je puis me permettre...',ctx:'Introduire une suggestion audacieuse.',lv:3},
{en:'That begs the question...',fr:'Cela soulève la question...',ctx:'Pointer une question non résolue.',lv:3},
{en:'I\'d push back on that slightly.',fr:'Je résisterai légèrement à cela.',ctx:'Désaccord mesuré et professionnel.',lv:2},
{en:'Let me play devil\'s advocate.',fr:'Permettez-moi de jouer l\'avocat du diable.',ctx:'Tester une idée en sens inverse.',lv:2}

,
// Transitions et connecteurs oraux
{en:'Moving on to...',fr:'En passant à...',ctx:'Transition fluide entre deux points.',lv:1},
{en:'On that note...',fr:'À ce sujet / Dans cette veine...',ctx:'Transition naturelle en lien avec ce qui précède.',lv:2},
{en:'Which brings me to...',fr:'Ce qui m\'amène à...',ctx:'Lien logique entre deux idées.',lv:2},
{en:'That said...',fr:'Cela étant dit...',ctx:'Introduire une nuance.',lv:1},
{en:'With that in mind...',fr:'Dans cette optique...',ctx:'Lien logique.',lv:2},
{en:'To put it another way...',fr:'Autrement dit...',ctx:'Reformuler pour plus de clarté.',lv:1},
{en:'In other words...',fr:'En d\'autres termes...',ctx:'Reformulation classique.',lv:1},
{en:'What I mean by that is...',fr:'Ce que j\'entends par là, c\'est...',ctx:'Clarifier un terme utilisé.',lv:1},
{en:'To give you a concrete example...',fr:'Pour vous donner un exemple concret...',ctx:'Illustrer un propos.',lv:1},
{en:'Speaking of which...',fr:'En parlant de ça...',ctx:'Transition associative.',lv:2},
// Prendre et gérer la parole
{en:'If I could jump in here...',fr:'Si je peux intervenir ici...',ctx:'Prendre la parole sans couper brutalement.',lv:2},
{en:'Sorry to interrupt, but...',fr:'Désolé d\'interrompre, mais...',ctx:'Interruption polie.',lv:1},
{en:'Going back to the earlier point...',fr:'Pour revenir au point précédent...',ctx:'Référence à un point précédent.',lv:1},
{en:'I\'d like to circle back to that.',fr:'J\'aimerais revenir sur ce point.',ctx:'Reporter sans oublier.',lv:2},
{en:'I think we\'re getting off track.',fr:'Je pense qu\'on s\'éloigne du sujet.',ctx:'Recentrer poliment.',lv:2},
{en:'Let me make sure I\'m following.',fr:'Permettez-moi de vérifier que je suis bien.',ctx:'Pause de compréhension.',lv:1},
{en:'I want to make sure I\'m not missing something.',fr:'Je veux m\'assurer de ne rien manquer.',ctx:'Humilité et engagement.',lv:2},
{en:'Can I push back on that slightly?',fr:'Puis-je m\'y opposer légèrement ?',ctx:'Désaccord soft et professionnel.',lv:2},
// Hésitations élégantes
{en:'It\'s on the tip of my tongue.',fr:'Je l\'ai sur le bout de la langue.',ctx:'Chercher ses mots à l\'oral.',lv:1},
{en:'What\'s the word I\'m looking for?',fr:'Quel est le mot que je cherche ?',ctx:'Hésitation naturelle.',lv:1},
{en:'I\'m drawing a blank on that.',fr:'Je sèche là-dessus.',ctx:'Ne pas trouver une information.',lv:2},
{en:'Bear with me for a second.',fr:'Soyez patient avec moi une seconde.',ctx:'Gagner du temps.',lv:1},
{en:'I\'m thinking out loud here.',fr:'Je pense à voix haute là.',ctx:'Signal que la réflexion est en cours.',lv:2},
{en:'Don\'t hold me to that.',fr:'Ne me citez pas là-dessus.',ctx:'Information non certifiée.',lv:2},
// Réagir à ce qu'on entend
{en:'That\'s an interesting perspective.',fr:'C\'est une perspective intéressante.',ctx:'Réagir positivement sans s\'engager.',lv:1},
{en:'I hadn\'t thought of it that way.',fr:'Je n\'y avais pas pensé de cette façon.',ctx:'Ouverture d\'esprit exprimée.',lv:1},
{en:'You make a good point.',fr:'Vous soulevez un bon point.',ctx:'Valider sans abandonner sa position.',lv:1},
{en:'I see where you\'re coming from.',fr:'Je comprends d\'où vous venez.',ctx:'Empathie avant de nuancer.',lv:1},
{en:'That resonates with me.',fr:'Ça fait écho chez moi.',ctx:'Accord émotionnel.',lv:2},
{en:'I\'m not sure I follow.',fr:'Je ne suis pas sûr de suivre.',ctx:'Signaler une incompréhension.',lv:1},
{en:'Could you elaborate on that?',fr:'Pourriez-vous développer ce point ?',ctx:'Demande de précision.',lv:1},
{en:'That\'s a lot to unpack.',fr:'Il y a beaucoup à décortiquer là.',ctx:'Face à un sujet complexe.',lv:2},
// Conclure à l'oral
{en:'To bring this to a close...',fr:'Pour conclure...',ctx:'Clôture formelle d\'un discours.',lv:2},
{en:'If I had to sum it up in one sentence...',fr:'Si je devais le résumer en une phrase...',ctx:'Synthèse percutante.',lv:2},
{en:'The takeaway here is...',fr:'Ce qu\'il faut retenir ici, c\'est...',ctx:'Message clé final.',lv:2},
{en:'I\'ll leave you with this thought.',fr:'Je vous laisse sur cette réflexion.',ctx:'Clôture mémorable.',lv:2},
{en:'Does that answer your question?',fr:'Est-ce que ça répond à votre question ?',ctx:'Vérifier après une explication.',lv:1},
{en:'Is there anything you\'d like me to clarify?',fr:'Y a-t-il quelque chose que vous souhaiteriez que je clarifie ?',ctx:'Ouverture au dialogue en fin d\'intervention.',lv:1}]},

intercultural_gen:{label:'Communication internationale',icon:'🌍',color:'#E8F4F8',tc:'#1a4a6a',cards:[
// LV1 — principes de base
{en:'Please bear with me, English is not my first language.',fr:'Veuillez m\'excuser, l\'anglais n\'est pas ma langue maternelle.',ctx:'Ouverture honnête en contexte international.',lv:1},
{en:'I want to make sure we\'re on the same page.',fr:'Je veux m\'assurer qu\'on se comprend bien.',ctx:'Vérification essentielle en contexte multilingue.',lv:1},
{en:'Could you slow down a little? I want to make sure I understand correctly.',fr:'Pourriez-vous ralentir un peu ? Je veux bien comprendre.',ctx:'Demande polie en call international.',lv:1},
{en:'I may have misunderstood — could you clarify?',fr:'J\'ai peut-être mal compris — pourriez-vous clarifier ?',ctx:'Correction élégante d\'un malentendu.',lv:1},
{en:'Just to confirm I understood correctly...',fr:'Juste pour confirmer que j\'ai bien compris...',ctx:'Reformuler pour valider.',lv:1},
{en:'I\'d like to take a moment to reflect before responding.',fr:'J\'aimerais prendre un moment pour réfléchir avant de répondre.',ctx:'Acceptable dans la culture asiatique, valorisé.',lv:2},
{en:'I appreciate your patience.',fr:'J\'apprécie votre patience.',ctx:'Formule universelle de remerciement.',lv:1},
{en:'I hope I\'m not being too direct.',fr:'J\'espère ne pas être trop direct.',ctx:'Précaution dans des cultures indirectes.',lv:2},
{en:'Please let me know if anything is unclear.',fr:'N\'hésitez pas à me dire si quelque chose n\'est pas clair.',ctx:'Ouverture au dialogue universel.',lv:1},
{en:'I want to be respectful of cultural differences.',fr:'Je veux respecter les différences culturelles.',ctx:'Signal d\'intelligence interculturelle.',lv:2},
// LV2 — adapter son registre
{en:'I\'ll try to avoid idioms that may not translate well.',fr:'J\'éviterai les expressions idiomatiques qui ne se traduisent pas bien.',ctx:'Conscience interculturelle à l\'oral.',lv:2},
{en:'Let me rephrase that more clearly.',fr:'Permettez-moi de reformuler plus clairement.',ctx:'Adaptation au niveau de l\'interlocuteur.',lv:1},
{en:'I\'d like to summarize the key points to make sure we\'re aligned.',fr:'J\'aimerais résumer les points clés pour vérifier notre alignement.',ctx:'Outil puissant en contexte international.',lv:2},
{en:'Let\'s document this in writing to avoid any misunderstanding.',fr:'Documentons cela par écrit pour éviter tout malentendu.',ctx:'Bonne pratique en contexte multiculturel.',lv:2},
{en:'I understand this may be approached differently in your context.',fr:'Je comprends que cela puisse être abordé différemment dans votre contexte.',ctx:'Reconnaissance des différences culturelles.',lv:2},
{en:'Could we schedule a call to discuss this in more detail?',fr:'Pourrions-nous planifier un appel pour discuter de cela plus en détail ?',ctx:'Préférence de certaines cultures pour l\'oral.',lv:1},
{en:'I\'d appreciate your thoughts on this.',fr:'J\'apprécierais votre point de vue là-dessus.',ctx:'Invitation à participer — essentiel avec des interlocuteurs réservés.',lv:1},
{en:'Please feel free to push back if you disagree.',fr:'N\'hésitez pas à m\'opposer si vous n\'êtes pas d\'accord.',ctx:'Encourager le désaccord dans des cultures indirectes.',lv:2},
{en:'I want to make sure everyone\'s voice is heard.',fr:'Je veux m\'assurer que tout le monde peut s\'exprimer.',ctx:'Facilitation en réunion multiculturelle.',lv:2},
{en:'Let\'s make sure the decision works for all parties involved.',fr:'Assurons-nous que la décision convient à toutes les parties concernées.',ctx:'Approche collaborative universelle.',lv:2},
// LV3 — intelligence interculturelle avancée
{en:'I\'m aware that in some cultures, silence signals agreement while in others it signals discomfort.',fr:'Je sais que dans certaines cultures, le silence signifie accord, dans d\'autres, gêne.',ctx:'Lecture des signaux non-verbaux.',lv:3},
{en:'I\'d like to acknowledge that we may have different communication styles.',fr:'J\'aimerais reconnaître que nous avons peut-être des styles de communication différents.',ctx:'Meta-communication interculturelle.',lv:3},
{en:'Let\'s be mindful of time zone differences when scheduling.',fr:'Soyons attentifs aux fuseaux horaires lors de la planification.',ctx:'Considération pratique essentielle.',lv:1},
{en:'I\'ll follow up with a written summary for clarity.',fr:'Je ferai un résumé écrit pour plus de clarté.',ctx:'Bonne pratique post-réunion internationale.',lv:1},
{en:'I notice we may have different expectations around timelines.',fr:'Je remarque que nous avons peut-être des attentes différentes sur les délais.',ctx:'Signaler un écart culturel sans l\'imposer.',lv:3}
]},

intercultural_asia:{label:'Contexte asiatique',icon:'🌏',color:'#E8F4F8',tc:'#1a4a6a',cards:[
// LV1 — bases
{en:'I greatly appreciate your hospitality.',fr:'J\'apprécie grandement votre hospitalité.',ctx:'Essentiel en contexte asiatique — la relation prime.',lv:1},
{en:'I look forward to building a long-term relationship.',fr:'J\'espère construire une relation à long terme.',ctx:'Vision long terme valorisée en Asie.',lv:1},
{en:'I\'m honored to work with your team.',fr:'C\'est un honneur de travailler avec votre équipe.',ctx:'Registre formel apprécié.',lv:1},
{en:'Please allow me to introduce myself formally.',fr:'Permettez-moi de me présenter formellement.',ctx:'La présentation formelle est cruciale en Asie.',lv:1},
{en:'I would like to take this opportunity to express my respect.',fr:'Je souhaite saisir cette occasion d\'exprimer mon respect.',ctx:'Formule de respect adaptée.',lv:2},
// LV2 — communication indirecte
{en:'I understand there may be some challenges with this proposal.',fr:'Je comprends qu\'il pourrait y avoir quelques défis avec cette proposition.',ctx:'Reconnaître les difficultés sans forcer une réponse directe.',lv:2},
{en:'Perhaps we could explore some alternatives together.',fr:'Peut-être pourrions-nous explorer des alternatives ensemble.',ctx:'Suggestion indirecte — respecte la face.',lv:2},
{en:'I would not want to cause any inconvenience.',fr:'Je ne voudrais causer aucun inconvénient.',ctx:'Formule clé dans les cultures à haute distance de pouvoir.',lv:2},
{en:'If it is convenient for you, we could...',fr:'Si cela vous convient, nous pourrions...',ctx:'Proposition conditionnelle et polie.',lv:2},
{en:'I completely understand your position.',fr:'Je comprends tout à fait votre position.',ctx:'Empathie avant de proposer une alternative.',lv:2},
{en:'May I respectfully suggest an alternative approach?',fr:'Puis-je respectueusement suggérer une approche alternative ?',ctx:'Désaccord poli et indirect.',lv:2},
{en:'We are very flexible and open to your suggestions.',fr:'Nous sommes très flexibles et ouverts à vos suggestions.',ctx:'Signal de coopération valorisé.',lv:2},
{en:'I would like to think about this carefully before responding.',fr:'J\'aimerais y réfléchir soigneusement avant de répondre.',ctx:'Le silence et la réflexion sont valorisés.',lv:2},
// LV2 — face et hiérarchie
{en:'I wouldn\'t want to put you in a difficult position.',fr:'Je ne voudrais pas vous mettre dans une position difficile.',ctx:'Préserver la face de l\'interlocuteur.',lv:2},
{en:'I defer to your judgment on this matter.',fr:'Je m\'en remets à votre jugement sur ce sujet.',ctx:'Respecter la hiérarchie.',lv:2},
{en:'Please do not hesitate to correct me if I am wrong.',fr:'N\'hésitez pas à me corriger si j\'ai tort.',ctx:'Humilité volontaire — valorisée en Asie.',lv:2},
{en:'I am still learning about your market and value your expertise.',fr:'J\'apprends encore votre marché et j\'apprécie votre expertise.',ctx:'Humilité et respect de l\'expertise locale.',lv:2},
// LV3 — avancé
{en:'I recognize that a long-term partnership requires patience and trust.',fr:'Je reconnais qu\'un partenariat à long terme demande patience et confiance.',ctx:'Philosophie business asiatique.',lv:3},
{en:'I hope we can resolve this in a way that works for everyone.',fr:'J\'espère que nous pouvons résoudre cela d\'une manière qui convient à tous.',ctx:'Harmonie — valeur centrale dans de nombreuses cultures asiatiques.',lv:3},
{en:'I\'d like to avoid any misunderstanding that could affect our relationship.',fr:'Je veux éviter tout malentendu qui pourrait affecter notre relation.',ctx:'La relation prime sur la transaction.',lv:3}
]},

intercultural_europe:{label:'Contexte européen & global',icon:'🌐',color:'#E8F4F8',tc:'#1a4a6a',cards:[
// LV1 — bases
{en:'Let\'s be direct about the challenges.',fr:'Parlons directement des défis.',ctx:'Approprié avec les Allemands, Scandinaves, Néerlandais.',lv:1},
{en:'I\'d like to propose a structured approach.',fr:'J\'aimerais proposer une approche structurée.',ctx:'Valorisé dans les cultures germaniques.',lv:1},
{en:'Could we agree on a clear process with defined milestones?',fr:'Pourrait-on s\'accorder sur un processus clair avec des jalons définis ?',ctx:'Cultures d\'Europe du Nord.',lv:1},
{en:'I\'d like to put a formal proposal in writing.',fr:'J\'aimerais soumettre une proposition formelle par écrit.',ctx:'Formalisation appréciée en Europe continentale.',lv:2},
{en:'I appreciate your straightforwardness.',fr:'J\'apprécie votre franchise.',ctx:'Valider la communication directe.',lv:1},
// LV2 — nuances culturelles européennes
{en:'I understand that in your market the regulatory environment is quite strict.',fr:'Je comprends que dans votre marché, l\'environnement réglementaire est assez strict.',ctx:'Europe : compliance et régulation cruciales.',lv:2},
{en:'We should factor in the local compliance requirements.',fr:'Nous devons tenir compte des exigences de conformité locales.',ctx:'Contexte européen réglementé.',lv:2},
{en:'I\'d like to acknowledge the differences in our business cultures.',fr:'J\'aimerais reconnaître les différences dans nos cultures d\'entreprise.',ctx:'Meta-conscience interculturelle.',lv:2},
{en:'Perhaps we should align on expectations before proceeding.',fr:'Peut-être devrions-nous aligner les attentes avant d\'aller plus loin.',ctx:'Prévenir les malentendus culturels.',lv:2},
{en:'I know work-life balance is an important value in your culture.',fr:'Je sais que l\'équilibre vie pro/perso est une valeur importante dans votre culture.',ctx:'Adapter ses demandes en contexte européen.',lv:2},
{en:'Let\'s make sure this aligns with GDPR requirements.',fr:'Assurons-nous que cela est conforme aux exigences RGPD.',ctx:'Incontournable en Europe.',lv:2},
{en:'We need to document this carefully for audit purposes.',fr:'Nous devons documenter cela soigneusement à des fins d\'audit.',ctx:'Rigueur documentaire européenne.',lv:2},
// LV2 — flexibilité et registre
{en:'I\'m happy to adapt my approach to fit your working style.',fr:'Je suis prêt à adapter mon approche à votre style de travail.',ctx:'Flexibilité interculturelle.',lv:2},
{en:'Could we find a format that works across all our offices?',fr:'Pourrions-nous trouver un format qui fonctionne dans tous nos bureaux ?',ctx:'Contexte multinational.',lv:2},

function getIV(s,card){
  const base=BASE_IV[s];
  if(!card||!card.totalRatings)return Math.min(base,BASE_IV[3]);
  if(s>=4)return base*(card.mult||1);
  return base;
}
function getIL(s,card){
  if(!card||!card.totalRatings)return s>=4?'12h (1ère vue)':BASE_IL[s];
  if(s>=4){
    const ms=BASE_IV[s]*(card.mult||1);
    const dy=Math.round(ms/86400000);
    return dy>=1?dy+'j':Math.round(ms/3600000)+'h';
  }
  return BASE_IL[s];
}

function fdue(due){
  const d=due-now();
  if(d<=0)return '<span style="color:var(--red)">à revoir</span>';
  const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(dy>=1)return 'dans '+dy+'j';
  if(h>=1)return 'dans '+h+'h';
  if(m>=1)return 'dans '+m+'min';
  return 'bientôt';
}

function stars(s){
  const c=s===0?'var(--text3)':s<=2?'var(--red)':s===3?'var(--orange)':s===4?'var(--green)':'#15803d';
  return '<span class="stars" style="color:'+c+'">'+('★'.repeat(s)+'☆'.repeat(5-s))+'</span>';
}

// ─── COMPOSED PHRASE HELPERS ─────────────────────────────────
function getEligiblePool(){
  var now_=now();
  return D.cards.filter(function(c){
    var goodScore=c.score>=4;
    var reviewed=(c.totalRatings||0)>=3&&c.score>=3;
    if(!goodScore&&!reviewed)return false;
    if(c.due>0&&c.due<now_-14*86400000)return false;
    // Max 3 composed phrases per word
    var usedCount=D.composed.filter(function(cp){
      return cp.words&&cp.words.some(function(w){return w.en===c.a;});
    }).length;
    if(usedCount>=3)return false;
    return true;
  });
}
function getComposedDue(){
  return D.composed.filter(function(c){return c.due<=now();});
}
function shouldGenerateComposed(){
  if(!getApiKey())return false;
  var pool=getEligiblePool();
  if(pool.length<2)return false;
  // Max 3 pending at any time
  var pending=D.composed.filter(function(c){return c.due>now();}).length;
  if(pending>=10)return false;
  // Max 3 generated per day
  var today=new Date().toDateString();
  var generatedToday=D.composed.filter(function(c){
    return c.generatedOn===today;
  }).length;
  if(generatedToday>=5)return false;
  return true;
}
function getComposedDesc(){
  var pool=getEligiblePool();
  if(!getApiKey())return 'Configure ta clé API dans Paramètres';
  if(pool.length<10)return pool.length+'/10 mots pour débloquer';
  var due=getComposedDue().length;
  var pending=D.composed.filter(function(c){return c.due>now();}).length;
  var poolInfo=' · '+pool.length+' mots dans le pool';
  if(due>0)return due+' défi'+(due>1?'s':'')+' disponible'+(due>1?'s':'')+poolInfo;
  if(pending>0)return pending+' défi'+(pending>1?'s':'')+' en attente'+poolInfo;
  return 'Génération au démarrage'+poolInfo;
}

async function generateComposed(){
  if(!getApiKey())return null;
  var pool=getEligiblePool();
  if(pool.length<10)return null;
  var level=pool.length>=50?3:pool.length>=20?2:1;

  // Shuffle pool, send up to 25 words - Claude chooses freely what fits
  var shuffled=pool.slice().sort(function(){return Math.random()-.5;});
  var sample=shuffled.slice(0,25);
  var wordList=sample.map(function(c){return c.a+' ('+c.b+')';}).join(', ');

  var ctx=level===1
    ?'a simple everyday or professional sentence'
    :level===2
    ?'a professional situation (email, meeting, or report)'
    :'a short realistic professional scenario (2-3 sentences max)';

  var prompt='You are creating a French-to-English translation exercise for a French professional learning English.\n\n'
    +'The learner knows these English words/expressions:\n'+wordList+'\n\n'
    +'Your task:\n'
    +'1. Choose 2 to 4 words from the list that naturally fit together in one sentence\n'
    +'2. Write a natural, grammatically correct French sentence a French professional would actually say\n'
    +'3. Write the English translation - it MUST be a faithful, accurate translation of the French sentence\n\n'
    +'Critical rules:\n'
    +'- French sentence: 100% correct French, zero English words, must make logical sense\n'
    +'- Context: '+ctx+'\n'
    +'- Maximum 25 words per sentence\n'
    +'- Only choose words that fit naturally together - never force incompatible words\n'
    +'- The English translation must be FAITHFUL to the French meaning - do not add nuances, modals or meanings not present in the original\n'
    +'- If the French says "we cannot", the English must say "we cannot" - not "we might not be able to"\n'
    +'- The "used" array must contain ONLY words that actually appear in the English translation\n\n'
    +'Respond ONLY with this exact JSON, no markdown, no explanation:\n'
    +'{"fr": "the French sentence", "en": "the faithful English translation", "used": ["word1", "word2"]}';

  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':getApiKey(),
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    var data=await resp.json();
    if(data.error){console.log('Defi IA API error:',data.error);composedGenPending=false;return null;}
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    var clean=text.replace(/```json|```/g,'').trim();
    var m=clean.match(/\{[\s\S]*\}/);
    if(!m){composedGenPending=false;return null;}
    var parsed;
    try{parsed=JSON.parse(m[0]);}catch(e){composedGenPending=false;return null;}
    var frText=parsed.fr||'';
    var enText=parsed.en||'';
    if(!frText||!enText){composedGenPending=false;return null;}

    // Use the words Claude says it used - display as chips
    var usedRaw=parsed.used||[];
    // Try to match back to pool for fr translation, otherwise use as-is
    var usedWords=usedRaw.map(function(w){
      var match=sample.find(function(c){return c.a.toLowerCase()===w.toLowerCase();});
      return match?{en:match.a,fr:match.b}:{en:w,fr:''};
    });
    if(!usedWords.length)usedWords=[{en:'—',fr:''}];

    var cp={
      id:'cp_'+Date.now(),
      fr:frText,
      en:enText,
      words:usedWords,
      level:level,
      score:0,mult:1,due:0,
      totalRatings:0,
      generatedOn:new Date().toDateString()
    };
    D.composed.push(cp);sv();
    return cp;
  }catch(e){console.log('Defi IA error:',e);composedGenPending=false;return null;}
}


function rateComposed(id,s){
  var c=D.composed.find(function(x){return x.id===id;});
  if(!c)return;
  c.totalRatings=(c.totalRatings||0)+1;c.score=s;
  var iv={1:10*60000,2:3600000,3:6*3600000,4:86400000,5:3*86400000};
  c.due=now()+iv[s]*(s>=4?(c.mult||1):1);
  if(s>=4)c.mult=Math.min((c.mult||1)*1.4,8);else c.mult=1;
  if(s<=2){
    c.words.forEach(function(w){
      var card=D.cards.find(function(x){return x.a===w.en;});
      if(card)card.due=Math.min(card.due,now()+30*60000);
    });
  }
  D.reviewedToday=(D.reviewedToday||0)+1;D.totalReviewed=(D.totalReviewed||0)+1;
  sv();updateDot();
}

function getQuizCards(){
  if(qMode==='themes')return qDeck?D.cards.filter(function(c){return c.deckId===qDeck;}):D.cards.filter(function(c){return !c.fromBank;});
  if(qMode==='explore')return D.cards.filter(function(c){return c.fromBank;});
  return D.cards;
}

async function startSession(){
  var qa=document.getElementById('qa');
  if(!qa)return;

  if(trainMode==='composed'){
    qCards=[];qIdx=0;qScores=[];
    composedQueue=getComposedDue();
    if(composedQueue.length===0&&shouldGenerateComposed()&&!composedGenPending){
      qa.innerHTML='<div class="composed-loader"><div style="font-size:32px;margin-bottom:8px">&#129302;</div><div>Génération de ton Défi IA...</div><div class="dot-anim"><span></span><span></span><span></span></div></div>';
      composedGenPending=true;
      await generateComposed();
      composedGenPending=false;
      composedQueue=getComposedDue();
    }
    if(composedQueue.length===0){
      var pending=D.composed.filter(function(c){return c.due>now();});
      if(pending.length){
        var nextDue=Math.min.apply(null,pending.map(function(c){return c.due;}));
        var diffMs=nextDue-now();
        var diffH=Math.floor(diffMs/3600000);
        var diffM=Math.floor((diffMs%3600000)/60000);
        var timeStr=diffH>0?(diffH+'h '+diffM+'min'):(diffM+' min');
        qa.innerHTML='<div class="empty"><div class="empty-icon">⏳</div>'+pending.length+' défi'+(pending.length>1?'s':'')+' en attente.<br><br>Prochain disponible dans '+timeStr+'.</div>';
      } else {
        qa.innerHTML='<div class="empty"><div class="empty-icon">&#129302;</div>Pas encore de Défi IA.<br><br>Valide plus de fiches en révision pour en générer !</div>';
      }
      return;
    }
    rQCard();
    return;
  }

  // Normal revision
  var all=getQuizCards();
  if(!all.length){
    qa.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Aucune fiche dans cette sélection.</div>';
    return;
  }
  var due=all.filter(function(c){return c.due<=now();}).sort(function(){return Math.random()-.5;});
  var nd=all.filter(function(c){return c.due>now();}).sort(function(a,b){return a.score-b.score;});
  qCards=due.concat(nd.slice(0,Math.max(3,10-due.length)));
  qIdx=0;qScores=[];

  composedQueue=getComposedDue();
  if(shouldGenerateComposed()&&!composedGenPending){
    composedGenPending=true;
    generateComposed().then(function(){composedGenPending=false;composedQueue=getComposedDue();}).catch(function(){composedGenPending=false;});
  }
  rQCard();
}

function getCatBadge(card){
  if(card.exploreKey){
    if(card.exploreKey.startsWith('ox_')){var k=card.exploreKey.split('-')[0].slice(3);return {type:'icon',val:(OXFORD[k]&&OXFORD[k].icon)||''};}
    var k2=card.exploreKey.split('-')[0];return{type:'icon',val:(BANK[k2]&&BANK[k2].icon)||''};
  }
  var deck=D.decks.find(function(d){return d.id===card.deckId;});
  if(deck&&!deck.isExplore)return{type:'name',val:deck.name};
  return{type:'',val:''};
}

function rQCard(){
  var qa=document.getElementById('qa');
  if(!qa)return;

  // Composed mode
  if(trainMode==='composed'){
    if(composedQueue.length>0){rComposedCard(composedQueue.shift());return;}
    var avg=qScores.length?(qScores.reduce(function(a,b){return a+b;},0)/qScores.length).toFixed(1):'0';
    qa.innerHTML='<div class="result"><div class="result-emoji">&#127942;</div><div class="result-score">'+avg+'<span style="font-size:28px;font-weight:500">/5</span></div><div class="result-sub">'+qScores.length+' Défi'+(qScores.length!==1?'s':'')+' IA relevé'+(qScores.length!==1?'s':'')+'</div><button class="btn-primary" id="btn-restart">Recommencer</button></div>';
    document.getElementById('btn-restart').onclick=startSession;
    return;

  // Insert composed every 5 regular cards
  if(qIdx>0&&qIdx%5===0&&composedQueue.length>0){rComposedCard(composedQueue.shift());return;}

  if(qIdx>=qCards.length){

    var avg2=qScores.length?(qScores.reduce(function(a,b){return a+b;},0)/qScores.length).toFixed(1):'—';
    var t=tod(),last=new Date(D.lastSession||0).toDateString(),yest=new Date(now()-86400000).toDateString();
    if(last!==t){D.streak=last===yest?(D.streak||0)+1:1;D.lastSession=now();sv();}

  qa.innerHTML='<div class="quiz-stats">'

function rate(s){
  var card=qCards[qIdx];
  var real=D.cards.find(function(c){return c.id===card.id;});
  if(real){
    real.totalRatings=(real.totalRatings||0)+1;
    real.score=s;
    real.due=now()+getIV(s,real);
    if(s>=4)real.mult=Math.min((real.mult||1)*1.5,16);
    else if(s<=2)real.mult=1;
    if(s<=2)real.hardStreak=(real.hardStreak||0)+1;else real.hardStreak=0;
    real.isHard=(real.hardStreak||0)>=3;
  }
  qScores.push(s);D.reviewedToday=(D.reviewedToday||0)+1;D.totalReviewed=(D.totalReviewed||0)+1;
  sv();qIdx++;updateDot();rQCard();
}

// ─── EXPLORE ─────────────────────────────────────────────────
function getUnlocked(k){
  var cat=BANK[k];var u=1;
  for(var i=0;i<cat.cards.length-1;i++){
    var bk=k+'-'+i;
    if(D.bankAdded[bk]){var c=D.cards.find(function(x){return x.exploreKey===bk;});if(c&&c.score>=4)u=i+2;else break;}
    else break;
  }
  return Math.min(u,cat.cards.length);
}
function getUnlockedOx(k){
  var cat=OXFORD[k];var u=1;
  for(var i=0;i<cat.cards.length-1;i++){
    var bk='ox_'+k+'-'+i;
    if(D.bankAdded[bk]){var c=D.cards.find(function(x){return x.exploreKey===bk;});if(c&&c.score>=4)u=i+2;else break;}
    else break;
  }
  return Math.min(u,cat.cards.length);
}

function rExplore(){
  var el=document.getElementById('s-explore');
  if(bankCat){
    OXFORD_KEYS.indexOf(bankCat)>=0?rOxCat(el,bankCat):rCtxCat(el,bankCat);
    return;
  }
  if(exploreMeta){rMeta(el,exploreMeta);return;}

  var addedCtx=CAT_KEYS.reduce(function(s,k){return s+BANK[k].cards.filter(function(_,i){return D.bankAdded[k+'-'+i];}).length;},0);
  var addedOx=OXFORD_KEYS.reduce(function(s,k){return s+OXFORD[k].cards.filter(function(_,i){return D.bankAdded['ox_'+k+'-'+i];}).length;},0);
  var totalOx=OXFORD_KEYS.reduce(function(s,k){return s+OXFORD[k].cards.length;},0);

  var ctxTab=exploreTab==='context';
  el.innerHTML='<div class="explore-wrap">'
    +'<div class="page-title">Explorer</div>'

      +'<button class="exp-tab'+(!ctxTab?' active':'')+'" id="tab-ox">Oxford 3000</button>'
    +'</div>'
    +(ctxTab?renderCtxTab(addedCtx):renderOxTab(addedOx,totalOx))
    +'</div>';

  document.getElementById('tab-ctx').onclick=function(){exploreTab='context';rExplore();};
  document.getElementById('tab-ox').onclick=function(){exploreTab='oxford';rExplore();};
  // Wire quick add buttons
  OXFORD_KEYS.forEach(function(k){var btn=document.getElementById('qadd-ox-'+k);if(btn)btn.onclick=function(e){e.stopPropagation();quickAddOx(k);};});

  OXFORD_KEYS.forEach(function(k){var el2=document.getElementById('catcard-ox-'+k);if(el2)el2.onclick=function(){bankCat=k;rExplore();};});

}

function renderCtxTab(added){
  var html='';
  Object.keys(META).forEach(function(mk){
    var m=META[mk];
    var total=m.cats.reduce(function(s,k){return s+(BANK[k]?BANK[k].cards.length:0);},0);
    var a=m.cats.reduce(function(s,k){return s+(BANK[k]?BANK[k].cards.filter(function(_,i){return D.bankAdded[k+'-'+i];}).length:0);},0);
    var hasNext=false;
    for(var ki=0;ki<m.cats.length;ki++){
      var catK=m.cats[ki];if(!BANK[catK])continue;
      var u=getUnlocked(catK);
      for(var ii=0;ii<u;ii++){if(!D.bankAdded[catK+'-'+ii]){hasNext=true;break;}}
      if(hasNext)break;
    }
    html+='<div class="meta-card" id="metacard-'+mk+'">'
      +'<div class="meta-card-top">'
        +'<div class="meta-icon-wrap" style="background:'+m.color+'">'+m.icon+'</div>'
        +'<div class="meta-info"><div class="meta-name">'+m.label+'</div><div class="meta-sub">'+a+'/'+total+'</div></div>'
        +'<div class="meta-arrow">›</div>'
      +'</div>'
      +(hasNext?'<button class="meta-add-btn" id="qadd-meta-'+mk+'">+ Ajouter la prochaine fiche</button>':'')
    +'</div>';
  });
  return '<div class="meta-list">'+html+'</div><p style="font-size:12px;color:var(--text3);text-align:center;margin-top:12px">'+added+' / '+totalEntries+' entrées ajoutées</p>';
}

function renderOxTab(added,totalOx){
  var html='';
  OXFORD_KEYS.forEach(function(k){
    var cat=OXFORD[k];
    var a=cat.cards.filter(function(_,i){return D.bankAdded['ox_'+k+'-'+i];}).length;
    var u=getUnlockedOx(k);
    var nextIdx=-1;
    for(var i=0;i<u;i++){if(!D.bankAdded['ox_'+k+'-'+i]){nextIdx=i;break;}}

function addBCard(catKey,idx){
  resetDaily();var mx=D.maxNew||20;
  if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte.');return;}
  var c=BANK[catKey].cards[idx],bk=catKey+'-'+idx;if(D.bankAdded[bk])return;
  D.cards.push({id:D.nextCardId++,deckId:EXPLORE_DECK_ID,a:c.en,b:c.fr,ctx:c.ctx||'',
    type:c.en.split(' ').length<=3?'mot':'phrase',dir:'en-fr',score:0,mult:1,due:0,fromBank:true,exploreKey:bk});
  D.bankAdded[bk]=true;D.newToday++;sv();animatePlus();updateDot();
  rCtxCat(document.getElementById('s-explore'),bankCat);
}

async function autoTranslate(){
  var inp=document.getElementById('ia');if(!inp||!inp.value.trim())return;
  var dir=document.getElementById('idir').value;
  var langpair=dir==='fr-en'?'fr|en':'en|fr';
  var res=document.getElementById('trans-result');
  if(res){res.style.display='block';res.textContent='Traduction...';}
  try{
    var r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(inp.value.trim())+'&langpair='+langpair+'&de=myenglish@app.fr');
    var d=await r.json();
    var t=d.responseData&&d.responseData.translatedText;
    if(t&&t!=='NO QUERY SPECIFIED'&&res){
      res.textContent='→ '+t;
      var ib=document.getElementById('ib');if(ib&&!ib.value)ib.value=t;
    } else if(res)res.style.display='none';
  }catch(e){if(res)res.style.display='none';}
}

function addCard(deckId){
  resetDaily();var mx=D.maxNew||20;
  if(D.newToday>=mx){alert('Limite atteinte — '+mx+' nouvelles fiches/jour (modifiable dans Paramètres).');return;}
  var a=document.getElementById('ia').value.trim();
  var b=document.getElementById('ib').value.trim();
  var ctx=document.getElementById('ictx').value.trim()||'';
  var type=document.getElementById('ityp').value||'phrase';
  var dir=document.getElementById('idir').value||'en-fr';
  if(!a||!b)return;
  D.cards.push({id:D.nextCardId++,deckId:deckId,a:a,b:b,ctx:ctx,type:type,dir:dir,score:0,mult:1,due:0});
  D.newToday++;sv();
  rDeckView(document.getElementById('s-words'),deckId);
}

// ─── QUICK CAPTURE ───────────────────────────────────────────
function openQC(){
  var overlay=document.getElementById('qc-overlay');
  overlay.style.display='block';
  var userDecks=D.decks.filter(function(d){return !d.isExplore;});
  var deckOptions=userDecks.map(function(d){return '<option value="'+d.id+'"'+(qcDeck===d.id?' selected':'')+'>'+d.name+'</option>';}).join('');
  overlay.innerHTML='<div class="qc-sheet">'
    +'<div class="qc-backdrop" id="qc-back"></div>'
    +'<div class="qc-panel">'
      +'<div class="qc-handle"></div>'
      +'<div class="qc-title">Capture rapide ⚡</div>'
      +'<div class="qc-dir-row">'
        +'<button class="qc-dir-btn'+(qcDir==='fr-en'?' active':'')+'" id="qc-fr">FR → EN</button>'
        +'<button class="qc-dir-btn'+(qcDir==='en-fr'?' active':'')+'" id="qc-en">EN → FR</button>'
      +'</div>'
      +'<input class="qc-field" id="qc-a" type="text" placeholder="'+(qcDir==='fr-en'?'Ta phrase en français…':'Your phrase in English…')+'" autocapitalize="sentences" autocomplete="off"/>'
      +'<div class="qc-trans-result" id="qc-tr"></div>'
      +'<input class="qc-field" id="qc-b" type="text" placeholder="'+(qcDir==='fr-en'?'Traduction anglaise…':'Traduction française…')+'" autocapitalize="sentences" autocomplete="off"/>'
      +'<input class="qc-field" id="qc-note" type="text" placeholder="Titre / contexte optionnel (ex: Breaking Bad)" autocapitalize="sentences" autocomplete="off" style="margin-bottom:10px"/>'
      +'<div style="margin-bottom:12px">'
        +'<select id="qc-deck" style="width:100%;font-size:14px;padding:11px 13px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit">'
          +deckOptions
          +'<option value="new">+ Nouveau thème…</option>'
        +'</select>'
      +'</div>'
      +'<input class="qc-field" id="qc-new-deck" type="text" placeholder="Nom du nouveau thème" autocapitalize="words" style="display:none"/>'
      +'<div class="qc-actions">'
        +'<button class="qc-btn-cancel" id="qc-cancel">Annuler</button>'
        +'<button class="qc-btn-add" id="qc-trans" style="background:var(--brand-mid)">Traduire</button>'
        +'<button class="qc-btn-add" id="qc-save" style="background:var(--green)">Ajouter</button>'
      +'</div>'
    +'</div>'
  +'</div>';
  document.getElementById('qc-back').onclick=closeQC;
  document.getElementById('qc-cancel').onclick=closeQC;
  document.getElementById('qc-fr').onclick=function(){qcDir='fr-en';openQC();};
  document.getElementById('qc-en').onclick=function(){qcDir='en-fr';openQC();};
  document.getElementById('qc-trans').onclick=qcTranslate;
  document.getElementById('qc-save').onclick=qcSave;
  document.getElementById('qc-deck').onchange=function(){
    var nf=document.getElementById('qc-new-deck');
    if(this.value==='new'){nf.style.display='block';setTimeout(function(){nf.focus();},50);}
    else{nf.style.display='none';qcDeck=parseInt(this.value);}
  };
  // Set initial deck selection
  if(!qcDeck&&userDecks.length)qcDeck=userDecks[0].id;
  setTimeout(function(){var el=document.getElementById('qc-a');if(el)el.focus();},100);
}

function closeQC(){
  var o=document.getElementById('qc-overlay');
  o.style.display='none';o.innerHTML='';
}

async function qcTranslate(){
  var inp=document.getElementById('qc-a');if(!inp||!inp.value.trim())return;
  var tr=document.getElementById('qc-tr');
  if(tr){tr.style.display='block';tr.textContent='Traduction...';}
  var langpair=qcDir==='fr-en'?'fr|en':'en|fr';
  try{
    var r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(inp.value.trim())+'&langpair='+langpair+'&de=myenglish@app.fr');
    var d=await r.json();
    var t=d.responseData&&d.responseData.translatedText;
    if(t&&t!=='NO QUERY SPECIFIED'){
      if(tr){tr.style.display='block';tr.textContent='→ '+t;}
      var b=document.getElementById('qc-b');if(b&&!b.value)b.value=t;
    } else if(tr)tr.style.display='none';
  }catch(e){if(tr)tr.style.display='none';}
}

function qcSave(){
  resetDaily();var mx=D.maxNew||20;
  if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte.');return;}
  var a=document.getElementById('qc-a').value.trim();
  var b=document.getElementById('qc-b').value.trim();
  if(!a||!b){alert('Remplis les deux champs.');return;}
  var note=document.getElementById('qc-note').value.trim();
  var deckSel=document.getElementById('qc-deck').value;
  var deck;
  if(deckSel==='new'){
    var newName=document.getElementById('qc-new-deck').value.trim();
    if(!newName){alert('Entre un nom pour le nouveau thème.');return;}
    deck={id:D.nextDeckId++,name:newName,dir:'both',type:'mixed'};
    D.decks.push(deck);qcDeck=deck.id;
  } else {
    deck=D.decks.find(function(d){return d.id===parseInt(deckSel);});
    if(!deck){alert('Thème introuvable.');return;}
  }
  D.cards.push({id:D.nextCardId++,deckId:deck.id,
    a:qcDir==='fr-en'?b:a,b:qcDir==='fr-en'?a:b,
    ctx:note,type:'phrase',dir:qcDir,score:0,mult:1,due:0,captured:true});
  D.newToday++;sv();animatePlus();updateDot();closeQC();
  if(curTab==='home')rHome();
}

// ─── INIT ────────────────────────────────────────────────────
resetDaily();updateDot();rHome();

</script>
</body>
</html>
