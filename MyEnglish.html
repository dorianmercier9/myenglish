<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyEnglish"/>
<title>MyEnglish</title>
<style>
:root{
  --accent:#1a5c38;--accent2:#2a7a4e;--accent-light:#e6f2eb;--accent-text:#0d3d24;
  --bg:#faf9f7;--bg2:#f2f1ee;--bg3:#e8e6e1;
  --text:#111111;--text2:#4a4a4a;--text3:#8a8a8a;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --r:11px;--rsm:7px;
  --red:#c0392b;--redbg:#fdf0ef;
  --orange:#c45c0a;--orangebg:#fef3e8;
  --gl:#27ae60;--glbg:#eafaf1;
  --gv:#0f7a30;--gvbg:#d4f0de;
  --blue:#1a4a7a;--bluebg:#eaf0f8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0e0c;--bg2:#181816;--bg3:#222220;
  --text:#f2f0ec;--text2:#9a9890;--text3:#555450;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#2a7a4e;--accent-light:#0a2018;--accent-text:#6dd49a;
  --redbg:#2a0f0d;--orangebg:#2a1400;--glbg:#0a2018;--gvbg:#082010;--bluebg:#0a1828;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem 1rem 0.5rem}
.nav{display:flex;border-top:0.5px solid var(--border2);background:var(--bg);padding-bottom:var(--safe-bottom);position:relative}
.nb{flex:1;background:none;border:none;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text3);font-size:9px;letter-spacing:.03em;text-transform:uppercase;font-weight:500;position:relative}
.nb.active{color:var(--accent)}
.nb svg{width:21px;height:21px;stroke-width:1.6;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.nb-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;pointer-events:none}
.screen{display:none}.screen.active{display:block}
.page-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
h1{font-size:24px;font-weight:700;letter-spacing:-.4px;line-height:1.2}

/* HOME */
.home-hero{padding:.5rem 0 1rem;display:flex;align-items:center;justify-content:space-between}
.home-hero-text{}
.home-greeting{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:12px 8px;text-align:center;border:0.5px solid var(--border);cursor:default}
.stat.clickable{cursor:pointer;transition:border-color .15s}
.stat.clickable:active{opacity:.8}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* STREAK CARD */
.streak-card{background:var(--accent-light);border-radius:var(--r);padding:14px 16px;margin-bottom:1rem;border:0.5px solid rgba(26,92,56,.12);display:flex;align-items:center;gap:14px}
.streak-fire{font-size:32px;line-height:1}
.streak-info{flex:1}
.streak-n{font-size:26px;font-weight:700;color:var(--accent);line-height:1}
.streak-l{font-size:12px;color:var(--accent-text);margin-top:2px}
.streak-days{display:flex;gap:5px;margin-top:10px}
.streak-dot{width:26px;height:6px;border-radius:99px;background:var(--bg3)}
.streak-dot.done{background:var(--accent)}
.streak-dot.today{background:var(--accent2);box-shadow:0 0 6px rgba(26,92,56,.4)}

/* DAILY GOAL */
.daily-goal{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;border:0.5px solid var(--border)}
.daily-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.daily-label{font-size:13px;color:var(--text);font-weight:500}
.daily-count{font-size:13px;color:var(--accent);font-weight:600}
.dbar{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;position:relative}
.dbar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.dbar-glow{position:absolute;top:0;right:0;width:20px;height:100%;background:linear-gradient(90deg,transparent,rgba(26,92,56,.3));border-radius:99px;display:none}

/* GLOBAL PROGRESS */
.global-prog{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;border:0.5px solid var(--border)}
.gp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.gp-label{font-size:13px;color:var(--text);font-weight:500}
.gp-pct{font-size:13px;color:var(--text3)}
.gp-bar{background:var(--bg3);border-radius:99px;height:4px;overflow:hidden;margin-bottom:6px}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}
.gp-sub{font-size:11px;color:var(--text3)}

/* NOTIFICATION BANNER */
.notif-banner{background:var(--bluebg);border:0.5px solid var(--blue);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.notif-banner-text{flex:1;font-size:13px;color:var(--blue)}
.notif-banner-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}

.btn-main{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:9px}
.btn-main:active{opacity:.85}
.btn-sec{width:100%;background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:7px}
.btn-sec:active{opacity:.8}
.btn{border:none;border-radius:var(--rsm);padding:9px 15px;font-size:14px;font-weight:500;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}.btn-p:active{opacity:.85}
.btn-g{background:var(--bg3);color:var(--text2)}
.btn-sm{border:none;border-radius:var(--rsm);padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text2)}

/* MASTERED DETAIL */
.mastered-detail{background:var(--bg2);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.mastered-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)}
.mastered-row:last-child{border-bottom:none}
.mastered-cat{font-size:13px;color:var(--text2)}
.mastered-val{font-size:14px;font-weight:600;color:var(--accent)}

/* THEMES - list view */
.theme-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.theme-item{background:var(--bg2);border-radius:var(--r);padding:13px 15px;cursor:pointer;border:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.theme-item:active{opacity:.8}
.theme-item-icon{width:36px;height:36px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg3)}
.theme-item-info{flex:1;min-width:0}
.theme-item-name{font-size:14px;font-weight:600}
.theme-item-meta{font-size:12px;color:var(--text3);margin-top:2px}
.theme-item-right{text-align:right;flex-shrink:0}
.due-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--redbg);color:var(--red);font-weight:600}
.ok-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--glbg);color:var(--gv);font-weight:600}
.dir-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--bg3);color:var(--text3);margin-top:4px}
.add-theme-btn{background:none;border:1px dashed var(--border2);border-radius:var(--r);padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);width:100%}

/* FORMS */
.form-box{background:var(--bg2);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;border:0.5px solid var(--border)}
.form-title{font-size:13px;font-weight:700;margin-bottom:13px;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;padding:10px 11px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.form-row textarea{height:52px;resize:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:6px}

/* PILLS */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:99px;padding:6px 13px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500}
.pill.active{background:var(--accent);color:#fff;border-color:transparent}

/* CARD LIST */
.section-header{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section-header-line{flex:1;height:0.5px;background:var(--border2)}
.card-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.card-item{background:var(--bg2);border-radius:var(--rsm);padding:11px 13px;display:flex;align-items:center;gap:9px;border:0.5px solid var(--border)}
.card-texts{flex:1;min-width:0}
.card-a{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-b{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-ctx{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-style:italic}
.card-right{text-align:right;white-space:nowrap;flex-shrink:0}
.card-due{font-size:10px;color:var(--text3);margin-top:3px}
.del-btn{background:none;border:none;font-size:14px;color:var(--text3);padding:4px 5px;cursor:pointer;flex-shrink:0}
.tp{display:inline-block;font-size:9px;padding:1px 6px;border-radius:99px;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.tp-p{background:var(--bluebg);color:var(--blue)}.tp-m{background:var(--orangebg);color:var(--orange)}.tp-b{background:var(--accent-light);color:var(--accent-text)}
.search-box{width:100%;font-size:14px;padding:9px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);outline:none;font-family:inherit;margin-bottom:10px}
.search-box:focus{border-color:var(--accent)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}

/* QUIZ */
.quiz-selector{margin-bottom:1rem}
.quiz-sel-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.quiz-sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.qsel-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s}
.qsel-btn.active{background:var(--accent);color:#fff;border-color:transparent}
.qsel-btn:active{opacity:.8}
.qsel-icon{font-size:18px;margin-bottom:4px}
.quiz-stats{display:flex;gap:7px;margin-bottom:11px}
.qs{background:var(--bg2);border-radius:var(--rsm);padding:9px;flex:1;text-align:center;border:0.5px solid var(--border)}
.qs-n{font-size:19px;font-weight:700}
.qs-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.prog{background:var(--bg3);border-radius:99px;height:3px;margin-bottom:1.2rem;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.quiz-card{background:var(--bg2);border-radius:var(--r);padding:1.75rem 1.25rem;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:11px;margin-bottom:1rem;border:0.5px solid var(--border)}
.quiz-dir{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.quiz-q{font-size:21px;font-weight:600;line-height:1.4}
.quiz-ans{font-size:18px;font-weight:500;color:var(--accent);margin-top:5px;line-height:1.4}
.quiz-ctx{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px;padding:0 .75rem;line-height:1.5}
.discovery-badge{background:#fff3cd;color:#856404;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px;text-transform:uppercase;letter-spacing:.04em}
.audio-btn{background:none;border:0.5px solid var(--border2);border-radius:99px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px}
.audio-btn:active{background:var(--bg3)}
.write-input{width:100%;font-size:16px;padding:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;font-family:inherit;text-align:center;margin-top:4px}
.write-input:focus{border-color:var(--accent)}
.write-compare{background:var(--bg3);border-radius:var(--rsm);padding:10px 14px;margin-top:8px;width:100%;text-align:left}
.write-yours{font-size:13px;color:var(--text2);margin-bottom:4px}
.write-correct{font-size:13px;color:var(--accent);font-weight:500}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:.5rem}
.score-btn{border-radius:var(--rsm);padding:10px 3px;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.score-btn:active{opacity:.75}
.score-sub{font-size:9px;font-weight:500;opacity:.8}
.sc1{background:var(--redbg);color:var(--red)}.sc2{background:#fef0e8;color:#b94a00}.sc3{background:var(--orangebg);color:var(--orange)}.sc4{background:var(--glbg);color:var(--gl)}.sc5{background:var(--gvbg);color:var(--gv)}
.score-hint{font-size:12px;color:var(--text2);margin-bottom:9px;text-align:center}
.reveal-wrap{text-align:center}
.result{text-align:center;padding:2.5rem 1rem}
.result-score{font-size:58px;font-weight:700;color:var(--accent)}
.result-sub{font-size:14px;color:var(--text2);margin:7px 0 1.5rem}

/* EXPLORE */
.explore-intro{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6;padding:12px 14px;background:var(--accent-light);border-radius:var(--r);border:0.5px solid rgba(26,92,56,.1)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:1.25rem}
.cat-card{border-radius:var(--r);padding:14px;cursor:pointer;border:none;text-align:left}
.cat-card:active{opacity:.85}
.cat-icon{font-size:20px;margin-bottom:7px}
.cat-name{font-size:13px;font-weight:600;line-height:1.3}
.cat-sub{font-size:11px;opacity:.7;margin-top:3px}
.level-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.lv1{background:#e8f4fd;color:#1a5276}.lv2{background:#fef9e7;color:#7d6608}.lv3{background:#fdf2f8;color:#76448a}
.bank-item{background:var(--bg2);border-radius:var(--rsm);padding:12px 13px;margin-bottom:7px;border:0.5px solid var(--border);position:relative}
.bank-en{font-size:14px;font-weight:500;padding-right:52px;line-height:1.4}
.bank-fr{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.bank-note{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic;line-height:1.4}
.add-btn{position:absolute;top:11px;right:10px;background:var(--accent);color:#fff;border:none;border-radius:99px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.add-btn.done{background:var(--bg3);color:var(--text3);cursor:default}
.locked-item{filter:blur(3px);pointer-events:none;user-select:none;opacity:.6}
.locked-section{text-align:center;padding:14px;background:var(--bg2);border-radius:var(--r);border:0.5px dashed var(--border2);margin-top:8px;font-size:13px;color:var(--text3)}
.back-btn{background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1rem;padding:0;display:flex;align-items:center;gap:5px;font-weight:500}

/* +1 ANIMATION */
.plus-one{position:fixed;font-size:18px;font-weight:700;color:var(--accent);pointer-events:none;z-index:9999;animation:floatUp .8s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* SETTINGS */
.settings-section{margin-bottom:1.5rem}
.settings-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.settings-row{background:var(--bg2);border-radius:var(--rsm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--border)}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="content">
    <div id="s-home" class="screen active"></div>
    <div id="s-themes" class="screen"></div>
    <div id="s-fiches" class="screen"></div>
    <div id="s-quiz" class="screen"></div>
    <div id="s-explore" class="screen"></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="T('home')" id="n-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="nb" onclick="T('themes')" id="n-themes">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/></svg>
      <span>Thèmes</span>
    </button>
    <button class="nb" onclick="T('fiches')" id="n-fiches">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><rect x="6" y="3" width="12" height="5" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
      <span>Fiches</span>
    </button>
    <button class="nb" onclick="T('quiz')" id="n-quiz">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>Quiz</span>
    </button>
    <button class="nb" onclick="T('explore')" id="n-explore">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Explore</span>
    </button>
  </nav>
</div>

<script>
const SK='myenglish_v4';
const DAILY_GOAL=10;
const MAX_NEW=15;
const DISCOVERY_THRESHOLD=30;

// Discovery mode intervals (shorter)
const IV_DISC={1:600000,2:1800000,3:7200000,4:21600000,5:43200000};
// Normal intervals
const IV={1:3600000,2:10800000,3:28800000,4:86400000,5:172800000};
const IL={1:'1h',2:'3h',3:'8h',4:'1j',5:'2j'};
const IL_DISC={1:'10min',2:'30min',3:'2h',4:'6h',5:'12h'};

const BANK={

function fdue(due){

  const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(dy>=1)return'dans '+dy+'j';if(h>=1)return'dans '+h+'h';if(m>=1)return'dans '+m+'min';return'bientôt';
}

  curTab=tab;

  });
  updateNavBadge();
  if(tab==='home')rHome();
  if(tab==='themes')rThemes();
  if(tab==='fiches')rFiches();
  if(tab==='quiz')rQuizTab();

function updateNavBadge(){
  const due=D.cards.filter(c=>c.due<=now()).length;
  const nb=document.getElementById('n-quiz');
  let badge=nb.querySelector('.nb-badge');
  if(due>=10){
    if(!badge){badge=document.createElement('span');badge.className='nb-badge';nb.appendChild(badge);}
    badge.textContent=due>99?'99+':due;
  }else if(badge){badge.remove();}
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function canNotify(){return 'Notification' in window && 'serviceWorker' in navigator;}
async function requestNotifPermission(){
  if(!canNotify())return false;
  const p=await Notification.requestPermission();
  D.notifEnabled=p==='granted';sv();return p==='granted';
}
function scheduleNotifs(){
  if(!D.notifEnabled)return;
  // Schedule daily reminder via service worker message
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({
      type:'SCHEDULE',time:D.notifTime,dueCount:D.cards.filter(c=>c.due<=now()).length,streak:D.streak||0
    });
  }
}
function checkDueNotif(){
  if(!D.notifEnabled)return;
  const due=D.cards.filter(c=>c.due<=now()).length;
  if(due>=10&&Notification.permission==='granted'){
    new Notification('MyEnglish 📚',{body:`${due} fiches t'attendent ! Lance une session.`,icon:'/favicon.ico'});
  }
}

// Register SW inline
const SW_CODE=`
self.addEventListener('message',e=>{
  if(e.data.type==='SCHEDULE'){
    const{time,dueCount,streak}=e.data;
    const[h,m]=time.split(':').map(Number);
    const now=new Date(),target=new Date();
    target.setHours(h,m,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    const delay=target-now;
    setTimeout(()=>{
      self.registration.showNotification('MyEnglish 📚',{
        body:dueCount>0?\`${dueCount} fiches dues — c\'est l\'heure de réviser !\`:'Ouvre MyEnglish pour continuer ta progression.',
        icon:'/favicon.ico'
      });
    },delay);
  }
});
`;
if('serviceWorker' in navigator){
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

  D.decks.forEach(d=>{

  });
  // Explore categories
  CAT_KEYS.forEach(key=>{
    const cat=BANK[key];
    const m=D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith(key+'-')&&c.score>=4).length;
    if(m>0)rows.push(`<div class="mastered-row"><span class="mastered-cat">${cat.icon} ${cat.label}</span><span class="mastered-val">${m}</span></div>`);
  });

}

  </div>`;}

  const personalHTML=personalCards.length?personalCards.map(cardHTML).join(''):'<div style="font-size:13px;color:var(--text3);padding:8px 0">Aucune fiche personnelle.</div>';
  const exploreHTML=exploreCards.length?exploreCards.map(cardHTML).join(''):'';

  const addForm=aDeck!==null?`<div class="form-box"><div class="form-title">Ajouter une fiche</div>

// ─── EXPLORE ─────────────────────────────────────────────────────────────────
function getUnlocked(catKey){
  const cat=BANK[catKey];let u=1;
  for(let i=0;i<cat.cards.length-1;i++){
    const bk=catKey+'-'+i;
    if(D.bankAdded[bk]){const c=D.cards.find(x=>x.exploreKey===bk);if(c&&c.score>=4)u=i+2;else break;}
    else break;
  }
  return Math.min(u,cat.cards.length);
}

function rExplore(){
  const el=document.getElementById('s-explore');
  if(bankCat){rExpCat(el,bankCat);return;}
  const addedAll=Object.keys(D.bankAdded).length;
  const html=CAT_KEYS.map(key=>{
    const cat=BANK[key];
    const tot=cat.cards.length,added=cat.cards.filter((_,i)=>D.bankAdded[key+'-'+i]).length;
    const unlocked=getUnlocked(key);
    const locked=tot-unlocked;
    return`<div class="cat-card" style="background:${cat.color};color:${cat.tc}" onclick="bankCat='${key}';rExplore()">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.label}</div>
      <div class="cat-sub">${added}/${tot} · ${locked>0?locked+' verrouillées':'tout débloqué ✓'}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="page-title">Explore</div>
    <div class="explore-intro">Contenu en 3 niveaux. Note ≥ 4/5 pour débloquer la fiche suivante dans chaque catégorie.</div>
    <div class="cat-grid">${html}</div>
    <p style="font-size:12px;color:var(--text3);text-align:center">${addedAll} / ${totalEntries} entrées ajoutées</p>`;
}

function rExpCat(el,key){
  const cat=BANK[key];
  const dOpts=D.decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  const unlocked=getUnlocked(key);
  const unlockedCards=cat.cards.slice(0,unlocked);
  const lockedCards=cat.cards.slice(unlocked);
  const lvLabels={1:'Niveau 1 — Fondations',2:'Niveau 2 — Intermédiaire',3:'Niveau 3 — Niveau natif'};
  let lastLv=0;

  const unlockedHTML=unlockedCards.map((c,i)=>{
    const bk=key+'-'+i,done=!!D.bankAdded[bk];
    const es=c.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    let lvH='';
    if(c.lv!==lastLv){lastLv=c.lv;lvH=`<div style="margin:${i>0?'14px':'2px'} 0 8px"><span class="level-badge ${c.lv===1?'lv1':c.lv===2?'lv2':'lv3'}">${lvLabels[c.lv]}</span></div>`;}
    return lvH+`<div class="bank-item">
      <button class="add-btn ${done?'done':''}" onclick="addBCard('${key}',${i})" ${done?'disabled':''}>${done?'✓':'+'}</button>
      <div class="bank-en">${c.en} <button onclick="spk('${es}')" style="background:none;border:none;cursor:pointer;font-size:12px;vertical-align:middle;opacity:.7">🔊</button></div>
      <div class="bank-fr">${c.fr}</div>
      ${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}
    </div>`;
  }).join('');

  let lockedHTML='';
  if(lockedCards.length>0){
    const nextLv=lockedCards[0].lv;
    lockedHTML=`<div style="margin:14px 0 8px"><span class="level-badge ${nextLv===2?'lv2':'lv3'}">${lvLabels[nextLv]}</span></div>`;
    lockedHTML+=lockedCards.map((c,i)=>{
      const actualIdx=unlocked+i;
      const bk=key+'-'+actualIdx;
      return`<div class="bank-item locked-item">
        <button class="add-btn" disabled style="opacity:.3">+</button>
        <div class="bank-en">${c.en}</div>
        <div class="bank-fr">${c.fr}</div>
        ${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}
      </div>`;
    }).join('');
    lockedHTML+=`<div class="locked-section">🔒 ${lockedCards.length} fiche${lockedCards.length>1?'s':''} verrouillée${lockedCards.length>1?'s':''} — obtiens 4/5 pour débloquer la suivante</div>`;
  }

  el.innerHTML=`
    <button class="back-btn" onclick="bankCat=null;rExplore()">← Retour</button>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px"><span style="font-size:22px">${cat.icon}</span><span style="font-size:16px;font-weight:700">${cat.label}</span></div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:1rem">${unlocked} / ${cat.cards.length} débloquées</p>
    <div class="form-row" style="margin-bottom:1rem"><label>Ajouter dans le thème</label><select id="bds">${dOpts}</select></div>
    ${unlockedHTML}${lockedHTML}`;
}

function addBCard(catKey,idx){

  const catBtns=qMode==='explore'?CAT_KEYS.map(key=>{const cat=BANK[key];const added=Object.keys(D.bankAdded).filter(k=>k.startsWith(key+'-')).length;return added>0?`<button class="pill ${qExploreCat===key?'active':''}" onclick="setQExploreCat('${key}')">${cat.icon} ${cat.label}</button>`:''}).join(''):'';

function setQMode(mode,deckId){
  qMode=mode;
  if(deckId!==undefined)qDeck=deckId;
  if(mode==='explore')qExploreCat=null;
  rQuizTab();
}
function setQExploreCat(key){qExploreCat=key;rQuizTab();}

function getQuizCards(){
  if(qMode==='all')return D.cards;
  if(qMode==='themes')return D.cards.filter(c=>!c.fromBank);
  if(qMode==='theme')return D.cards.filter(c=>c.deckId===qDeck);
  if(qMode==='explore'){
    if(qExploreCat)return D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith(qExploreCat+'-'));
    return D.cards.filter(c=>c.fromBank);
  }
  return D.cards;
}

function stQuiz(){
  const all=getQuizCards();
  if(!all.length){document.getElementById('qa').innerHTML='<div class="empty">Aucune fiche dans cette sélection.</div>';return;}
  const due=all.filter(c=>c.due<=now()).sort(()=>Math.random()-.5);
  const nd=all.filter(c=>c.due>now()).sort((a,b)=>a.score-b.score);
  qCards=[...due,...nd.slice(0,Math.max(3,10-due.length))];
  qIdx=0;qScores=[];rQCard();
}

function enTxt(c){return c.dir==='fr-en'?c.b:c.a;}

function rQCard(){
  const area=document.getElementById('qa');if(!area)return;
  if(qIdx>=qCards.length){
    const avg=qScores.length?(qScores.reduce((a,b)=>a+b,0)/qScores.length).toFixed(1):'—';
    const t=tod(),last=new Date(D.lastSession||0).toDateString(),yest=new Date(now()-86400000).toDateString();
    if(last!==t){D.streak=last===yest?(D.streak||0)+1:1;D.lastSession=now();sv();}
    checkDueNotif();
    area.innerHTML=`<div class="result">
      <div class="result-score">${avg}<span style="font-size:26px;font-weight:400">/5</span></div>
      <div class="result-sub">${qScores.length} fiche${qScores.length!==1?'s':''} révisée${qScores.length!==1?'s':''}</div>
      <button class="btn-main" onclick="stQuiz()">Recommencer</button>
    </div>`;
    return;
  }
  const card=qCards[qIdx],pct=Math.round((qIdx/qCards.length)*100),duc=qCards.filter(c=>c.due<=now()).length;
  const isEF=card.dir!=='fr-en',q=isEF?card.a:card.b,safe=enTxt(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const tp=`<span class="tp ${card.fromBank?'tp-b':card.type==='mot'?'tp-m':'tp-p'}">${card.fromBank?'Explore':card.type}</span>`;
  const discBadge=isDiscovery()?'<span class="discovery-badge">⚡ découverte</span>':'';

  area.innerHTML=`
    <div class="quiz-stats">
      <div class="qs"><div class="qs-n">${qIdx}</div><div class="qs-l">Vues</div></div>
      <div class="qs"><div class="qs-n">${qCards.length-qIdx}</div><div class="qs-l">Restantes</div></div>
      <div class="qs"><div class="qs-n" style="color:${duc>0?'var(--red)':'var(--gv)'}">${duc}</div><div class="qs-l">Dues</div></div>
    </div>
    <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-dir">${isEF?'Traduire en français':'Traduire en anglais'} · ${tp} ${discBadge}</div>
      <div class="quiz-q">${q}</div>
      <button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button>
      <input class="write-input" id="wa" type="text" placeholder="Écris ta réponse…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div id="qb" class="reveal-wrap" style="margin-top:.5rem">
      <button class="btn-main" style="max-width:220px;margin:0 auto" onclick="rvl()">Voir la réponse</button>
    </div>`;
  setTimeout(()=>document.getElementById('wa')?.focus(),100);
  document.getElementById('wa')?.addEventListener('keydown',e=>{if(e.key==='Enter')rvl();});
}

function rvl(){
  const card=qCards[qIdx],isEF=card.dir!=='fr-en',ans=isEF?card.b:card.a,safe=enTxt(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const typed=document.getElementById('wa')?.value||'';
  const il=isDiscovery()?IL_DISC:IL;
  document.getElementById('qb').innerHTML=`
    <div class="quiz-card" style="min-height:auto;padding:1rem 1.25rem;gap:8px">
      <div class="quiz-ans">${ans}</div>
      ${card.ctx?`<div class="quiz-ctx">${card.ctx}</div>`:''}
      <div class="write-compare">
        <div class="write-yours">Ta réponse : <em>${typed||'—'}</em></div>
        <div class="write-correct">Correct : ${ans}</div>
      </div>
      <button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button>
    </div>
    <p class="score-hint" style="margin-top:.75rem">C'est acquis à quel niveau ?</p>
    <div class="score-grid">${[1,2,3,4,5].map(s=>`<button class="score-btn sc${s}" onclick="rate(${s})"><span>${s}</span><span class="score-sub">${il[s]}</span></button>`).join('')}</div>`;
}

function rate(s){
  const card=qCards[qIdx],real=D.cards.find(c=>c.id===card.id);
  if(real){
    real.score=s;
    const base=getIV(s),mult=s>=4?(real.mult||1):1;
    real.due=now()+base*mult;
    real.mult=s>=4?Math.min((real.mult||1)*1.6,12):1;
  }
  qScores.push(s);
  D.reviewedToday=(D.reviewedToday||0)+1;
  D.totalReviewed=(D.totalReviewed||0)+1;
  sv();qIdx++;updateNavBadge();rQCard();
}

// Init
resetDaily();
updateNavBadge();
rHome();
</script>
