function now(){return Date.now();}
function tod(){return new Date().toDateString();}
function resetDaily(){
  let changed=false;
  if(D.lastNewDay!==tod()){D.newToday=0;D.lastNewDay=tod();changed=true;}
  if(D.lastReviewDay!==tod()){D.reviewedToday=0;D.lastReviewDay=tod();changed=true;}
  if(changed)sv();
}
function getMode(){const t=D.totalReviewed||0;return t<30?'flash':t<100?'mid':'norm';}
function getIV(s){const m=getMode();return m==='flash'?IV_FLASH[s]:m==='mid'?IV_MID[s]:IV_NORM[s];}
function getIL(s){const m=getMode();return m==='flash'?IL_FLASH[s]:m==='mid'?IL_MID[s]:IL_NORM[s];}
function getModeName(){return getMode()==='flash'?'Flash ⚡':getMode()==='mid'?'Intermédiaire 🔥':'Normal 📚';}

function fdue(due){
  const d=due-now();if(d<=0)return'<span style="color:var(--red)">à revoir</span>';
  const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(dy>=1)return'dans '+dy+'j';if(h>=1)return'dans '+h+'h';if(m>=1)return'dans '+m+'min';return'bientôt';
}
function starHTML(s){
  const c=s===0?'var(--text3)':s<=2?'var(--red)':s===3?'var(--orange)':s===4?'var(--gl)':'var(--gv)';
  let h='<span style="color:'+c+';font-size:11px">';for(let i=1;i<=5;i++)h+=i<=s?'★':'☆';return h+'</span>';
}
function iV(){
  if(!window.speechSynthesis)return;
  function p(){const vs=window.speechSynthesis.getVoices();EV=vs.find(v=>v.lang==='en-US'&&v.name.includes('Samantha'))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));}
  p();window.speechSynthesis.onvoiceschanged=p;
}iV();
function spk(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;if(EV)u.voice=EV;window.speechSynthesis.speak(u);}

function T(tab){
  curTab=tab;
  ['home','themes','fiches','quiz','explore'].forEach(t=>{
    document.getElementById('s-'+t).classList.toggle('active',t===tab);
    document.getElementById('n-'+t).classList.toggle('active',t===tab);
  });
  updateNavBadge();
  if(tab==='home')rHome();if(tab==='themes')rThemes();if(tab==='fiches')rFiches();
  if(tab==='quiz')rQuizTab();if(tab==='explore'){bankCat=null;rExplore();}
}

function updateNavBadge(){
  const due=D.cards.filter(c=>c.due<=now()).length;
  const nb=document.getElementById('n-quiz');
  let badge=nb.querySelector('.nb-badge');
  if(due>=10){
    if(!badge){badge=document.createElement('span');badge.className='nb-badge';nb.appendChild(badge);}
    badge.textContent=due>99?'99+':due;
  }else if(badge){badge.remove();}
}

// NOTIFICATIONS
function canNotify(){return 'Notification' in window;}
async function requestNotifPermission(){
  if(!canNotify())return false;
  const p=await Notification.requestPermission();
  D.notifEnabled=p==='granted';sv();return p==='granted';
}
function checkAndNotify(){
  if(!D.notifEnabled||Notification.permission!=='granted')return;
  const due=D.cards.filter(c=>c.due<=now()).length;
  if(due>=10){
    new Notification('MyEnglish 📚',{body:`${due} fiches t'attendent ! Lance une session.`});
  }
}
function scheduleDaily(){
  if(!D.notifEnabled||Notification.permission!=='granted')return;
  const[h,m]=D.notifTime.split(':').map(Number);
  const target=new Date();target.setHours(h,m,0,0);
  if(target<=new Date())target.setDate(target.getDate()+1);
  const delay=target-new Date();
  setTimeout(()=>{
    const lastOpen=D.lastSession?new Date(D.lastSession):null;
    const oneDayAgo=new Date(now()-86400000);
    if(!lastOpen||lastOpen<oneDayAgo){
      new Notification('MyEnglish 📚',{body:'Ouvre MyEnglish pour continuer ta progression 🎯'});
    }
  },delay);
}

function buildMasteredDetail(){
  const rows=[];
  D.decks.forEach(d=>{const m=D.cards.filter(c=>c.deckId===d.id&&c.score>=4).length;if(m>0)rows.push(`<div class="mastered-row"><span class="mastered-cat">${d.name}</span><span class="mastered-val">${m}</span></div>`);});
  CAT_KEYS.forEach(key=>{const m=D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith(key+'-')&&c.score>=4).length;if(m>0)rows.push(`<div class="mastered-row"><span class="mastered-cat">${BANK[key].icon} ${BANK[key].label}</span><span class="mastered-val">${m}</span></div>`);});
  return rows.length?rows.join(''):'<div class="empty">Aucune fiche maîtrisée pour l\'instant.</div>';
}

function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.cards||!imp.decks)throw new Error('Format invalide');D=imp;sv();alert('Import réussi — '+D.cards.length+' fiches restaurées.');rHome();}catch(err){alert('Erreur : '+err.message);}};r.readAsText(f);}

function dPills(sel,fn,all){let h=all?`<button class="pill ${sel===null?'active':''}" onclick="${fn}(null)">Tous</button>`:'';return h+D.decks.map(d=>`<button class="pill ${d.id===sel?'active':''}" onclick="${fn}(${d.id})">${d.name}</button>`).join('');}

function rFiches(){
  const el=document.getElementById('s-fiches');
  if(!D.decks.length){el.innerHTML='<div class="empty">Crée un thème d\'abord.</div>';return;}
  const allCards=aDeck===null?D.cards:D.cards.filter(c=>c.deckId===aDeck);
  const filtered=ficheSearch?allCards.filter(c=>c.a.toLowerCase().includes(ficheSearch.toLowerCase())||c.b.toLowerCase().includes(ficheSearch.toLowerCase())):allCards;
  const personalCards=filtered.filter(c=>!c.fromBank);
  const exploreCards=filtered.filter(c=>c.fromBank);
  const deck=aDeck!==null?D.decks.find(d=>d.id===aDeck):null;
  const dirOpts=!deck||deck.dir==='both'?'<option value="en-fr">EN → FR</option><option value="fr-en">FR → EN</option>':deck.dir==='en-fr'?'<option value="en-fr">EN → FR</option>':'<option value="fr-en">FR → EN</option>';
  const typeOpts=!deck||deck.type==='mixed'?'<option value="phrase">Phrase</option><option value="mot">Mot</option>':deck.type==='mot'?'<option value="mot">Mot</option>':'<option value="phrase">Phrase</option>';
  function cHTML(c){return`<div class="card-item"><div class="card-texts"><div class="card-a">${c.a}</div><div class="card-b">${c.b}</div>${c.ctx?`<div class="card-ctx">${c.ctx}</div>`:''}<span class="tp ${c.fromBank?'tp-b':c.type==='mot'?'tp-m':'tp-p'}">${c.fromBank?'Explore':c.type}</span></div><div class="card-right"><div>${starHTML(c.score)}</div><div class="card-due">${fdue(c.due)}</div></div><button class="del-btn" onclick="delCard(${c.id})">✕</button></div>`;}
  const pHTML=personalCards.length?personalCards.map(cHTML).join(''):'<div style="font-size:13px;color:var(--text3);padding:8px 0">Aucune fiche personnelle.</div>';
  const addForm=aDeck!==null?`<div class="form-box"><div class="form-title">Ajouter une fiche</div><div class="form-row"><label>Direction</label><select id="idir" onchange="uLbls()">${dirOpts}</select></div><div class="form-row"><label id="la">Question</label><input type="text" id="ia"/></div><div class="form-row"><label id="lb">Réponse</label><input type="text" id="ib"/></div><div class="form-row"><label>Contexte <span style="font-weight:400;text-transform:none">(optionnel)</span></label><textarea id="ictx" placeholder="ex. Used in formal emails. / She felt overwhelmed by the workload."></textarea></div><div class="form-row"><label>Type</label><select id="ityp">${typeOpts}</select></div><div class="form-actions"><button class="btn btn-p" onclick="addCard()">Ajouter</button></div></div>`:'';
  // Summary bar for Tous
  const totalDue=allCards.filter(c=>c.due<=now()).length;
  const totalMastered=allCards.filter(c=>c.score>=4).length;
  const summaryBar=aDeck===null?`<div style="display:flex;gap:8px;margin-bottom:10px;font-size:12px">
    <span style="background:var(--redbg);color:var(--red);padding:3px 9px;border-radius:99px;font-weight:600">${totalDue} à revoir</span>
    <span style="background:var(--glbg);color:var(--gv);padding:3px 9px;border-radius:99px;font-weight:600">${totalMastered} maîtrisées</span>
    <span style="background:var(--bg2);color:var(--text3);padding:3px 9px;border-radius:99px">${allCards.length} total</span>
  </div>`:'';
  el.innerHTML=`<div class="pill-row">${dPills(aDeck,'setAD',true)}</div>
    ${summaryBar}
    <input class="search-box" type="text" placeholder="🔍 Rechercher…" value="${ficheSearch}" oninput="ficheSearch=this.value;rFiches()"/>
    <div class="section-header"><span>Mes fiches (${personalCards.length})</span><div class="section-header-line"></div></div>
    <div class="card-list">${pHTML}</div>
    ${exploreCards.length?`<div class="section-header"><span>Explore (${exploreCards.length})</span><div class="section-header-line"></div></div><div class="card-list">${exploreCards.map(cHTML).join('')}</div>`:''}
    ${addForm}`;uLbls();
}
function uLbls(){const dir=document.getElementById('idir')?.value||'en-fr';const la=document.getElementById('la'),lb=document.getElementById('lb'),ia=document.getElementById('ia'),ib=document.getElementById('ib');if(dir==='en-fr'){if(la)la.textContent='Anglais (question)';if(lb)lb.textContent='Français (réponse)';if(ia)ia.placeholder='ex. Overwhelming';if(ib)ib.placeholder='ex. Écrasant';}else{if(la)la.textContent='Français (question)';if(lb)lb.textContent='Anglais (réponse)';if(ia)ia.placeholder='ex. Je rentre tard.';if(ib)ib.placeholder='ex. I\'m coming home late.';}}
function setAD(id){aDeck=id;rFiches();}
function addCard(){resetDaily();const maxNew=D.maxNew||15;if(D.newToday>=maxNew){alert('Limite de '+maxNew+' nouvelles fiches aujourd\'hui atteinte. Change-la dans Paramètres.');return;}const a=document.getElementById('ia')?.value.trim(),b=document.getElementById('ib')?.value.trim(),ctx=document.getElementById('ictx')?.value.trim()||'',type=document.getElementById('ityp')?.value||'phrase',dir=document.getElementById('idir')?.value||'en-fr';if(!a||!b)return;D.cards.push({id:D.nextCardId++,deckId:aDeck,a,b,ctx,type,dir,score:0,mult:1,due:0});D.newToday++;sv();rFiches();}
function delCard(id){if(!confirm('Supprimer cette fiche ?'))return;D.cards=D.cards.filter(c=>c.id!==id);sv();rFiches();}

// EXPLORE
function getUnlocked(catKey){const cat=BANK[catKey];let u=1;for(let i=0;i<cat.cards.length-1;i++){const bk=catKey+'-'+i;if(D.bankAdded[bk]){const c=D.cards.find(x=>x.exploreKey===bk);if(c&&c.score>=4)u=i+2;else break;}else break;}return Math.min(u,cat.cards.length);}

function rExplore(){
  const el=document.getElementById('s-explore');
  if(bankCat){rExpCat(el,bankCat);return;}
  const addedAll=Object.keys(D.bankAdded).length;
  const html=CAT_KEYS.map(key=>{const cat=BANK[key];const tot=cat.cards.length,added=cat.cards.filter((_,i)=>D.bankAdded[key+'-'+i]).length,unlocked=getUnlocked(key),locked=tot-unlocked;return`<div class="cat-card" style="background:${cat.color};color:${cat.tc}" onclick="bankCat='${key}';rExplore()"><div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.label}</div><div class="cat-sub">${added}/${tot} · ${locked>0?locked+' verr.':'tout débloqué ✓'}</div></div>`;}).join('');
  el.innerHTML=`<div class="page-title">Explore</div><div class="explore-intro">10 catégories · 3 niveaux chacune · Note ≥ 4/5 pour débloquer la fiche suivante.</div><div class="cat-grid">${html}</div><p style="font-size:12px;color:var(--text3);text-align:center">${addedAll} / ${totalEntries} entrées ajoutées</p>`;
}

function rExpCat(el,key){
  const cat=BANK[key];const dOpts=D.decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');const unlocked=getUnlocked(key);const lvLabels={1:'Niveau 1 — Fondations',2:'Niveau 2 — Intermédiaire',3:'Niveau 3 — Niveau natif'};let lastLv=0;
  const unlockedHTML=cat.cards.slice(0,unlocked).map((c,i)=>{const bk=key+'-'+i,done=!!D.bankAdded[bk];const es=c.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");let lvH='';if(c.lv!==lastLv){lastLv=c.lv;lvH=`<div style="margin:${i>0?'14px':'2px'} 0 8px"><span class="level-badge ${c.lv===1?'lv1':c.lv===2?'lv2':'lv3'}">${lvLabels[c.lv]}</span></div>`;}return lvH+`<div class="bank-item"><button class="add-btn ${done?'done':''}" onclick="addBCard('${key}',${i})" ${done?'disabled':''}>${done?'✓':'+'}</button><div class="bank-en">${c.en} <button onclick="spk('${es}')" style="background:none;border:none;cursor:pointer;font-size:12px;vertical-align:middle;opacity:.7">🔊</button></div><div class="bank-fr">${c.fr}</div>${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}</div>`;}).join('');
  const lockedCards=cat.cards.slice(unlocked);
  const lockedHTML=lockedCards.length>0?`<div style="margin:14px 0 8px"><span class="level-badge ${lockedCards[0].lv===2?'lv2':'lv3'}">${lvLabels[lockedCards[0].lv]}</span></div>`+lockedCards.map((c)=>`<div class="bank-item locked-item"><button class="add-btn" disabled style="opacity:.3">+</button><div class="bank-en">${c.en}</div><div class="bank-fr">${c.fr}</div>${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}</div>`).join('')+`<div class="locked-section">🔒 ${lockedCards.length} fiche${lockedCards.length>1?'s':''} verrouillée${lockedCards.length>1?'s':''} — obtiens 4/5 pour débloquer la suivante</div>`:'';
  el.innerHTML=`<button class="back-btn" onclick="bankCat=null;rExplore()">← Retour</button><div style="display:flex;align-items:center;gap:9px;margin-bottom:4px"><span style="font-size:22px">${cat.icon}</span><span style="font-size:16px;font-weight:700">${cat.label}</span></div><p style="font-size:12px;color:var(--text2);margin-bottom:1rem">${unlocked} / ${cat.cards.length} débloquées · ajout automatique dans le thème Explore</p>${unlockedHTML}${lockedHTML}`;
}

function animatePlusOne(){
  const navEl=document.getElementById('n-home');const rect=navEl.getBoundingClientRect();
  const el=document.createElement('div');el.className='plus-one';el.textContent='+1';
  el.style.left=(rect.left+rect.width/2-15)+'px';el.style.top=(rect.top-10)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function addBCard(catKey,idx){
  resetDaily();const maxNewB=D.maxNew||15;if(D.newToday>=maxNewB){alert('Limite de '+maxNewB+' nouvelles fiches atteinte.');return;}
  const c=BANK[catKey].cards[idx],bk=catKey+'-'+idx;if(D.bankAdded[bk])return;
  const deckId=EXPLORE_DECK_ID;
  D.cards.push({id:D.nextCardId++,deckId,a:c.en,b:c.fr,ctx:c.ctx||'',type:c.en.split(' ').length<=3?'mot':'phrase',dir:'en-fr',score:0,mult:1,due:0,fromBank:true,exploreKey:bk});
  D.bankAdded[bk]=true;D.newToday++;sv();animatePlusOne();updateNavBadge();
  rExpCat(document.getElementById('s-explore'),bankCat);
}

// QUIZ
function rQuizTab(){
  const el=document.getElementById('s-quiz');
  el.innerHTML=`<div class="quiz-selector"><div class="quiz-sel-title">Source</div><div class="quiz-sel-grid"><div class="qsel-btn ${qMode==='all'?'active':''}" onclick="setQMode('all')"><div class="qsel-icon">⚡</div>Toutes</div><div class="qsel-btn ${qMode==='themes'?'active':''}" onclick="setQMode('themes')"><div class="qsel-icon">📚</div>Mes thèmes</div><div class="qsel-btn ${qMode==='explore'?'active':''}" onclick="setQMode('explore')"><div class="qsel-icon">🌐</div>Explore</div></div>
    ${qMode==='themes'?`<div class="pill-row">${D.decks.map(d=>`<button class="pill ${qDeck===d.id?'active':''}" onclick="setQTheme(${d.id})">${d.name}</button>`).join('')}</div>`:''}
    ${qMode==='explore'?`<div class="pill-row">${CAT_KEYS.map(key=>{const added=Object.keys(D.bankAdded).filter(k=>k.startsWith(key+'-')).length;return added>0?`<button class="pill ${qExploreCat===key?'active':''}" onclick="setQCat('${key}')">${BANK[key].icon} ${BANK[key].label}</button>`:''}).join('')||'<span style="font-size:13px;color:var(--text3)">Ajoute des fiches Explore d\'abord.</span>'}</div>`:''}
  </div><div id="qa"></div>`;
  stQuiz();
}
function setQMode(m){qMode=m;if(m!=='themes')qDeck=null;if(m!=='explore')qExploreCat=null;rQuizTab();}
function setQTheme(id){qDeck=id;rQuizTab();}
function setQCat(key){qExploreCat=key;rQuizTab();}

function getQuizCards(){
  if(qMode==='all')return D.cards;
  if(qMode==='themes')return qDeck?D.cards.filter(c=>c.deckId===qDeck):D.cards.filter(c=>!c.fromBank);
  if(qMode==='explore'){if(qExploreCat)return D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith(qExploreCat+'-'));return D.cards.filter(c=>c.fromBank);}
  return D.cards;
}

function stQuiz(){
  const all=getQuizCards();
  if(!all.length){document.getElementById('qa').innerHTML='<div class="empty">Aucune fiche dans cette sélection.</div>';return;}
  const due=all.filter(c=>c.due<=now()).sort(()=>Math.random()-.5),nd=all.filter(c=>c.due>now()).sort((a,b)=>a.score-b.score);
  qCards=[...due,...nd.slice(0,Math.max(3,10-due.length))];qIdx=0;qScores=[];rQCard();
}
function enTxt(c){return c.dir==='fr-en'?c.b:c.a;}

function rQCard(){
  const area=document.getElementById('qa');if(!area)return;
  if(qIdx>=qCards.length){
    const avg=qScores.length?(qScores.reduce((a,b)=>a+b,0)/qScores.length).toFixed(1):'—';
    const t=tod(),last=new Date(D.lastSession||0).toDateString(),yest=new Date(now()-86400000).toDateString();
    if(last!==t){D.streak=last===yest?(D.streak||0)+1:1;D.lastSession=now();sv();}
    checkAndNotify();
    area.innerHTML=`<div class="result"><div class="result-score">${avg}<span style="font-size:26px;font-weight:400">/5</span></div><div class="result-sub">${qScores.length} fiche${qScores.length!==1?'s':''} révisée${qScores.length!==1?'s':''}</div><button class="btn-main" onclick="stQuiz()">Recommencer</button></div>`;
    return;
  }
  const card=qCards[qIdx],pct=Math.round((qIdx/qCards.length)*100),duc=qCards.filter(c=>c.due<=now()).length;
  const isEF=card.dir!=='fr-en',q=isEF?card.a:card.b,safe=enTxt(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const tp=`<span class="tp ${card.fromBank?'tp-b':card.type==='mot'?'tp-m':'tp-p'}">${card.fromBank?'Explore':card.type}</span>`;
  const discBadge=getMode()!=='norm'?'<span class="discovery-badge">'+(getMode()==='flash'?'⚡ flash':'🔥 intermédiaire')+'</span>':'';
  area.innerHTML=`<div class="quiz-stats"><div class="qs"><div class="qs-n">${qIdx}</div><div class="qs-l">Vues</div></div><div class="qs"><div class="qs-n">${qCards.length-qIdx}</div><div class="qs-l">Restantes</div></div><div class="qs"><div class="qs-n" style="color:${duc>0?'var(--red)':'var(--gv)'}">${duc}</div><div class="qs-l">Dues</div></div></div>
    <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card"><div class="quiz-dir">${isEF?'Traduire en français':'Traduire en anglais'} · ${tp} ${discBadge}</div><div class="quiz-q">${q}</div><button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button><div style="display:flex;gap:8px;width:100%;margin-top:4px">
      <input class="write-input" id="wa" type="text" placeholder="Écris ta réponse…" autocomplete="off" autocapitalize="sentences" spellcheck="true" style="flex:1;margin-top:0"/>
      <button id="mic-btn" onclick="toggleMic()" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:0 14px;font-size:18px;cursor:pointer;flex-shrink:0" title="Dicter">🎤</button>
    </div></div>
    <div id="qb" class="reveal-wrap" style="margin-top:.5rem"><button class="btn-main" style="max-width:220px;margin:0 auto" onclick="rvl()">Voir la réponse</button></div>`;
  setTimeout(()=>document.getElementById('wa')?.focus(),100);
  document.getElementById('wa')?.addEventListener('keydown',e=>{if(e.key==='Enter')rvl();});
}

function rvl(){
  const card=qCards[qIdx],isEF=card.dir!=='fr-en',ans=isEF?card.b:card.a,safe=enTxt(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const typed=document.getElementById('wa')?.value||'';
  const il=getIL;
  const ansSafe=ans.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const ctxSafe=(card.ctx||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  document.getElementById('qb').innerHTML=`<div class="quiz-card" style="min-height:auto;padding:1rem 1.25rem;gap:8px">
    <div class="quiz-ans">${ans} <button onclick="spk('${ansSafe}')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:.7">🔊</button></div>
    ${card.ctx?`<div class="quiz-ctx">${card.ctx} <button onclick="spk('${ctxSafe}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.6">🔊</button></div>`:''}
    <div class="write-compare"><div class="write-yours">Ta réponse : <em>${typed||'—'}</em></div><div class="write-correct">Correct : ${ans}</div></div><button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button></div>
    <p class="score-hint" style="margin-top:.75rem">C'est acquis à quel niveau ?</p>
    <div class="score-grid">${[1,2,3,4,5].map(s=>`<button class="score-btn sc${s}" onclick="rate(${s})"><span>${s}</span><span class="score-sub">${il(s)}</span></button>`).join('')}</div>`;
}

// Speech recognition
let recognition=null;
function toggleMic(){
  const btn=document.getElementById('mic-btn');
  const inp=document.getElementById('wa');
  if(!btn||!inp)return;
  if(recognition){recognition.stop();recognition=null;btn.textContent='🎤';btn.style.borderColor='var(--border2)';return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Reconnaissance vocale non disponible sur ce navigateur.');return;}
  recognition=new SR();
  recognition.lang=qCards[qIdx]?.dir!=='fr-en'?'en-US':'fr-FR';
  recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{btn.textContent='⏹';btn.style.borderColor='var(--red)';};
  recognition.onresult=e=>{
    let t='';for(let r of e.results)t+=r[0].transcript;
    inp.value=t;
  };
  recognition.onend=()=>{btn.textContent='🎤';btn.style.borderColor='var(--border2)';recognition=null;};
  recognition.onerror=e=>{btn.textContent='🎤';btn.style.borderColor='var(--border2)';recognition=null;if(e.error!=='aborted')alert('Erreur micro : '+e.error);};
  recognition.start();
}

function rate(s){
  const card=qCards[qIdx],real=D.cards.find(c=>c.id===card.id);
  if(real){real.score=s;const base=getIV(s),mult=s>=4?(real.mult||1):1;real.due=now()+base*mult;real.mult=s>=4?Math.min((real.mult||1)*1.6,12):1;}
  qScores.push(s);D.reviewedToday=(D.reviewedToday||0)+1;D.totalReviewed=(D.totalReviewed||0)+1;
  sv();qIdx++;updateNavBadge();rQCard();
}

resetDaily();updateNavBadge();scheduleDaily();rHome();
</script>
