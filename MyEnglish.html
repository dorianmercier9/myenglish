<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyEnglish"/>
<title>MyEnglish</title>
<style>
:root{
  --brand:#1B2CC1;--brand-deep:#141FA8;--brand-light:#E8EBFF;--brand-mid:#4A5FE0;
  --gold:#F59E0B;--gold-light:#FEF3C7;--gold-dark:#D97706;
  --bg:#F8F8FC;--bg2:#FFFFFF;--bg3:#F0F0F8;
  --text:#0D0D1A;--text2:#4A4A6A;--text3:#9090B0;
  --border:rgba(27,44,193,0.08);--border2:rgba(27,44,193,0.15);
  --red:#DC2626;--redbg:#FEF2F2;--green:#16A34A;--greenbg:#F0FDF4;
  --orange:#EA580C;--orangebg:#FFF7ED;
  --r:14px;--rsm:9px;--rxs:6px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --shadow-sm:0 1px 3px rgba(27,44,193,0.08);
  --shadow:0 4px 16px rgba(27,44,193,0.10);
  --shadow-lg:0 8px 32px rgba(27,44,193,0.14);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0A0A14;--bg2:#12121E;--bg3:#1A1A2E;
  --text:#F0F0FF;--text2:#9090C0;--text3:#505070;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --brand:#4A5FE0;--brand-light:#1A1F3A;--brand-mid:#6B7AE8;
  --gold-light:#1A1500;--redbg:#1A0505;--greenbg:#001A07;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.5);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--sat);overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen{display:none;min-height:100%}.screen.active{display:block}

/* NAV */
.nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border2);
  padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(27,44,193,0.06)}
.nb{flex:1;background:none;border:none;padding:8px 0 6px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;
  letter-spacing:.02em;position:relative;transition:color .2s}
.nb.active{color:var(--brand)}
.nb-icon{font-size:22px;line-height:1;transition:transform .2s}
.nb.active .nb-icon{transform:scale(1.05)}
.nb-dot{position:absolute;top:8px;right:calc(50% - 16px);width:7px;height:7px;
  border-radius:50%;background:var(--gold);border:2px solid var(--bg2);
  opacity:0;transform:scale(0);transition:all .2s}
.nb-dot.show{opacity:1;transform:scale(1)}

/* COMMON */
.page-wrap{padding:20px 18px 20px}
.page-title{font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px}
.btn-primary{width:100%;background:var(--brand);color:#fff;border:none;
  border-radius:var(--r);padding:15px;font-size:15px;font-weight:700;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .15s}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{width:100%;background:var(--bg2);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--r);padding:13px;
  font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-sm{border:none;border-radius:var(--rsm);padding:7px 13px;
  font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--text2)}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pill{background:var(--bg2);border:1px solid var(--border);border-radius:99px;
  padding:7px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer}
.pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.back-btn{background:none;border:none;font-size:13px;color:var(--text2);
  cursor:pointer;margin-bottom:16px;padding:0;display:flex;align-items:center;gap:6px;font-weight:600}
.empty{text-align:center;padding:48px 16px;color:var(--text3);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

/* HOME */
.home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.home-title{font-size:28px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.home-title span{color:var(--brand)}
.home-avatar{width:38px;height:38px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.hero-cta{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-mid) 100%);
  border-radius:var(--r);padding:20px;margin-bottom:14px;cursor:pointer;
  box-shadow:var(--shadow-lg);transition:transform .15s;position:relative;overflow:hidden}
.hero-cta:active{transform:scale(.98)}
.hero-cta::before{content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06)}
.hero-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.hero-main{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7)}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);
  border-radius:99px;padding:4px 10px;font-size:12px;color:#fff;font-weight:600;margin-top:10px}
.stats-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stat-pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:99px;
  padding:7px 11px;font-size:11px;font-weight:500;color:var(--text2);
  box-shadow:var(--shadow-sm);white-space:nowrap}
.stat-pill.clickable{cursor:pointer}
.stat-pill-n{font-size:15px;font-weight:800;color:var(--text);margin-right:3px}
.streak-card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;
  margin-bottom:14px;border:0.5px solid var(--border);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:10px}
.streak-fire{font-size:32px;line-height:1;flex-shrink:0}
.streak-info{flex:1;min-width:0}
.streak-n{font-size:26px;font-weight:800;color:var(--brand);line-height:1;letter-spacing:-.5px}
.streak-l{font-size:12px;color:var(--text2);margin-top:2px;font-weight:500}
.streak-dots{display:flex;gap:5px;margin-top:8px}
.sdot{width:28px;height:5px;border-radius:99px;background:var(--bg3)}
.sdot.done{background:var(--brand)}
.sdot.today{background:var(--brand-mid)}
.streak-today{flex-shrink:0;text-align:right;min-width:60px}
.streak-today-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.streak-today-n{font-size:18px;font-weight:800;line-height:1.2}
.streak-today-bar{margin-top:4px}
.prog-card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;
  margin-bottom:14px;border:0.5px solid var(--border);box-shadow:var(--shadow-sm)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-label{font-size:13px;font-weight:600;color:var(--text)}
.prog-val{font-size:13px;font-weight:700;color:var(--brand)}
.prog-bar{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--brand),var(--brand-mid));transition:width .4s}
.mastered-panel{background:var(--bg2);border-radius:var(--r);padding:16px;
  margin-bottom:14px;border:0.5px solid var(--border);box-shadow:var(--shadow-sm)}
.mastered-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:0.5px solid var(--border)}
.mastered-row:last-child{border-bottom:none}

/* TRAIN */
.train-wrap{padding:20px 18px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mode-card{background:var(--bg2);border-radius:var(--r);padding:16px 14px;cursor:pointer;
  border:1.5px solid var(--border);box-shadow:var(--shadow-sm);transition:all .15s;
  position:relative;overflow:hidden}
.mode-card:active{transform:scale(.97)}
.mode-card.active{border-color:var(--brand);background:var(--brand-light)}
.mode-card.active .mode-card-name{color:var(--brand)}
.mode-card.disabled{opacity:.45;pointer-events:none}
.mode-card-icon{font-size:24px;margin-bottom:8px;line-height:1}
.mode-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.mode-card-desc{font-size:11px;color:var(--text3);line-height:1.4}
.mode-card-badge{position:absolute;top:10px;right:10px;background:var(--gold);color:#fff;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.mode-coming{position:absolute;top:10px;right:10px;background:var(--bg3);
  color:var(--text3);font-size:9px;font-weight:600;padding:2px 6px;border-radius:99px}

/* QUIZ */
.quiz-stats{display:flex;gap:8px;margin-bottom:14px}
.qs{background:var(--bg2);border-radius:var(--rsm);padding:10px;flex:1;text-align:center;
  border:0.5px solid var(--border);box-shadow:var(--shadow-sm)}
.qs-n{font-size:20px;font-weight:800;letter-spacing:-.3px}
.qs-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;font-weight:600}
.qprog{background:var(--bg3);border-radius:99px;height:3px;margin-bottom:16px;overflow:hidden}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-mid));border-radius:99px;transition:width .3s}
.quiz-card{background:var(--bg2);border-radius:var(--r);padding:26px 20px;
  text-align:center;min-height:200px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;margin-bottom:12px;
  border:0.5px solid var(--border);box-shadow:var(--shadow)}
.quiz-dir{font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.08em;font-weight:700;width:100%;display:flex;
  align-items:center;justify-content:space-between}
.quiz-q{font-size:22px;font-weight:700;line-height:1.4;color:var(--text);letter-spacing:-.2px}
.quiz-ans{font-size:20px;font-weight:600;color:var(--brand);line-height:1.4}
.quiz-ctx{font-size:12px;color:var(--text2);font-style:italic;line-height:1.6}
.audio-btn{background:var(--bg3);border:none;border-radius:99px;
  padding:7px 16px;font-size:12px;color:var(--text2);cursor:pointer;font-weight:600}
.write-wrap{width:100%;display:flex;gap:8px;margin-top:4px}
.write-input{flex:1;font-size:16px;padding:13px 14px;background:var(--bg2);
  border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);
  outline:none;font-family:inherit;text-align:center;transition:border-color .15s}
.write-input:focus{border-color:var(--brand)}
.mic-btn{width:46px;height:46px;border-radius:50%;background:var(--bg2);
  border:1.5px solid var(--border2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.mic-btn.recording{background:var(--red);border-color:var(--red)}
.compare-box{background:var(--bg3);border-radius:var(--rsm);padding:12px 16px;margin-top:10px;width:100%;text-align:left}
.compare-yours{font-size:13px;color:var(--text2);margin-bottom:5px}
.compare-correct{font-size:13px;color:var(--brand);font-weight:600}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.score-btn{border-radius:var(--rsm);padding:11px 3px;font-size:15px;font-weight:800;
  cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s}
.score-btn:active{transform:scale(.93)}
.score-sub{font-size:9px;font-weight:600;opacity:.8}
.sc1{background:var(--redbg);color:var(--red)}
.sc2{background:#fff7ed;color:#c2410c}
.sc3{background:var(--orangebg);color:var(--orange)}
.sc4{background:var(--greenbg);color:var(--green)}
.sc5{background:#f0fdf4;color:#15803d}
.score-hint{font-size:12px;color:var(--text2);margin-bottom:10px;text-align:center;font-weight:500}
.disc-badge{display:inline-block;background:var(--redbg);color:var(--red);
  border-radius:99px;font-size:10px;font-weight:700;padding:3px 9px}
.result{text-align:center;padding:40px 20px}
.result-emoji{font-size:56px;margin-bottom:12px}
.result-score{font-size:64px;font-weight:900;color:var(--brand);letter-spacing:-2px;line-height:1}
.result-sub{font-size:15px;color:var(--text2);margin:8px 0 24px;font-weight:500}
.type-chip{display:inline-block;font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;text-transform:uppercase}
.tc-phrase{background:var(--brand-light);color:var(--brand)}
.tc-mot{background:var(--orangebg);color:var(--orange)}
.tc-explore{background:var(--greenbg);color:var(--green)}

/* DEFI IA */
.composed-card{background:linear-gradient(135deg,var(--brand-light),rgba(245,158,11,.08));
  border:1.5px solid var(--brand);border-radius:var(--r);padding:20px;margin-bottom:14px}
.composed-badge{display:inline-flex;align-items:center;gap:5px;background:var(--brand);
  color:#fff;border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.composed-scenario{font-size:15px;line-height:1.7;color:var(--text);font-weight:500;margin-bottom:12px}
.composed-words{display:flex;flex-wrap:wrap;gap:6px}
.composed-word-chip{background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--text2)}
.composed-loader{text-align:center;padding:32px 20px;color:var(--text2);font-size:14px}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.dot-anim{display:inline-flex;gap:5px;margin-top:10px}
.dot-anim span{width:7px;height:7px;border-radius:50%;background:var(--brand);
  opacity:.3;animation:dotPulse 1.2s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}

/* EXPLORE */
.explore-wrap{padding:20px 18px}
.exp-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--bg3);
  border-radius:var(--r);padding:4px}
.exp-tab{flex:1;border:none;background:none;padding:10px;font-size:13px;
  font-weight:700;cursor:pointer;border-radius:calc(var(--r) - 3px);color:var(--text3);transition:all .2s}
.exp-tab.active{background:var(--bg2);color:var(--brand);box-shadow:var(--shadow-sm)}
.meta-list{display:flex;flex-direction:column;gap:10px}
.meta-card{background:var(--bg2);border-radius:var(--r);cursor:pointer;
  border:0.5px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;transition:transform .15s}
.meta-card:active{transform:scale(.98)}
.meta-card-top{display:flex;align-items:center;gap:14px;padding:14px 16px}
.meta-icon-wrap{width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.meta-info{flex:1;min-width:0}
.meta-name{font-size:15px;font-weight:700;color:var(--text)}
.meta-sub{font-size:12px;color:var(--text3);margin-top:2px}
.meta-arrow{color:var(--text3);font-size:16px;flex-shrink:0}
.meta-add-btn{width:100%;border:none;border-top:0.5px solid var(--border);
  background:var(--brand-light);color:var(--brand);padding:9px 16px;
  font-size:12px;font-weight:700;cursor:pointer;text-align:left}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-card{border-radius:var(--r);padding:14px;cursor:pointer;
  background:var(--bg2);border:0.5px solid var(--border);
  box-shadow:var(--shadow-sm);transition:transform .15s;position:relative;overflow:hidden}
.cat-card:active{transform:scale(.97)}
.cat-card-inner{padding-bottom:30px}
.cat-icon{font-size:20px;margin-bottom:6px;line-height:1}
.cat-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.cat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.cat-accent{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.cat-quick-btn{position:absolute;bottom:0;left:0;right:0;background:var(--bg3);
  border:none;border-top:0.5px solid var(--border);padding:6px;
  font-size:10px;font-weight:700;cursor:pointer;text-align:center}
.cat-done-lbl{position:absolute;bottom:0;left:0;right:0;background:var(--greenbg);
  padding:5px;font-size:10px;font-weight:700;color:var(--green);text-align:center;
  border-top:0.5px solid var(--border)}
.level-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:99px;
  font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.lv1{background:#EFF6FF;color:#1D4ED8}.lv2{background:#FFFBEB;color:#B45309}.lv3{background:#FDF4FF;color:#7E22CE}
.bank-item{background:var(--bg2);border-radius:var(--rsm);padding:13px 14px;
  margin-bottom:8px;border:0.5px solid var(--border);position:relative;box-shadow:var(--shadow-sm)}
.bank-en{font-size:14px;font-weight:600;padding-right:54px;line-height:1.4;color:var(--text)}
.bank-fr{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.bank-note{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic;line-height:1.4}
.add-btn{position:absolute;top:12px;right:12px;background:var(--brand);color:#fff;
  border:none;border-radius:99px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer}
.add-btn.done{background:var(--bg3);color:var(--text3);cursor:default}
.locked-item{filter:blur(3px);pointer-events:none;opacity:.5}
.locked-section{text-align:center;padding:16px;background:var(--bg2);
  border-radius:var(--r);border:1px dashed var(--border2);margin-top:10px;
  font-size:13px;color:var(--text3)}

/* MY WORDS */
.words-wrap{padding:20px 18px}
.theme-list{display:flex;flex-direction:column;gap:8px}
.theme-item{background:var(--bg2);border-radius:var(--r);padding:14px 16px;cursor:pointer;
  border:0.5px solid var(--border);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:13px;transition:transform .15s}
.theme-item:active{transform:scale(.98)}
.theme-emoji{width:40px;height:40px;border-radius:11px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.theme-info{flex:1;min-width:0}
.theme-name{font-size:14px;font-weight:700;color:var(--text)}
.theme-meta{font-size:12px;color:var(--text3);margin-top:2px}
.due-chip{display:inline-block;font-size:10px;padding:3px 8px;border-radius:99px;
  background:var(--redbg);color:var(--red);font-weight:700}
.ok-chip{display:inline-block;font-size:10px;padding:3px 8px;border-radius:99px;
  background:var(--greenbg);color:var(--green);font-weight:700}
.add-theme-btn{background:none;border:1.5px dashed var(--border2);border-radius:var(--r);
  padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);width:100%;font-weight:600;gap:8px}
.card-list{display:flex;flex-direction:column;gap:7px}
.card-item{background:var(--bg2);border-radius:var(--rsm);padding:12px 14px;
  display:flex;align-items:center;gap:10px;border:0.5px solid var(--border);box-shadow:var(--shadow-sm)}
.card-texts{flex:1;min-width:0}
.card-a{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-b{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-due{font-size:10px;color:var(--text3);margin-top:3px}
.del-btn{background:none;border:none;font-size:13px;color:var(--text3);padding:5px;cursor:pointer;flex-shrink:0}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none}
.search-box{width:100%;font-size:14px;padding:10px 14px 10px 38px;background:var(--bg2);
  border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);outline:none;font-family:inherit}
.search-box:focus{border-color:var(--brand)}
.form-box{background:var(--bg2);border-radius:var(--r);padding:18px;margin-bottom:16px;
  border:0.5px solid var(--border);box-shadow:var(--shadow-sm)}
.form-title{font-size:13px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;
  padding:11px 13px;background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--rsm);color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit}
.form-row textarea{height:56px;resize:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--brand)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.trans-row{display:flex;align-items:center;gap:8px}
.trans-row input{flex:1}
.trans-btn{background:var(--brand-light);color:var(--brand);border:1px solid var(--border2);
  border-radius:var(--rsm);padding:11px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.trans-result{font-size:12px;color:var(--brand);font-weight:600;padding:6px 10px;
  background:var(--brand-light);border-radius:var(--rxs);margin-top:5px;display:none}
.sum-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sum-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px}
.section-label{font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;
  display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:.5px;background:var(--border2)}

/* FAB */
.fab{position:fixed;bottom:calc(var(--sab) + 72px);right:18px;
  width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;
  font-size:26px;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(27,44,193,.35);
  display:flex;align-items:center;justify-content:center;z-index:100;
  transition:transform .15s}
.fab:active{transform:scale(.92)}

/* QUICK CAPTURE SHEET */
.qc-sheet{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.qc-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.qc-panel{position:relative;background:var(--bg2);border-radius:24px 24px 0 0;
  padding:20px 20px calc(20px + var(--sab));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.qc-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 18px}
.qc-title{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.qc-dir-row{display:flex;gap:8px;margin-bottom:14px}
.qc-dir-btn{flex:1;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px;
  font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center}
.qc-dir-btn.active{background:var(--brand-light);border-color:var(--brand);color:var(--brand)}
.qc-field{width:100%;font-size:16px;padding:13px 14px;background:var(--bg);
  border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);
  outline:none;font-family:inherit;margin-bottom:10px}
.qc-field:focus{border-color:var(--brand)}
.qc-trans-result{font-size:13px;color:var(--brand);font-weight:600;padding:8px 12px;
  background:var(--brand-light);border-radius:var(--rsm);margin-bottom:12px;display:none}
.qc-actions{display:flex;gap:8px}
.qc-btn-add{flex:1;background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);
  padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.qc-btn-cancel{background:var(--bg3);color:var(--text2);border:none;
  border-radius:var(--rsm);padding:14px 18px;font-size:14px;font-weight:600;cursor:pointer}

/* PLUS ONE ANIM */
.plus-one{position:fixed;font-size:18px;font-weight:800;color:var(--brand);
  pointer-events:none;z-index:9999;animation:floatUp .8s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.4)}}

/* STARS */
.stars span{font-size:11px}
</style>
</head>

{en:'To throw someone under the bus',fr:'Faire porter le chapeau à quelqu\'un',ctx:'"He threw his colleague under the bus."',lv:2},
{en:'To move the needle',fr:'Faire avancer les choses de façon significative',ctx:'"What will actually move the needle on our growth?"',lv:2},
{en:'To drop the ball',fr:'Laisser tomber / manquer à sa mission',ctx:'"We really dropped the ball on this delivery."',lv:2},
{en:'To be ahead of the curve',fr:'Avoir de l\'avance / être visionnaire',ctx:'"They were ahead of the curve on electric vehicles."',lv:2},
{en:'To burn the midnight oil',fr:'Travailler tard dans la nuit',ctx:'"We\'ve been burning the midnight oil to meet the deadline."',lv:2},
{en:'To let the cat out of the bag',fr:'Vendre la mèche',ctx:'"He let the cat out of the bag about the merger."',lv:2},
{en:'To weather the storm',fr:'Surmonter la tempête / tenir bon',ctx:'"We managed to weather the storm during the crisis."',lv:2},
{en:'To get cold feet',fr:'Avoir le trac / reculer au dernier moment',ctx:'"He got cold feet before signing the contract."',lv:2},
{en:'To jump the gun',fr:'Brûler les étapes / agir prématurément',ctx:'"We jumped the gun announcing the partnership."',lv:2},
{en:'To throw in the towel',fr:'Jeter l\'éponge / abandonner',ctx:'"After months of trying, they threw in the towel."',lv:2},
{en:'To push back',fr:'Résister / exprimer un désaccord',ctx:'"I\'m going to push back on that assumption."',lv:2},
{en:'To cut someone some slack',fr:'Être indulgent / laisser un peu de marge',ctx:'"Cut him some slack — it\'s his first week."',lv:2},
{en:'To take the bull by the horns',fr:'Prendre le taureau par les cornes',ctx:'"We need to take the bull by the horns."',lv:2},
{en:'To add fuel to the fire',fr:'Jeter de l\'huile sur le feu',ctx:'"His comments just added fuel to the fire."',lv:2},
// LV3 — idiomes sophistiqués, niveau natif
{en:'To cut to the chase',fr:'Aller droit au but',ctx:'"Let\'s cut to the chase — what\'s the real issue?"',lv:3},
{en:'To get the hang of something',fr:'Prendre le coup de main',ctx:'"It takes time but you\'ll get the hang of it."',lv:3},
{en:'To hit the nail on the head',fr:'Mettre le doigt dessus / toucher juste',ctx:'"You hit the nail on the head with that analysis."',lv:3},
{en:'To be on thin ice',fr:'Être sur un terrain glissant',ctx:'"He\'s on thin ice after missing the third deadline."',lv:3},
{en:'Once in a blue moon',fr:'Très rarement',ctx:'"We only see him once in a blue moon."',lv:3},
{en:'To give the benefit of the doubt',fr:'Accorder le bénéfice du doute',ctx:'"Give her the benefit of the doubt."',lv:3},
{en:'To stay in one\'s lane',fr:'Rester dans son domaine / ne pas empiéter',ctx:'"This is a legal matter — stay in your lane."',lv:3},
{en:'To read the room',fr:'Sentir l\'atmosphère / s\'adapter au contexte',ctx:'"You need to read the room before making that joke."',lv:3},
{en:'To open a can of worms',fr:'Ouvrir la boîte de Pandore',ctx:'"Bringing up budget now opens a can of worms."',lv:3},
{en:'To take something with a grain of salt',fr:'Prendre quelque chose avec des pincettes',ctx:'"Take his estimates with a grain of salt."',lv:3},
{en:'To keep one\'s cards close to one\'s chest',fr:'Jouer serré / ne pas dévoiler ses intentions',ctx:'"She kept her cards close to her chest in negotiations."',lv:3},
{en:'To have a lot on one\'s plate',fr:'Avoir beaucoup à gérer / être débordé',ctx:'"I can\'t take this on — I have a lot on my plate."',lv:3},
{en:'To be barking up the wrong tree',fr:'Faire fausse piste',ctx:'"If you think I\'m responsible, you\'re barking up the wrong tree."',lv:3},
{en:'To bite the hand that feeds you',fr:'Mordre la main qui te nourrit',ctx:'"Be careful — don\'t bite the hand that feeds you."',lv:3},
{en:'To steal someone\'s thunder',fr:'Voler la vedette / couper l\'herbe sous le pied',ctx:'"She stole my thunder by announcing it first."',lv:3},
{en:'To speak volumes',fr:'En dire long / être très révélateur',ctx:'"His silence spoke volumes."',lv:3},
{en:'To walk a fine line',fr:'Marcher sur des œufs / trouver un équilibre délicat',ctx:'"We\'re walking a fine line between honesty and diplomacy."',lv:3},
{en:'To separate the wheat from the chaff',fr:'Séparer le bon grain de l\'ivraie',ctx:'"The interview process helps separate the wheat from the chaff."',lv:3},

tenses:{label:'Temps & auxiliaires',icon:'⏱️',color:'#EAFAF1',tc:'#1a6b3a',cards:[
// LV1 — erreurs classiques des Français
{en:'I sent the report yesterday.',fr:'J\'ai envoyé le rapport hier.',ctx:'Simple past — moment précis dans le passé. JAMAIS "yesterday" + present perfect.',lv:1},
{en:'I\'ve already sent the report.',fr:'J\'ai déjà envoyé le rapport.',ctx:'Present perfect — résultat présent, sans moment précis.',lv:1},
{en:'They might be stuck in traffic.',fr:'Ils sont peut-être bloqués dans les embouteillages.',ctx:'Might = possibilité présente (incertitude).',lv:1},
{en:'You should call him back.',fr:'Tu devrais le rappeler.',ctx:'Should = conseil ou obligation morale légère.',lv:1},
{en:'I used to commute two hours a day.',fr:'Je faisais deux heures de trajet par jour autrefois.',ctx:'Used to = habitude passée révolue, n\'existe plus.',lv:1},
{en:'He must be in a meeting.',fr:'Il doit être en réunion.',ctx:'Must = déduction logique au présent.',lv:1},
{en:'Could you send me the file?',fr:'Pourriez-vous m\'envoyer le fichier ?',ctx:'Could = plus poli que "can" pour une demande.',lv:1},
{en:'I will call you tomorrow.',fr:'Je t\'appellerai demain.',ctx:'Will = promesse / décision spontanée au moment où on parle.',lv:1},
{en:'I\'m going to call him later.',fr:'Je vais l\'appeler plus tard.',ctx:'Going to = intention préalable / plan déjà décidé.',lv:1},
{en:'I\'ve just spoken to the client.',fr:'Je viens de parler au client.',ctx:'Present perfect + just = action très récente.',lv:1},
{en:'They\'ve been waiting for over an hour.',fr:'Ils attendent depuis plus d\'une heure.',ctx:'Present perfect continuous — durée en cours.',lv:1},
{en:'I was about to call you.',fr:'J\'allais justement t\'appeler.',ctx:'Was about to = sur le point de faire quelque chose.',lv:1},
// LV2 — structures intermédiaires mal maîtrisées
{en:'I\'ve been working on this for two hours.',fr:'Je travaille là-dessus depuis deux heures.',ctx:'Present perfect continuous — action commencée dans le passé et qui continue.',lv:2},
{en:'She had already left when I arrived.',fr:'Elle était déjà partie quand je suis arrivé.',ctx:'Past perfect — antériorité dans le passé.',lv:2},
{en:'If I were you, I\'d wait a bit longer.',fr:'À ta place, j\'attendrais encore un peu.',ctx:'Conditionnel 2 — conseil hypothétique. "Were" pour TOUTES les personnes.',lv:2},
{en:'You should have told me sooner.',fr:'Tu aurais dû me le dire plus tôt.',ctx:'Should have + pp = reproche ou regret sur le passé.',lv:2},
{en:'He must have missed his flight.',fr:'Il a dû rater son vol.',ctx:'Must have + pp = déduction sur le passé.',lv:2},
{en:'She could have handled it better.',fr:'Elle aurait pu mieux gérer ça.',ctx:'Could have + pp = possibilité non réalisée dans le passé.',lv:2},
{en:'I\'d rather you didn\'t mention it.',fr:'Je préférerais que tu n\'en parles pas.',ctx:'Would rather + sujet + past simple.',lv:2},
{en:'It\'s high time we made a decision.',fr:'Il est grand temps qu\'on prenne une décision.',ctx:'It\'s high time + past simple — urgence.',lv:2},
{en:'I wish I had more time.',fr:'J\'aimerais avoir plus de temps.',ctx:'Wish + past simple = souhait présent irréel.',lv:2},
{en:'I wish I had studied more.',fr:'J\'aurais aimé étudier davantage.',ctx:'Wish + past perfect = regret sur le passé.',lv:2},
{en:'He tends to overcomplicate things.',fr:'Il a tendance à trop compliquer les choses.',ctx:'Tend to = avoir tendance à (habitude neutre).',lv:2},
{en:'He\'ll be retiring next year.',fr:'Il prendra sa retraite l\'année prochaine.',ctx:'Will + continuous = futur presque certain, déjà prévu.',lv:2},
{en:'We should be seeing results within two weeks.',fr:'Nous devrions voir des résultats dans deux semaines.',ctx:'Should be + ing = attente raisonnée.',lv:2},
{en:'I\'m due to present the findings tomorrow.',fr:'Je suis censé présenter les conclusions demain.',ctx:'Be due to = prévu officiellement.',lv:2},
// LV3 — structures avancées
{en:'I would have called you if I\'d known.',fr:'Je t\'aurais appelé si j\'avais su.',ctx:'Conditionnel 3 — irréel du passé. If + past perfect / would have + pp.',lv:3},
{en:'By the end of the year, we\'ll have launched three products.',fr:'D\'ici fin d\'année, nous aurons lancé trois produits.',ctx:'Future perfect — action achevée avant un moment futur.',lv:3},
{en:'I\'m having the document reviewed.',fr:'Je fais relire le document.',ctx:'Have something done = faire faire par quelqu\'un d\'autre.',lv:3},
{en:'He\'s bound to make mistakes at first.',fr:'Il va forcément faire des erreurs au début.',ctx:'Be bound to = certitude / inévitabilité.',lv:3},
{en:'I can\'t help feeling that something is wrong.',fr:'Je ne peux pas m\'empêcher de sentir que quelque chose ne va pas.',ctx:'Can\'t help + gerund = ne pas pouvoir s\'empêcher de.',lv:3},
{en:'Unless I\'m mistaken, the deadline is Friday.',fr:'Sauf erreur de ma part, la date limite est vendredi.',ctx:'Unless = sauf si / à moins que.',lv:3},
{en:'Had I known earlier, I would have acted differently.',fr:'Si j\'avais su plus tôt, j\'aurais agi différemment.',ctx:'Inversion conditionnelle — structure avancée sans "if".',lv:3},
{en:'The report is to be submitted by Friday.',fr:'Le rapport doit être soumis avant vendredi.',ctx:'Is to be = obligation formelle / instruction officielle.',lv:3},
{en:'He is said to be the best in the field.',fr:'On dit qu\'il est le meilleur dans le domaine.',ctx:'Is said to be = on dit que / il est réputé.',lv:3},
{en:'I\'d sooner resign than do that.',fr:'Je préférerais démissionner plutôt que de faire ça.',ctx:'Would sooner = préférence forte (registre soutenu).',lv:3},
{en:'Were it not for your help, we would have failed.',fr:'N\'eût été votre aide, nous aurions échoué.',ctx:'Were it not for = sans / n\'eût été. Très formel.',lv:3},
{en:'No sooner had she arrived than the problems started.',fr:'À peine était-elle arrivée que les problèmes ont commencé.',ctx:'No sooner… than = à peine… que. Structure inversée.',lv:3},

,{en:"I have been working on this project for three months.",fr:"Je travaille sur ce projet depuis trois mois.",ctx:"Present Perfect Continuous — action qui a commencé dans le passé et continue maintenant.",lv:1},
{en:"By the time you arrive, I will have finished the report.",fr:"Quand tu arriveras, j'aurai terminé le rapport.",ctx:"Future Perfect — action qui sera accomplie avant un moment futur.",lv:2},
{en:"If I had known earlier, I would have acted differently.",fr:"Si j'avais su plus tôt, j'aurais agi différemment.",ctx:"Conditionnel passé (3e type) — hypothèse sur le passé.",lv:3},
{en:"She had already left when I called.",fr:"Elle était déjà partie quand j'ai appelé.",ctx:"Past Perfect — action antérieure à une autre action passée.",lv:2},
{en:"We were discussing the budget when the CEO walked in.",fr:"Nous discutions du budget quand le PDG est entré.",ctx:"Past Continuous + Simple Past — action interrompue.",lv:2},
{en:"He has been the manager since 2020.",fr:"Il est directeur depuis 2020.",ctx:"Present Perfect — situation qui a commencé dans le passé et est toujours vraie.",lv:1},
{en:"I would call them if I had their number.",fr:"Je les appellerais si j'avais leur numéro.",ctx:"Conditionnel présent (2e type) — hypothèse irréelle.",lv:2},
{en:"You should have told me sooner.",fr:"Tu aurais dû me le dire plus tôt.",ctx:"Should have + PP — reproche sur le passé.",lv:2},
{en:"The meeting is going to start in five minutes.",fr:"La réunion va commencer dans cinq minutes.",ctx:"Going to — futur proche planifié.",lv:1},
{en:"I will call you when I get the information.",fr:"Je t'appellerai quand j'aurai l'information.",ctx:"Future Simple — attention: 'when' + présent en anglais, pas futur.",lv:2},
{en:"They might delay the shipment.",fr:"Ils pourraient retarder l'expédition.",ctx:"Might — probabilité faible ou incertitude.",lv:1},
{en:"You must submit the report by Friday.",fr:"Tu dois soumettre le rapport avant vendredi.",ctx:"Must — obligation forte.",lv:1},
{en:"You don't have to attend the meeting.",fr:"Tu n'es pas obligé d'assister à la réunion.",ctx:"Don't have to — absence d'obligation (≠ must not).",lv:2},
{en:"You mustn't share this information.",fr:"Tu ne dois pas partager cette information.",ctx:"Must not — interdiction formelle.",lv:2},
{en:"I used to travel a lot for work.",fr:"Je voyageais beaucoup pour le travail auparavant.",ctx:"Used to — habitude révolue dans le passé.",lv:1},
{en:"Could you send me the file?",fr:"Pourriez-vous m'envoyer le fichier ?",ctx:"Could — demande polie (plus formal que 'can').",lv:1},
{en:"I should have prepared better.",fr:"J'aurais dû mieux me préparer.",ctx:"Should have — regret ou autocritique.",lv:2},
{en:"The results may vary.",fr:"Les résultats peuvent varier.",ctx:"May — possibilité formelle.",lv:1},
{en:"Had we invested earlier, we would be profitable now.",fr:"Si nous avions investi plus tôt, nous serions rentables maintenant.",ctx:"Conditionnel mixte — passé hypothétique avec conséquence présente.",lv:3},
{en:"She will have been with the company for ten years next month.",fr:"Ça fera dix ans qu'elle est dans l'entreprise le mois prochain.",ctx:"Future Perfect Continuous — durée jusqu'à un point futur.",lv:3},
{en:"I didn't use to like public speaking.",fr:"Je n'aimais pas parler en public avant.",ctx:"Didn't use to — habitude passée négative.",lv:2},
{en:"He's always losing his keys.",fr:"Il perd toujours ses clés.",ctx:"Present Continuous — comportement irritant répété (avec always).",lv:2},
{en:"The report was being reviewed when the crisis hit.",fr:"Le rapport était en cours de révision quand la crise a éclaté.",ctx:"Past Continuous Passive — action passive interrompue.",lv:3},
{en:"I'd rather you didn't mention this in the meeting.",fr:"Je préférerais que tu n'en parles pas en réunion.",ctx:"Would rather + passé — préférence sur une situation présente/future.",lv:3}
,{en:"I've just finished the report.",fr:"Je viens de terminer le rapport.",ctx:"Present Perfect — action très récente, impact présent.",lv:1},
{en:"We've been trying to reach you all morning.",fr:"Nous essayons de vous joindre depuis ce matin.",ctx:"Present Perfect Continuous — durée jusqu'à maintenant.",lv:2},
{en:"The project will have been running for two years by June.",fr:"Le projet aura duré deux ans en juin.",ctx:"Future Perfect Continuous.",lv:3},
{en:"I was about to call you when you walked in.",fr:"J'étais sur le point de vous appeler quand vous êtes entré.",ctx:"Was about to — action imminente interrompue.",lv:2},
{en:"It's high time we addressed this issue.",fr:"Il est grand temps que nous traitions ce problème.",ctx:"It's high time + past subj — urgence.",lv:3},
{en:"Suppose we increased the budget, what would change?",fr:"Supposons que nous augmentions le budget, qu'est-ce qui changerait?",ctx:"Suppose + past — hypothèse formelle.",lv:3},
{en:"I'd rather we met in person.",fr:"Je préférerais qu'on se voie en personne.",ctx:"Would rather + past — préférence sur situation future.",lv:3},
{en:"Were I in your position, I'd do the same.",fr:"Si j'étais à votre place, je ferais pareil.",ctx:"Were I — conditionnel formel sans 'if'.",lv:3},
{en:"No sooner had we launched than the issues started.",fr:"À peine avions-nous lancé que les problèmes ont commencé.",ctx:"No sooner had — séquence immédiate au passé.",lv:3},
{en:"I've never seen such a rapid improvement.",fr:"Je n'ai jamais vu une amélioration aussi rapide.",ctx:"Present Perfect + never — expérience de vie.",lv:1},
{en:"They would often work late during crunch time.",fr:"Ils travaillaient souvent tard en période de rush.",ctx:"Would — habitude passée (registre plus soutenu que 'used to').",lv:2},
{en:"The contract is to be signed by Friday.",fr:"Le contrat doit être signé avant vendredi.",ctx:"Be to — obligation formelle planifiée.",lv:2},
{en:"She is known to be an expert in the field.",fr:"Elle est reconnue comme experte dans le domaine.",ctx:"Is known to — réputation établie.",lv:2}]},
faux:{label:'Faux amis & pièges',icon:'⚠️',color:'#FDF0EF',tc:'#8b2020',cards:[
// LV1 — faux amis ultra-courants
{en:'Actually',fr:'En fait / En réalité',ctx:'≠ Actuellement → currently / nowadays. Erreur très fréquente.',lv:1},
{en:'Eventually',fr:'Finalement / À terme',ctx:'≠ Éventuellement → possibly / if need be. Piège classique.',lv:1},
{en:'Currently',fr:'Actuellement / En ce moment',ctx:'≠ Couramment → fluently.',lv:1},
{en:'Library',fr:'Bibliothèque',ctx:'≠ Librairie → bookshop / bookstore.',lv:1},
{en:'Attend',fr:'Assister à / Être présent',ctx:'≠ Attendre → to wait.',lv:1},
{en:'Demand',fr:'Exiger (avec insistance)',ctx:'≠ Demander → to ask. Demand est très direct en anglais.',lv:1},
{en:'Pretend',fr:'Faire semblant',ctx:'≠ Prétendre → to claim / to argue.',lv:1},
{en:'Sensible',fr:'Raisonnable / Judicieux',ctx:'≠ Sensible → sensitive.',lv:1},
{en:'Comprehensive',fr:'Complet / Exhaustif',ctx:'≠ Compréhensible → understandable.',lv:1},
{en:'Assist',fr:'Aider / Assister',ctx:'≠ Assister à → to attend.',lv:1},
{en:'Agenda',fr:'Ordre du jour',ctx:'≠ Agenda (planning) → schedule. "What\'s on the agenda?"',lv:1},
{en:'Delay',fr:'Retard',ctx:'≠ Délai → deadline / timeframe. Attention : "delay" est toujours négatif.',lv:1},
{en:'Realize',fr:'Se rendre compte',ctx:'≠ Réaliser (faire/accomplir) → to carry out / to achieve.',lv:1},
{en:'Lecture',fr:'Cours magistral / Conférence',ctx:'≠ Lecture (fr = action de lire) → reading.',lv:1},
{en:'Phrase',fr:'Expression / Tournure',ctx:'≠ Phrase (fr) → sentence.',lv:1},
// LV2 — faux amis intermédiaires
{en:'Sympathetic',fr:'Compatissant / Compréhensif',ctx:'≠ Sympathique → nice / likeable.',lv:2},
{en:'Issue',fr:'Problème / Point à traiter',ctx:'Issue (fr) = outcome en anglais. "We have an issue" ≠ "we have an outcome".',lv:2},
{en:'Consistent',fr:'Cohérent / Régulier',ctx:'≠ Consistant → substantial / thick.',lv:2},
{en:'Efficient',fr:'Efficace (pour un système)',ctx:'Efficace (pour une personne) → effective. Nuance importante.',lv:2},
{en:'Voyage',fr:'Périple long / voyage en mer',ctx:'Voyage (fr) = trip / journey. En anglais très spécifique.',lv:2},
{en:'College',fr:'Université / Établissement supérieur',ctx:'Collège (fr) → middle school. "He\'s at college" = il est à la fac.',lv:2},
{en:'Formidable',fr:'Redoutable / Impressionnant',ctx:'En français = excellent. En anglais = intimidant / impressionnant (pas forcément positif).',lv:2},
{en:'Gentle',fr:'Doux / Délicat',ctx:'≠ Gentil → kind / nice.',lv:2},
{en:'Important',fr:'Important / Significatif',ctx:'≠ Important (gros) → large / big.',lv:2},
{en:'Argument',fr:'Argument / Raisonnement',ctx:'≠ Argument (dispute) → quarrel / disagreement.',lv:2},
{en:'Concentration',fr:'Concentration (attention)',ctx:'≠ Concentration (entreprise) → merger / consolidation.',lv:2},
{en:'Proper',fr:'Approprié / Véritable',ctx:'≠ Propre → clean. "A proper solution."',lv:2},
{en:'Responsible',fr:'Responsable (accountable)',ctx:'≠ Responsable (personne en charge) → person in charge / manager.',lv:2},
// LV3 — faux amis subtils
{en:'Brave',fr:'Courageux',ctx:'≠ Brave (fr) = kind/good → "a brave decision."',lv:3},
{en:'Inconvenient',fr:'Peu pratique / Mal tombé',ctx:'≠ Inconvénient → drawback.',lv:3},
{en:'Résumé',fr:'CV',ctx:'≠ Résumé (fr) → summary.',lv:3},
{en:'Deception',fr:'Tromperie / Mensonge',ctx:'≠ Déception → disappointment.',lv:3},
{en:'Commodity',fr:'Matière première / produit de base',ctx:'≠ Commodité → convenience / comfort.',lv:3},
{en:'Sensibility',fr:'Sensibilité artistique / discernement',ctx:'≠ Sensibilité (émotionnelle) → sensitivity.',lv:3},
{en:'Sympathize',fr:'Comprendre / Compatir',ctx:'≠ Sympathiser → to get along with.',lv:3},
{en:'Chance',fr:'Hasard / Occasion',ctx:'"By chance" = par hasard. La chance (bonne fortune) = luck.',lv:3},
{en:'Misery',fr:'Souffrance / Détresse',ctx:'≠ Misère → poverty.',lv:3},
{en:'Particular',fr:'Spécifique / Précis',ctx:'Particulier (bizarre) → peculiar.',lv:3},
{en:'Distraction',fr:'Source d\'inattention',ctx:'≠ Distraction (divertissement) → entertainment / leisure.',lv:3},
{en:'Formation',fr:'Formation / Entraînement',ctx:'Training en anglais pro. "Formation" existe mais très formel.',lv:3},

,{en:"Actually (≠ actuellement)",fr:"En fait / En réalité (PAS 'actuellement' = currently)",ctx:"Faux ami classique.",lv:1},
{en:"Eventually (≠ éventuellement)",fr:"Finalement / À terme (PAS 'éventuellement' = possibly)",ctx:"Faux ami très fréquent.",lv:1},
{en:"Sensible (≠ sensible)",fr:"Raisonnable / Judicieux (PAS 'sensible' = sensitive)",ctx:"Attention au doublon.",lv:1},
{en:"Pretend (≠ prétendre)",fr:"Faire semblant (PAS 'prétendre' = to claim)",ctx:"Faux ami courant.",lv:1},
{en:"Attend (≠ attendre)",fr:"Assister à (PAS 'attendre' = to wait)",ctx:"Faux ami très fréquent.",lv:1},
{en:"Chance (≠ chance)",fr:"Hasard / Probabilité (la 'chance' = luck = 'good luck')",ctx:"Nuance importante.",lv:2},
{en:"Demand (≠ demander)",fr:"Exiger (PAS 'demander' = to ask)",ctx:"Registre plus fort.",lv:1},
{en:"Large (≠ large)",fr:"Grand / Énorme (PAS 'large' = wide)",ctx:"Taille ≠ largeur.",lv:1},

travel:{label:'Voyage & quotidien',icon:'✈️',color:'#F0EAF8',tc:'#4a1a7a',cards:[
// LV1 — situations de base
{en:'Is this seat taken?',fr:'Cette place est-elle prise ?',ctx:'Dans un train, avion, café.',lv:1},
{en:'Can I get the bill, please?',fr:'L\'addition, s\'il vous plaît.',ctx:'"Check, please" aux États-Unis.',lv:1},
{en:'I\'d like to check in, please.',fr:'Je voudrais m\'enregistrer, s\'il vous plaît.',ctx:'Aéroport / hôtel.',lv:1},
{en:'I\'m just browsing, thank you.',fr:'Je regarde juste, merci.',ctx:'Pour éviter un vendeur insistant.',lv:1},
{en:'Do you accept card payments?',fr:'Acceptez-vous les paiements par carte ?',ctx:'Partout dans le monde.',lv:1},
{en:'How long is the wait?',fr:'Combien de temps faut-il attendre ?',ctx:'Restaurant, administration.',lv:1},
{en:'I\'m here on a business trip.',fr:'Je suis là pour un voyage d\'affaires.',ctx:'À l\'aéroport, à la douane.',lv:1},
{en:'Carry-on luggage',fr:'Bagage à main / bagage cabine',ctx:'≠ Checked luggage = bagage en soute.',lv:1},
{en:'Round trip',fr:'Aller-retour',ctx:'≠ One-way = aller simple.',lv:1},
{en:'Could you call me a cab, please?',fr:'Pourriez-vous m\'appeler un taxi ?',ctx:'Hôtel.',lv:1},
{en:'What time does check-out start?',fr:'À partir de quelle heure commence le départ ?',ctx:'Check-out = départ de l\'hôtel.',lv:1},
{en:'What\'s the local emergency number?',fr:'Quel est le numéro d\'urgence local ?',ctx:'Essentiel à l\'étranger.',lv:1},
{en:'Could you recommend a good restaurant nearby?',fr:'Pourriez-vous recommander un bon restaurant à proximité ?',ctx:'Hôtel / auprès d\'un local.',lv:1},
// LV2 — situations intermédiaires
{en:'My luggage didn\'t make it.',fr:'Mes bagages ne sont pas arrivés.',ctx:'"Make it" = arriver à destination.',lv:2},
{en:'I have a connecting flight in two hours.',fr:'J\'ai une correspondance dans deux heures.',ctx:'Connecting flight = vol avec correspondance.',lv:2},
{en:'Is the tip included?',fr:'Le pourboire est-il inclus ?',ctx:'Essentiel aux États-Unis où le service n\'est pas inclus.',lv:2},
{en:'I think there\'s a mistake on the bill.',fr:'Je crois qu\'il y a une erreur sur l\'addition.',ctx:'Poliment mais clairement.',lv:2},
{en:'I\'d like a window seat if possible.',fr:'Je voudrais un siège côté hublot si possible.',ctx:'Window seat ≠ aisle seat (côté couloir).',lv:2},
{en:'Could I have a wake-up call at 6am?',fr:'Pouvez-vous me réveiller à 6h ?',ctx:'Hôtel.',lv:2},
{en:'I\'d like to extend my stay by one night.',fr:'Je voudrais prolonger mon séjour d\'une nuit.',ctx:'Hôtel.',lv:2},
{en:'Overbooked',fr:'Surbooké',ctx:'"The flight is overbooked." = plus de passagers que de sièges.',lv:2},
{en:'Layover',fr:'Escale (avec attente)',ctx:'"A 3-hour layover in Dubai."',lv:2},
{en:'I need to change my return flight.',fr:'Je dois modifier mon vol retour.',ctx:'Return flight = vol retour.',lv:2},
{en:'Is there a shuttle service to the airport?',fr:'Y a-t-il une navette pour l\'aéroport ?',ctx:'Shuttle = navette.',lv:2},
{en:'The exchange rate is not great right now.',fr:'Le taux de change n\'est pas terrible en ce moment.',ctx:'Utile pour négocier ou expliquer.',lv:2},
{en:'Can I store my luggage here until my room is ready?',fr:'Puis-je laisser mes bagages ici jusqu\'à ce que ma chambre soit prête ?',ctx:'Hôtel — arrivée anticipée.',lv:2},
{en:'In the event of a delay, please notify us immediately.',fr:'Dans le cas d\'un retard, veuillez nous en informer immédiatement.',ctx:'In the event of = dans le cas où / en cas de.',lv:2},
// LV3 — situations avancées / registre soutenu
{en:'I\'ll have whatever you recommend.',fr:'Je prendrai ce que vous recommandez.',ctx:'Excellent pour montrer de la confiance.',lv:3},
{en:'I\'d like to flag an issue with my room.',fr:'Je voudrais signaler un problème avec ma chambre.',ctx:'Flag = signaler formellement. Plus poli que "there\'s a problem".',lv:3},
{en:'Could you point me in the direction of…?',fr:'Pourriez-vous m\'indiquer la direction de… ?',ctx:'Plus naturel que "where is".',lv:3},
{en:'I\'m afraid I won\'t be able to make the reservation.',fr:'Je crains de ne pas pouvoir honorer la réservation.',ctx:'Pour annuler poliment.',lv:3},
{en:'Is there any chance of an upgrade?',fr:'Y aurait-il une possibilité de surclassement ?',ctx:'Hôtel / avion. Formulé comme une question ouverte.',lv:3},
{en:'I\'d like to lodge a complaint.',fr:'Je voudrais déposer une réclamation.',ctx:'Lodge a complaint = formuler une plainte officielle.',lv:3},
{en:'The flight has been diverted to another airport.',fr:'Le vol a été dérouté vers un autre aéroport.',ctx:'Diverted = dérouté.',lv:3},
{en:'Is there a non-stop flight or will there be a stopover?',fr:'Y a-t-il un vol direct ou y aura-t-il une escale ?',ctx:'Non-stop = sans escale. "Direct" peut avoir une escale aux USA.',lv:3},
{en:'I\'d rather not be seated next to the galley.',fr:'Je préférerais ne pas être assis près de la cuisine.',ctx:'Galley = cuisine dans un avion.',lv:3},
{en:'I\'m a frequent flyer with your airline.',fr:'Je suis membre du programme fidélité de votre compagnie.',ctx:'Frequent flyer = voyageur régulier.',lv:3},

,{en:"I travel frequently for work.",fr:"Je voyage fréquemment pour le travail.",ctx:"Profil de voyageur pro.",lv:1},
{en:"My flight was delayed.",fr:"Mon vol a été retardé.",ctx:"Situation classique.",lv:1},
{en:"I'm a frequent flyer.",fr:"Je suis un voyageur fréquent.",ctx:"Statut aérien.",lv:1},
{en:"I prefer the aisle seat.",fr:"Je préfère le siège côté couloir.",ctx:"En avion.",lv:1},
{en:"The hotel is fully booked.",fr:"L'hôtel est complet.",ctx:"Problème de réservation.",lv:1},
{en:"I need to change my connecting flight.",fr:"Je dois changer ma correspondance.",ctx:"Voyage avec escale.",lv:2},
{en:"The conference is held annually.",fr:"La conférence a lieu annuellement.",ctx:"Événement récurrent.",lv:1},
{en:"I need a visa for this destination.",fr:"J'ai besoin d'un visa pour cette destination.",ctx:"Formalités.",lv:1},
{en:"The jet lag is brutal.",fr:"Le décalage horaire est brutal.",ctx:"Voyages longs courriers.",lv:1},
{en:"I'm on a tight schedule.",fr:"Mon emploi du temps est très chargé.",ctx:"Voyageur pro.",lv:2},
{en:"I need to expense this.",fr:"Je dois faire rembourser ceci.",ctx:"Note de frais.",lv:2},
{en:"The culture is very different here.",fr:"La culture est très différente ici.",ctx:"Observation interculturelle.",lv:1}]},
natural:{label:'Tournures naturelles',icon:'✨',color:'#F2F2F0',tc:'#2a2a2a',cards:[
// LV1 — tournures très courantes mal connues
{en:'That works for me.',fr:'Ça me va.',ctx:'≠ "It\'s okay" trop hésitant. Confirme clairement.',lv:1},
{en:'I\'ll keep you posted.',fr:'Je te tiens au courant.',ctx:'Keep someone posted = informer régulièrement.',lv:1},
{en:'It slipped my mind.',fr:'Ça m\'était sorti de la tête.',ctx:'≠ "I forgot" trop direct.',lv:1},
{en:'I\'m swamped at the moment.',fr:'Je suis débordé en ce moment.',ctx:'Swamped = submergé de travail.',lv:1},
{en:'How does that sound?',fr:'Qu\'est-ce que tu en penses ? Ça te va ?',ctx:'Pour clore une proposition et demander validation.',lv:1},
{en:'Don\'t hesitate to reach out.',fr:'N\'hésite pas à me contacter.',ctx:'Reach out = contacter. Formule de clôture email.',lv:1},
{en:'Something came up on my end.',fr:'Il s\'est passé quelque chose de mon côté.',ctx:'Pour expliquer un retard sans entrer dans les détails.',lv:1},
{en:'Let me get back to you on that.',fr:'Je reviens vers toi là-dessus.',ctx:'≠ "I will think about it" trop vague.',lv:1},
{en:'I appreciate you letting me know.',fr:'Merci de m\'avoir prévenu.',ctx:'≠ "Thank you for the information" trop froid.',lv:1},
{en:'I hear you.',fr:'Je comprends ce que tu veux dire.',ctx:'Exprime l\'empathie / la compréhension. ≠ "Je t\'entends".',lv:1},
{en:'Fair enough.',fr:'C\'est juste. / D\'accord.',ctx:'Pour concéder un point de façon décontractée.',lv:1},
{en:'What\'s your take on this?',fr:'Quel est ton avis là-dessus ?',ctx:'Take = point de vue / opinion.',lv:1},
{en:'That makes sense.',fr:'Ça a du sens. / Je comprends.',ctx:'Pour valider un raisonnement.',lv:1},
{en:'To be fair…',fr:'Pour être juste… / Soyons honnêtes…',ctx:'Pour nuancer une critique.',lv:1},
{en:'That\'s worth looking into.',fr:'Ça vaut la peine d\'y jeter un œil.',ctx:'Pour exprimer un intérêt modéré.',lv:1},
// LV2 — tournures professionnelles élaborées
{en:'I\'m not sure I follow — could you elaborate?',fr:'Je ne suis pas sûr de suivre — tu peux développer ?',ctx:'≠ "I don\'t understand" trop abrupt.',lv:2},
{en:'I was wondering if you\'d had a chance to look at this.',fr:'Je me demandais si tu avais eu l\'occasion de regarder ça.',ctx:'Relance polie. ≠ "Did you see my email?" trop direct.',lv:2},
{en:'Just to make sure we\'re on the same page…',fr:'Juste pour qu\'on soit bien alignés…',ctx:'Pour reformuler et confirmer la compréhension.',lv:2},
{en:'I\'d push back on that a little.',fr:'Je nuancerais ça légèrement.',ctx:'Désaccord poli. Push back = résister / questionner.',lv:2},
{en:'It\'s a bit of a grey area.',fr:'C\'est un peu flou / dans une zone grise.',ctx:'Pour indiquer qu\'il n\'y a pas de réponse claire.',lv:2},
{en:'I\'m not in a position to commit to that right now.',fr:'Je ne suis pas en mesure de m\'engager là-dessus.',ctx:'Refus professionnel poli sans fermer la porte.',lv:2},
{en:'That\'s not really my call to make.',fr:'Ce n\'est pas vraiment à moi de décider ça.',ctx:'Pour renvoyer une décision à qui de droit.',lv:2},
{en:'Can we take a step back?',fr:'Peut-on prendre un peu de recul ?',ctx:'Pour recadrer une discussion qui dérive.',lv:2},
{en:'That\'s a fair point.',fr:'C\'est un point valable.',ctx:'Pour concéder sans tout abandonner.',lv:2},
{en:'I\'ll take your word for it.',fr:'Je te crois sur parole.',ctx:'Accord sans vérification.',lv:2},
{en:'We\'ll have to play it by ear.',fr:'On verra au fur et à mesure.',ctx:'Play it by ear = improviser selon la situation.',lv:2},
{en:'It\'s not that I don\'t want to — I just can\'t right now.',fr:'Ce n\'est pas que je ne veux pas — je ne peux pas là.',ctx:'Pour refuser sans vexer.',lv:2},
{en:'Broadly speaking…',fr:'En termes généraux… / Grosso modo…',ctx:'Pour introduire une généralité.',lv:2},
{en:'Off the top of my head…',fr:'Comme ça de mémoire / sans vérifier…',ctx:'Pour donner une réponse approximative.',lv:2},
{en:'To put it bluntly…',fr:'Pour le dire sans détour…',ctx:'Pour annoncer quelque chose de direct.',lv:2},
{en:'That\'s beside the point.',fr:'C\'est hors sujet.',ctx:'Pour recentrer une conversation qui dévie.',lv:2},
{en:'I\'ll have to get back to you on the specifics.',fr:'Je devrai te revenir sur les détails.',ctx:'Pour ne pas s\'engager sans vérifier.',lv:2},
{en:'With that in mind…',fr:'En gardant cela à l\'esprit…',ctx:'Pour enchaîner sur une conséquence logique.',lv:2},
// LV3 — tournures de haut niveau
{en:'I might be wrong, but…',fr:'Je me trompe peut-être, mais…',ctx:'Introduire une opinion avec précaution (très anglais).',lv:3},
{en:'All things considered…',fr:'Tout bien réfléchi / Dans l\'ensemble…',ctx:'Pour conclure en tenant compte de tout.',lv:3},
{en:'At the end of the day…',fr:'En fin de compte…',ctx:'Très courant à l\'oral pour conclure.',lv:3},
{en:'I\'d be remiss not to mention…',fr:'Je manquerais à mon devoir si je ne mentionnais pas…',ctx:'Formule élégante pour soulever un point important.',lv:3},
{en:'I\'m going to have to level with you.',fr:'Je vais devoir être honnête avec toi.',ctx:'Level with someone = parler franchement.',lv:3},
{en:'Let\'s not beat around the bush.',fr:'Ne tournons pas autour du pot.',ctx:'Beat around the bush = éviter le sujet principal.',lv:3},
{en:'Let me caveat that by saying…',fr:'Je nuancerai cela en disant…',ctx:'Caveat = réserve / mise en garde. Très courant en business.',lv:3},
{en:'I\'d be inclined to agree.',fr:'Je serais enclin à être d\'accord.',ctx:'Formulation prudente pour exprimer un accord partiel.',lv:3},
{en:'Let\'s not lose sight of the bigger picture.',fr:'Ne perdons pas de vue la vue d\'ensemble.',ctx:'Bigger picture = vision globale / objectif général.',lv:3},
{en:'I defer to your judgment on this.',fr:'Je m\'en remets à ton jugement sur ce point.',ctx:'Defer to = s\'en remettre à.',lv:3},
{en:'That\'s a moot point.',fr:'C\'est un point discutable / sans objet.',ctx:'Moot point = point sans importance ou très débattu.',lv:3},
{en:'With all due respect…',fr:'Avec tout le respect que je vous dois…',ctx:'Précède souvent un désaccord fort.',lv:3},

,{en:"That makes sense.",fr:"Ça a du sens. / Je comprends.",ctx:"Pour confirmer qu'on a compris.",lv:1},
{en:"Fair enough.",fr:"C'est juste. / D'accord.",ctx:"Pour accepter un argument.",lv:1},
{en:"Bear with me.",fr:"Soyez patient avec moi.",ctx:"Pour demander un peu de patience.",lv:1},
{en:"To be honest with you...",fr:"Pour être honnête avec vous...",ctx:"Pour introduire une opinion franche.",lv:1},
{en:"That's a good point.",fr:"C'est un bon point.",ctx:"Pour valider une remarque.",lv:1},
{en:"I see where you're coming from.",fr:"Je comprends d'où vous venez.",ctx:"Pour montrer de l'empathie.",lv:2},
{en:"It depends on...",fr:"Ça dépend de...",ctx:"Pour nuancer une réponse.",lv:1},
{en:"Let me think about that.",fr:"Laissez-moi y réfléchir.",ctx:"Pour prendre du temps sans rejeter.",lv:1},
{en:"To put it simply...",fr:"Pour le dire simplement...",ctx:"Pour reformuler de façon claire.",lv:1},
{en:"In other words...",fr:"En d'autres termes...",ctx:"Pour reformuler.",lv:1},
{en:"Having said that...",fr:"Cela dit...",ctx:"Pour introduire une nuance.",lv:2},
{en:"At the end of the day...",fr:"En fin de compte...",ctx:"Pour conclure.",lv:1},
{en:"As far as I'm concerned...",fr:"En ce qui me concerne...",ctx:"Pour exprimer son point de vue.",lv:1},
{en:"If you ask me...",fr:"Si vous voulez mon avis...",ctx:"Pour introduire une opinion.",lv:1},
{en:"Don't get me wrong.",fr:"Ne vous méprenez pas sur mes intentions.",ctx:"Pour éviter une mauvaise interprétation.",lv:2},
{en:"Let's not beat around the bush.",fr:"N'y allons pas par quatre chemins.",ctx:"Pour parler directement.",lv:2},
{en:"I stand corrected.",fr:"Je reconnais mon erreur.",ctx:"Pour admettre gracieusement qu'on avait tort.",lv:2},
{en:"That's beside the point.",fr:"Ce n'est pas là l'essentiel.",ctx:"Pour recentrer la discussion.",lv:2},
{en:"To cut a long story short...",fr:"Pour faire court...",ctx:"Pour résumer rapidement.",lv:1},
{en:"Off the top of my head...",fr:"Comme ça, sans réfléchir...",ctx:"Pour donner une réponse approximative immédiate.",lv:2}
,{en:"That's a tough call.",fr:"C'est une décision difficile.",ctx:"Dilemme.",lv:1},
{en:"I'll take your word for it.",fr:"Je vous crois sur parole.",ctx:"Confiance sans vérification.",lv:2},
{en:"Better safe than sorry.",fr:"Mieux vaut prévenir que guérir.",ctx:"Précaution.",lv:1},
{en:"You've got a point there.",fr:"Vous avez un bon point là.",ctx:"Accord partiel.",lv:1},
{en:"Let's not jump to conclusions.",fr:"Ne tirons pas de conclusions hâtives.",ctx:"Prudence analytique.",lv:1},
{en:"It goes both ways.",fr:"Ça marche dans les deux sens.",ctx:"Réciprocité.",lv:1},
{en:"I stand by my decision.",fr:"Je maintiens ma décision.",ctx:"Fermeté assumée.",lv:2},
{en:"That's a lot to take in.",fr:"C'est beaucoup à assimiler.",ctx:"Information complexe.",lv:1},
{en:"Bear that in mind.",fr:"Gardez cela à l'esprit.",ctx:"Pour ne pas oublier un point.",lv:1},
{en:"I'll take it from here.",fr:"Je prends le relais.",ctx:"Pour reprendre la main.",lv:2},
{en:"You're preaching to the choir.",fr:"Vous prêchez un convaincu.",ctx:"Accord total.",lv:3},
{en:"That's easier said than done.",fr:"C'est plus facile à dire qu'à faire.",ctx:"Nuance pragmatique.",lv:1},
{en:"I'm playing devil's advocate here.",fr:"Je joue l'avocat du diable.",ctx:"Pour tester une idée.",lv:2},
{en:"Let's not get ahead of ourselves.",fr:"Ne brûlons pas les étapes.",ctx:"Prudence.",lv:2},
{en:"That really hits home.",fr:"Ça touche vraiment juste / Ça parle.",ctx:"Impact émotionnel.",lv:2}]},
phrasal:{label:'Phrasal verbs',icon:'🔀',color:'#E8F8F5',tc:'#0e4d3a',cards:[
// LV1 — phrasal verbs essentiels
{en:'To follow up on something',fr:'Donner suite à / relancer',ctx:'"I\'ll follow up on this after the meeting."',lv:1},
{en:'To bring up a topic',fr:'Aborder / soulever un sujet',ctx:'"I\'d like to bring up a concern." ≠ "say".',lv:1},
{en:'To put off a meeting',fr:'Reporter une réunion',ctx:'"Can we put off the call until Thursday?"',lv:1},
{en:'To take on a project',fr:'Prendre en charge un projet',ctx:'"She took on too much work."',lv:1},
{en:'To come up with an idea',fr:'Trouver / proposer une idée',ctx:'"Can you come up with a solution by Friday?"',lv:1},
{en:'To look into a problem',fr:'Examiner / investiguer un problème',ctx:'"I\'ll look into this and get back to you."',lv:1},
{en:'To go over the details',fr:'Passer en revue les détails',ctx:'"Let\'s go over the numbers one more time."',lv:1},
{en:'To set up a meeting',fr:'Organiser une réunion',ctx:'"Can you set up a call for next week?"',lv:1},
{en:'To back down',fr:'Reculer / abandonner sa position',ctx:'"He backed down after the pushback."',lv:1},
{en:'To stand out',fr:'Se démarquer / ressortir',ctx:'"Her presentation really stood out."',lv:1},
{en:'To call off a meeting',fr:'Annuler une réunion',ctx:'"The meeting was called off."',lv:1},
{en:'To cut back on expenses',fr:'Réduire les dépenses',ctx:'"We need to cut back on travel costs."',lv:1},
{en:'To bring about a change',fr:'Provoquer / entraîner un changement',ctx:'"The new policy brought about significant changes."',lv:1},
{en:'To hand over responsibilities',fr:'Transmettre / céder des responsabilités',ctx:'"She handed over her role to a colleague."',lv:1},
{en:'To check in on someone',fr:'Prendre des nouvelles de quelqu\'un',ctx:'"I\'ll check in on you after the presentation."',lv:1},
// LV2 — phrasal verbs intermédiaires
{en:'To talk someone into something',fr:'Convaincre quelqu\'un de faire quelque chose',ctx:'"He talked me into attending the conference."',lv:2},
{en:'To talk someone out of something',fr:'Dissuader quelqu\'un de faire quelque chose',ctx:'"She talked him out of resigning."',lv:2},
{en:'To figure out a solution',fr:'Trouver / comprendre une solution',ctx:'"Let me figure out the best approach."',lv:2},
{en:'To run out of time',fr:'Manquer de temps',ctx:'"We ran out of time before covering everything."',lv:2},
{en:'To fall behind on deliverables',fr:'Prendre du retard sur les livrables',ctx:'"We\'re falling behind — we need more resources."',lv:2},
{en:'To pull off a deal',fr:'Réussir à conclure un accord',ctx:'"They pulled off an impressive deal."',lv:2},
{en:'To wrap up a meeting',fr:'Conclure / terminer une réunion',ctx:'"Let\'s wrap up — any final questions?"',lv:2},
{en:'To turn down an offer',fr:'Refuser une offre',ctx:'"We turned down their initial proposal."',lv:2},
{en:'To carry out a task',fr:'Exécuter / mener à bien une tâche',ctx:'"The team carried out the audit successfully."',lv:2},
{en:'To narrow down the options',fr:'Réduire le nombre d\'options',ctx:'"Let\'s narrow down to three candidates."',lv:2},
{en:'To kick off a project',fr:'Lancer / démarrer un projet',ctx:'"We\'ll kick off the new initiative next Monday."',lv:2},
{en:'To pick up the pace',fr:'Accélérer le rythme',ctx:'"We need to pick up the pace."',lv:2},
{en:'To run by someone',fr:'Soumettre une idée à quelqu\'un pour avis',ctx:'"Let me run this by the team before we decide."',lv:2},
{en:'To sort out a problem',fr:'Régler / résoudre un problème',ctx:'"Can you sort out the technical issues?"',lv:2},
{en:'To tie up loose ends',fr:'Régler les derniers détails en suspens',ctx:'"There are a few loose ends to tie up."',lv:2},
{en:'To step up to the plate',fr:'Se montrer à la hauteur',ctx:'"We need someone to step up to the plate on this."',lv:2},
{en:'To work around a constraint',fr:'Contourner une contrainte',ctx:'"We\'ll have to work around the budget limitation."',lv:2},
{en:'To draw up a contract',fr:'Rédiger un contrat',ctx:'"The lawyers are drawing up the agreement."',lv:2},
// LV3 — phrasal verbs avancés
{en:'To phase out a product',fr:'Supprimer progressivement un produit',ctx:'"We\'re phasing out the old model by Q4."',lv:3},
{en:'To roll out a new policy',fr:'Déployer une nouvelle politique',ctx:'"The new process will be rolled out next month."',lv:3},
{en:'To iron out the details',fr:'Régler les derniers détails',ctx:'"We still need to iron out a few things."',lv:3},
{en:'To head off a problem',fr:'Anticiper / prévenir un problème',ctx:'"Let\'s head off this issue before it escalates."',lv:3},
{en:'To come across as confident',fr:'Paraître / donner l\'impression d\'être confiant',ctx:'"You came across as very professional."',lv:3},
{en:'To live up to expectations',fr:'Être à la hauteur des attentes',ctx:'"The product didn\'t live up to the hype."',lv:3},
{en:'To tap into a market',fr:'Exploiter / pénétrer un marché',ctx:'"We need to tap into the Asian market."',lv:3},

nuances:{label:'Nuances & registres',icon:'🎭',color:'#F9EAFB',tc:'#5a1a7a',cards:[
// LV1 — désaccord et formulations de base
{en:'I disagree.',fr:'Je ne suis pas d\'accord.',ctx:'Direct. Correct mais peut sembler abrupt en expressions pro.',lv:1},
{en:'I\'m not sure I agree.',fr:'Je ne suis pas sûr d\'être d\'accord.',ctx:'Plus doux — ouvre le débat sans confronter.',lv:1},
{en:'I see your point, but…',fr:'Je vois ce que tu veux dire, mais…',ctx:'Reconnaît l\'argument avant de le nuancer.',lv:1},
{en:'Can you?',fr:'Tu peux ?',ctx:'Très informel. Réservé aux collègues proches.',lv:1},
{en:'Would you mind…?',fr:'Cela vous dérangerait-il de… ?',ctx:'Très poli. Attend une réponse positive.',lv:1},
{en:'I\'m afraid I can\'t make it.',fr:'Je crains de ne pas pouvoir venir.',ctx:'Poli pour décliner une invitation ou une réunion.',lv:1},
{en:'Sorry, can\'t make it.',fr:'Désolé, je ne peux pas venir.',ctx:'Très informel. Entre amis ou collègues proches.',lv:1},
{en:'Regrettably, I will be unable to attend.',fr:'Malheureusement, il m\'est impossible d\'assister.',ctx:'Très formel. Email officiel.',lv:1},
{en:'I need this done.',fr:'J\'ai besoin que ça soit fait.',ctx:'Direct. Ton assertif, légèrement autoritaire.',lv:1},
{en:'It would be great if you could…',fr:'Ce serait super si tu pouvais…',ctx:'Informel mais positif. Bon entre collègues.',lv:1},
{en:'That\'s interesting — I\'d look at it differently.',fr:'C\'est intéressant — je l\'envisagerais différemment.',ctx:'Désaccord très poli et ouvert.',lv:1},
// LV2 — nuances professionnelles
{en:'If I may, I\'d like to raise a point.',fr:'Si vous me le permettez, je voudrais soulever un point.',ctx:'Formel. Pour interrompre poliment en réunion.',lv:2},
{en:'It might be worth considering…',fr:'Il pourrait valoir la peine d\'envisager…',ctx:'Très poli, suggère sans imposer.',lv:2},
{en:'Have you considered…?',fr:'Avez-vous envisagé… ?',ctx:'Invite à la réflexion sans dicter une réponse.',lv:2},
{en:'We can\'t do that.',fr:'Nous ne pouvons pas faire ça.',ctx:'Direct. Peut paraître dur selon le contexte.',lv:2},
{en:'That may not be feasible at this stage.',fr:'Cela ne semble pas faisable à ce stade.',ctx:'Doux et professionnel. Laisse une porte ouverte.',lv:2},
{en:'I\'m afraid that\'s outside the scope of what we can offer.',fr:'Je crains que ce soit en dehors de ce que nous pouvons offrir.',ctx:'Refus formel et poli.',lv:2},
{en:'I think there may be a misunderstanding.',fr:'Je pense qu\'il y a peut-être un malentendu.',ctx:'Très diplomatique. Corrige sans confronter.',lv:2},
{en:'The data tells a slightly different story.',fr:'Les données racontent une histoire légèrement différente.',ctx:'Contredire avec des faits, pas des opinions.',lv:2},
{en:'Do you have a moment? I\'d like to discuss something.',fr:'Tu as un moment ? Je voudrais discuter de quelque chose.',ctx:'Plus doux que "We need to talk".',lv:2},
{en:'I think we should…',fr:'Je pense qu\'on devrait…',ctx:'Direct mais inclusif. Bon en réunion d\'équipe.',lv:2},
{en:'I expected a different outcome.',fr:'Je m\'attendais à un résultat différent.',ctx:'Exprime la déception sans accusation.',lv:2},
{en:'Let me be direct.',fr:'Laissez-moi être direct.',ctx:'Annonce une vérité difficile. Prépare l\'interlocuteur.',lv:2},
// LV3 — registre très élaboré
{en:'It seems there may have been a miscommunication on our end.',fr:'Il semblerait qu\'il y ait eu un problème de communication de notre côté.',ctx:'Très diplomatique. Assume une responsabilité partagée.',lv:3},
{en:'I have significant concerns about this approach.',fr:'J\'ai de sérieuses réserves concernant cette approche.',ctx:'Formel et sérieux sans être agressif.',lv:3},
{en:'With respect, I think we\'re missing the bigger picture.',fr:'Avec tout le respect que je vous dois, je pense qu\'on passe à côté.',ctx:'Désaccord fort mais respectueux.',lv:3},
{en:'I hear what you\'re saying, and I\'d push back on that.',fr:'Je comprends ce que tu dis, et je nuancerais ça.',ctx:'Écoute active + désaccord articulé.',lv:3},
{en:'To put it diplomatically, the results were underwhelming.',fr:'Pour le dire diplomatiquement, les résultats étaient décevants.',ctx:'Sous-entendu clair derrière la formulation polie.',lv:3},
{en:'I\'m not in a position to speak to that.',fr:'Je ne suis pas en mesure de me prononcer là-dessus.',ctx:'Pour refuser de commenter sans mentir.',lv:3},

,{en:"I'm afraid that won't be possible.",fr:"Je crains que ce ne soit pas possible.",ctx:"Refus poli et formel.",lv:2},
{en:"With all due respect,",fr:"Sauf votre respect,",ctx:"Pour désaccord poli.",lv:2},
{en:"I take your point, however...",fr:"Je comprends votre argument, cependant...",ctx:"Accepter puis nuancer.",lv:2},
{en:"If I may say so,",fr:"Si je puis me permettre,",ctx:"Pour une remarque délicate.",lv:3},
{en:"I'd like to respectfully disagree.",fr:"Je me permets de ne pas être d'accord.",ctx:"Désaccord poli et assertif.",lv:2},
{en:"That's one way of looking at it.",fr:"C'est une façon de voir les choses.",ctx:"Pour ne pas valider sans rejeter.",lv:2},
{en:"I'm not entirely convinced.",fr:"Je ne suis pas entièrement convaincu.",ctx:"Doute exprimé poliment.",lv:2},
{en:"We might want to reconsider.",fr:"Nous devrions peut-être reconsidérer.",ctx:"Suggestion de révision.",lv:2},
{en:"That's worth exploring further.",fr:"Cela mérite d'être approfondi.",ctx:"Pour ne pas rejeter une idée.",lv:2},
{en:"I can see both sides of the argument.",fr:"Je vois les deux côtés de l'argument.",ctx:"Position équilibrée.",lv:2},
{en:"This is a grey area.",fr:"C'est une zone grise.",ctx:"Situation ambiguë.",lv:2},
{en:"We'll have to agree to disagree.",fr:"Nous devrons accepter de ne pas être d'accord.",ctx:"Impasse respectueuse.",lv:2},
{en:"It's not black and white.",fr:"Ce n'est pas tout blanc ou tout noir.",ctx:"Pour souligner la complexité.",lv:1},
{en:"I'm on the fence about this.",fr:"Je suis indécis là-dessus.",ctx:"Indécision assumée.",lv:2},
{en:"This is a double-edged sword.",fr:"C'est une arme à double tranchant.",ctx:"Avantage qui est aussi un risque.",lv:2}
,{en:"I think we need to manage expectations here.",fr:"Je pense qu'on doit gérer les attentes ici.",ctx:"Pour recadrer poliment.",lv:2},
{en:"I wouldn't go that far.",fr:"Je n'irais pas jusque-là.",ctx:"Pour modérer une affirmation.",lv:2},
{en:"That's not entirely accurate.",fr:"Ce n'est pas entièrement exact.",ctx:"Pour corriger poliment.",lv:2},
{en:"I'd like to offer a different perspective.",fr:"J'aimerais offrir une perspective différente.",ctx:"Pour introduire un point de vue alternatif.",lv:2},
{en:"With the benefit of hindsight...",fr:"Avec le recul...",ctx:"Pour analyser après coup.",lv:2},
{en:"To be fair...",fr:"Soyons honnêtes... / Pour être juste...",ctx:"Pour nuancer un jugement.",lv:1},
{en:"I may be wrong, but...",fr:"Je me trompe peut-être, mais...",ctx:"Pour s'exprimer avec humilité.",lv:1},
{en:"This is open to interpretation.",fr:"C'est ouvert à interprétation.",ctx:"Ambiguïté assumée.",lv:2},
{en:"The jury is still out on this.",fr:"La question n'est pas encore tranchée.",ctx:"Incertitude collective.",lv:2},
{en:"That depends on how you look at it.",fr:"Cela dépend de la façon dont on regarde les choses.",ctx:"Relativisme nuancé.",lv:1}]},
connectors:{label:'Connecteurs & structures',icon:'🔄',color:'#F5F0FF',tc:'#3a1a7a',cards:[
// LV1 — connecteurs de base
{en:'Therefore',fr:'Donc / par conséquent',ctx:'"The data is incomplete. Therefore, we cannot proceed."',lv:1},
{en:'However',fr:'Cependant / toutefois',ctx:'"The plan is solid. However, the budget is a concern."',lv:1},
{en:'Furthermore',fr:'De plus / qui plus est',ctx:'"Furthermore, the timeline is too aggressive."',lv:1},
{en:'Nevertheless',fr:'Néanmoins / malgré tout',ctx:'"It was risky. Nevertheless, we proceeded."',lv:1},
{en:'Moreover',fr:'De plus / en outre',ctx:'"The product is excellent. Moreover, it\'s competitively priced."',lv:1},
{en:'In other words',fr:'En d\'autres termes / autrement dit',ctx:'"In other words, we\'re out of time."',lv:1},
{en:'For instance',fr:'Par exemple',ctx:'Slightly more formal than "for example".',lv:1},
{en:'On the other hand',fr:'D\'un autre côté',ctx:'"On the other hand, the risks are significant."',lv:1},
{en:'To sum up',fr:'Pour résumer / en résumé',ctx:'"To sum up, we need to act fast."',lv:1},
{en:'In short',fr:'En bref / bref',ctx:'"In short, the plan didn\'t work."',lv:1},
{en:'In contrast',fr:'En contraste / à l\'inverse',ctx:'"In contrast, our European division performed well."',lv:1},
{en:'In addition to',fr:'En plus de / outre',ctx:'"In addition to the delays, we faced quality issues."',lv:1},
{en:'Above all',fr:'Surtout / avant tout',ctx:'"Above all, we need to maintain quality."',lv:1},
{en:'As a result',fr:'Par conséquent / en conséquence',ctx:'"Sales dropped. As a result, we had to cut costs."',lv:1},
{en:'Not only… but also…',fr:'Non seulement… mais aussi…',ctx:'"Not only did we miss the deadline, but we also went over budget."',lv:1},
// LV2 — connecteurs intermédiaires
{en:'As such',fr:'En tant que tel / à ce titre',ctx:'"It\'s a pilot project. As such, we expect some issues."',lv:2},
{en:'Accordingly',fr:'Par conséquent / en conséquence',ctx:'"The budget was cut. Accordingly, the team was reduced."',lv:2},
{en:'Conversely',fr:'À l\'inverse / inversement',ctx:'"Sales rose in Q1. Conversely, Q2 saw a decline."',lv:2},
{en:'In turn',fr:'En retour / à son tour',ctx:'"Trust builds loyalty. Loyalty, in turn, drives retention."',lv:2},
{en:'To this end',fr:'À cette fin / dans ce but',ctx:'"We need to cut costs. To this end, we\'re reviewing all contracts."',lv:2},
{en:'On balance',fr:'Tout compte fait / dans l\'ensemble',ctx:'"On balance, the benefits outweigh the risks."',lv:2},
{en:'Broadly speaking',fr:'En termes généraux',ctx:'"Broadly speaking, the strategy is sound."',lv:2},
{en:'Strictly speaking',fr:'À proprement parler / strictement',ctx:'"Strictly speaking, this falls outside our remit."',lv:2},
{en:'At first glance',fr:'À première vue',ctx:'"At first glance, the numbers look good."',lv:2},
{en:'With this in mind',fr:'En gardant cela à l\'esprit',ctx:'"With this in mind, let me explain our approach."',lv:2},
{en:'With regard to',fr:'En ce qui concerne / concernant',ctx:'"With regard to your proposal, we have a few questions."',lv:2},
{en:'In light of',fr:'À la lumière de / compte tenu de',ctx:'"In light of recent events, we need to reassess."',lv:2},
{en:'As opposed to',fr:'Par opposition à / contrairement à',ctx:'"We\'re focusing on quality, as opposed to volume."',lv:2},
{en:'That is to say',fr:'C\'est-à-dire',ctx:'More formal version of "in other words".',lv:2},
{en:'In the interim',fr:'Dans l\'intervalle / entre-temps',ctx:'"In the interim, please use the old system."',lv:2},
// LV3 — connecteurs avancés
{en:'In the final analysis',fr:'En dernière analyse / au bout du compte',ctx:'"In the final analysis, it comes down to execution."',lv:3},
{en:'To put it another way',fr:'Autrement dit / pour le dire autrement',ctx:'"To put it another way, we\'re running out of runway."',lv:3},
{en:'In essence',fr:'En substance / pour l\'essentiel',ctx:'"In essence, the proposal is sound."',lv:3},
{en:'Taken as a whole',fr:'Dans l\'ensemble / pris globalement',ctx:'"Taken as a whole, the results are encouraging."',lv:3},
{en:'By extension',fr:'Par extension',ctx:'"This affects our team, and by extension, the whole department."',lv:3},
{en:'On closer inspection',fr:'En y regardant de plus près',ctx:'"On closer inspection, there are several inconsistencies."',lv:3},
{en:'By the same token',fr:'De même / dans le même ordre d\'idées',ctx:'"We can\'t overspend. By the same token, we can\'t underinvest."',lv:3},
{en:'Suffice it to say',fr:'Il suffit de dire',ctx:'"Suffice it to say, the results were disappointing."',lv:3},
{en:'Granted',fr:'Certes / il est vrai que',ctx:'"Granted, the plan has risks, but the potential is huge."',lv:3},
{en:'Notwithstanding',fr:'Nonobstant / malgré cela',ctx:'"Notwithstanding the delays, we delivered on time."',lv:3},
{en:'In lieu of',fr:'En lieu et place de / à la place de',ctx:'"In lieu of a meeting, let\'s do a written update."',lv:3},
{en:'In the event of',fr:'Dans le cas où / en cas de',ctx:'"In the event of a delay, please notify us immediately."',lv:3},
{en:'At this juncture',fr:'À ce stade / en ce moment précis',ctx:'"At this juncture, a decision is needed."',lv:3},
{en:'To the best of my knowledge',fr:'À ma connaissance / pour autant que je sache',ctx:'"To the best of my knowledge, the contract is still valid."',lv:3},
{en:'On the assumption that',fr:'En supposant que / en partant du principe que',ctx:'"On the assumption that costs stay flat, we\'ll break even."',lv:3},

{en:"By contrast",fr:"En revanche",ctx:"Opposition.",lv:1},
