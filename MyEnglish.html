<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyEnglish"/>
<title>MyEnglish</title>
<style>
:root{
  --accent:#1a5c38;--accent2:#2a7a4e;--accent-light:#e8f5ee;--accent-text:#0d3d24;
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#eeede9;
  --text:#111111;--text2:#555555;--text3:#999999;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --r:12px;--rsm:8px;
  --red:#c0392b;--redbg:#fdf0ef;--orange:#d4660a;--orangebg:#fef3e8;
  --glite:#27ae60;--glitebg:#eafaf1;--gvif:#1a7a3c;--gvifbg:#d5f0e0;
  --blue:#1a4a7a;--bluebg:#eaf0f8;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --accent:#2a7a4e;--accent2:#3a9a62;--accent-light:#0d2b1a;--accent-text:#7de0a8;
  --redbg:#2a0f0d;--orangebg:#2a1800;--glitebg:#0d2b1a;--gvifbg:#0a2016;--bluebg:#0d1e33;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 1rem 0.5rem}
/* NAV */
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);padding-bottom:var(--safe-bottom)}
.nb{flex:1;background:none;border:none;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text3);font-size:9px;letter-spacing:.02em;text-transform:uppercase}
.nb.active{color:var(--accent)}
.nb svg{width:22px;height:22px;stroke-width:1.5;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.screen{display:none}.screen.active{display:block}
/* TYPOGRAPHY */
.page-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
h1{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
/* HOME */
.home-hero{padding:1rem 0 1.5rem}
.home-greeting{font-size:13px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1.25rem 0}
.stat{background:var(--bg2);border-radius:var(--r);padding:14px 10px;text-align:center;border:0.5px solid var(--border)}
.stat-n{font-size:24px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--text3);margin-top:4px}
.streak{display:flex;align-items:center;gap:10px;background:var(--accent-light);border-radius:var(--r);padding:12px 16px;margin-bottom:1.25rem;border:0.5px solid rgba(26,92,56,.15)}
.streak-n{font-size:22px;font-weight:700;color:var(--accent)}
.streak-l{font-size:13px;color:var(--accent-text)}
.daily-limit{background:var(--bg2);border-radius:var(--r);padding:10px 14px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--border)}
.dl-label{font-size:13px;color:var(--text2)}
.dl-bar-wrap{flex:1;margin:0 12px;background:var(--bg3);border-radius:99px;height:5px;overflow:hidden}
.dl-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.dl-count{font-size:12px;color:var(--text3);white-space:nowrap}
/* BUTTONS */
.btn-main{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:.01em}
.btn-main:active{opacity:.85}
.btn-secondary{width:100%;background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);padding:13px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px}
.btn-secondary:active{opacity:.8}
.btn{border:none;border-radius:var(--rsm);padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}.btn-p:active{opacity:.85}
.btn-g{background:var(--bg3);color:var(--text2)}
/* DECK GRID */
.deck-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
.deck-card{background:var(--bg2);border-radius:var(--r);padding:14px;cursor:pointer;border:0.5px solid var(--border);transition:border-color .15s}
.deck-card:active{opacity:.8}
.deck-name{font-size:14px;font-weight:600;margin-bottom:4px}
.deck-meta{font-size:12px;color:var(--text3);line-height:1.7}
.due-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--redbg);color:var(--red);margin-top:6px}
.ok-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--glitebg);color:var(--gvif);margin-top:6px}
.dir-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;margin-top:6px;background:var(--bg3);color:var(--text3);margin-left:4px}
.add-deck{background:none;border:1px dashed var(--border2);border-radius:var(--r);padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);min-height:88px}
/* FORMS */
.form-box{background:var(--bg2);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;border:0.5px solid var(--border)}
.form-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;padding:10px 12px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
.form-row textarea{height:56px;resize:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
/* PILL ROW */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:99px;padding:6px 14px;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap}
.pill.active{background:var(--accent);color:#fff;border-color:transparent}
/* CARD LIST */
.card-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.card-item{background:var(--bg2);border-radius:var(--rsm);padding:12px 14px;display:flex;align-items:center;gap:10px;border:0.5px solid var(--border)}
.card-texts{flex:1;min-width:0}
.card-a{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-b{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-ctx{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-style:italic}
.card-right{text-align:right;white-space:nowrap;flex-shrink:0}
.card-due{font-size:11px;color:var(--text3);margin-top:2px}
.del-btn{background:none;border:none;font-size:15px;color:var(--text3);padding:4px 6px;cursor:pointer;flex-shrink:0}
/* STARS */
.stars{font-size:12px;letter-spacing:1px}
.s0{color:var(--text3)}
.sr{color:var(--red)}
.so{color:var(--orange)}
.sgl{color:var(--glite)}
.sgv{color:var(--gvif)}
/* TYPE PILLS */
.tp{display:inline-block;font-size:10px;padding:1px 7px;border-radius:99px;margin-top:3px}
.tp-p{background:var(--bluebg);color:var(--blue)}.tp-m{background:var(--orangebg);color:var(--orange)}.tp-b{background:var(--accent-light);color:var(--accent-text)}
/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
/* QUIZ */
.quiz-stats{display:flex;gap:8px;margin-bottom:12px}
.qs{background:var(--bg2);border-radius:var(--rsm);padding:10px;flex:1;text-align:center;border:0.5px solid var(--border)}
.qs-n{font-size:20px;font-weight:700}
.qs-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.prog{background:var(--bg3);border-radius:99px;height:3px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.quiz-card{background:var(--bg2);border-radius:var(--r);padding:2rem 1.25rem;text-align:center;min-height:210px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;margin-bottom:1rem;border:0.5px solid var(--border)}
.quiz-dir{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.quiz-q{font-size:22px;font-weight:600;line-height:1.4;color:var(--text)}
.quiz-ans{font-size:19px;font-weight:500;color:var(--accent);margin-top:6px;line-height:1.4}
.quiz-ctx{font-size:13px;color:var(--text2);font-style:italic;margin-top:4px;padding:0 1rem}
.audio-btn{background:none;border:0.5px solid var(--border2);border-radius:99px;padding:7px 16px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.audio-btn:active{background:var(--bg3)}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:.5rem}
.score-btn{border-radius:var(--rsm);padding:11px 4px;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.score-btn:active{opacity:.75}
.score-sub{font-size:9px;font-weight:500;opacity:.8;letter-spacing:.02em}
.sc1{background:var(--redbg);color:var(--red)}
.sc2{background:#fef0e8;color:#b94a00}
.sc3{background:var(--orangebg);color:var(--orange)}
.sc4{background:var(--glitebg);color:var(--glite)}
.sc5{background:var(--gvifbg);color:var(--gvif)}
.score-hint{font-size:13px;color:var(--text2);margin-bottom:10px;text-align:center}
.reveal-wrap{text-align:center}
.result{text-align:center;padding:2.5rem 1rem}
.result-score{font-size:60px;font-weight:700;color:var(--accent)}
.result-sub{font-size:15px;color:var(--text2);margin:8px 0 1.5rem}
/* EXPLORE */
.explore-header{margin-bottom:1.25rem}
.explore-desc{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
.cat-card{border-radius:var(--r);padding:16px;cursor:pointer;border:none;text-align:left;position:relative;overflow:hidden}
.cat-card:active{opacity:.85}
.cat-icon{font-size:22px;margin-bottom:8px}
.cat-name{font-size:13px;font-weight:600;line-height:1.3}
.cat-progress{font-size:11px;opacity:.75;margin-top:4px}
.cat-locked{opacity:.5;cursor:default}
.lock-icon{position:absolute;top:12px;right:12px;font-size:14px;opacity:.6}
.level-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.lv1{background:#e8f4fd;color:#1a5276}.lv2{background:#fef9e7;color:#7d6608}.lv3{background:#fdf2f8;color:#76448a}
.bank-item{background:var(--bg2);border-radius:var(--rsm);padding:13px 14px;margin-bottom:8px;border:0.5px solid var(--border);position:relative}
.bank-en{font-size:15px;font-weight:500;padding-right:80px}
.bank-fr{font-size:13px;color:var(--text2);margin-top:3px}
.bank-note{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic;line-height:1.4}
.bank-level-dot{position:absolute;top:13px;right:44px;font-size:10px;font-weight:600;color:var(--text3)}
.add-btn{position:absolute;top:11px;right:10px;background:var(--accent);color:#fff;border:none;border-radius:99px;padding:4px 11px;font-size:12px;font-weight:500;cursor:pointer}
.add-btn.done{background:var(--bg3);color:var(--text3);cursor:default}
.back-btn{background:none;border:none;font-size:14px;color:var(--text2);cursor:pointer;margin-bottom:1rem;padding:0;display:flex;align-items:center;gap:5px}
.locked-msg{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="content">
    <div id="s-home" class="screen active"></div>
    <div id="s-decks" class="screen"></div>
    <div id="s-cards" class="screen"></div>
    <div id="s-quiz" class="screen"></div>
    <div id="s-explore" class="screen"></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="T('home')" id="n-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="nb" onclick="T('decks')" id="n-decks">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Decks</span>
    </button>
    <button class="nb" onclick="T('cards')" id="n-cards">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>Cartes</span>
    </button>
    <button class="nb" onclick="T('quiz')" id="n-quiz">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>Quiz</span>
    </button>
    <button class="nb" onclick="T('explore')" id="n-explore">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Explore</span>
    </button>
  </nav>
</div>
<script>
const SK='myenglish_v4';
const IV={1:3600000,2:10800000,3:28800000,4:86400000,5:172800000};
const IL={1:'1h',2:'3h',3:'8h',4:'1j',5:'2j'};
const MAX_NEW_PER_DAY=15;

// ─── EXPLORE BANK ───────────────────────────────────────────────────────────
const BANK={
pro:{
  label:'Vocabulaire pro',icon:'💼',color:'#EAF2FF',tc:'#1a3a5c',
  cards:[
    // NIVEAU 1
    {en:'The shipment has been delayed.',fr:'L\'expédition a été retardée.',ctx:'Due to bad weather / customs issues.',lv:1},
    {en:'Can you action this by end of day?',fr:'Tu peux t\'en occuper d\'ici fin de journée ?',ctx:'Très courant dans les emails pro.',lv:1},
    {en:'We need to align on the deliverables.',fr:'Nous devons nous aligner sur les livrables.',ctx:'Avant une réunion de lancement.',lv:1},
    {en:'Let\'s circle back on this next week.',fr:'Revenons là-dessus la semaine prochaine.',ctx:'Pour reporter sans refuser.',lv:1},
    {en:'I\'ll follow up with the client.',fr:'Je relance le client.',ctx:'Follow up = relancer, pas seulement suivre.',lv:1},
    {en:'The invoice is pending approval.',fr:'La facture est en attente de validation.',ctx:'Finance courante.',lv:1},
    {en:'We\'re running behind schedule.',fr:'Nous avons du retard sur le planning.',ctx:'Behind schedule = en retard sur le calendrier.',lv:1},
    {en:'Can we get a status update?',fr:'Peut-on avoir un point de situation ?',ctx:'Pour demander un état d\'avancement.',lv:1},
    {en:'We need to escalate this to management.',fr:'Il faut remonter ça à la direction.',ctx:'Escalate = remonter dans la hiérarchie.',lv:1},
    {en:'Let\'s take this offline after the call.',fr:'Parlons-en en dehors de la réunion.',ctx:'Offline = en aparté, hors réunion.',lv:1},
    {en:'The warehouse is at full capacity.',fr:'L\'entrepôt est à pleine capacité.',ctx:'Logistique.',lv:1},
    {en:'The lead time is six weeks.',fr:'Le délai d\'approvisionnement est de six semaines.',ctx:'Lead time = délai entre commande et livraison.',lv:1},
    {en:'Stakeholder',fr:'Partie prenante',ctx:'Personne impactée par ou impliquée dans un projet.',lv:1},
    {en:'Milestone',fr:'Jalon / Étape clé',ctx:'Milestone = point de contrôle dans un projet.',lv:1},
    {en:'Deliverable',fr:'Livrable',ctx:'Ce qu\'on s\'engage à remettre.',lv:1},
    {en:'Bandwidth',fr:'Disponibilité (d\'une personne)',ctx:'"Do you have bandwidth for this?" = as-tu du temps ?',lv:1},
    {en:'Bottleneck',fr:'Goulot d\'étranglement',ctx:'Point de blocage qui ralentit tout.',lv:1},
    {en:'Turnaround time',fr:'Délai d\'exécution',ctx:'Temps entre réception d\'une demande et livraison.',lv:1},
    {en:'Headcount',fr:'Effectif',ctx:'Nombre de personnes dans une équipe.',lv:1},
    {en:'Overhead costs',fr:'Frais généraux',ctx:'Coûts non directement liés à la production.',lv:1},
    // NIVEAU 2
    {en:'We need to streamline the approval process.',fr:'Il faut simplifier le processus de validation.',ctx:'Streamline = rendre plus fluide, éliminer les étapes inutiles.',lv:2},
    {en:'The procurement team is renegotiating the terms.',fr:'L\'équipe achats renégocie les conditions.',ctx:'Procurement = achats / approvisionnement.',lv:2},
    {en:'We\'re looking at a tight margin on this contract.',fr:'On est sur une marge serrée pour ce contrat.',ctx:'Tight margin = peu de marge de manœuvre financière.',lv:2},
    {en:'The audit flagged several discrepancies.',fr:'L\'audit a relevé plusieurs écarts.',ctx:'Flag = signaler / relever un problème.',lv:2},
    {en:'We\'re onboarding a new carrier next quarter.',fr:'Nous intégrons un nouveau transporteur au prochain trimestre.',ctx:'Onboarding = intégration d\'un nouveau partenaire ou employé.',lv:2},
    {en:'The cash flow forecast looks tight this month.',fr:'Les prévisions de trésorerie sont serrées ce mois-ci.',ctx:'Cash flow = flux de trésorerie.',lv:2},
    {en:'The SLA was breached on three occasions.',fr:'Le SLA a été enfreint à trois reprises.',ctx:'SLA = Service Level Agreement = engagement de niveau de service.',lv:2},
    {en:'We need to hedge against currency fluctuations.',fr:'Il faut se couvrir contre les fluctuations de devises.',ctx:'Hedge = se couvrir (terme financier).',lv:2},
    {en:'The freight cost has gone up by 15%.',fr:'Le coût du fret a augmenté de 15%.',ctx:'Freight = fret / transport de marchandises.',lv:2},
    {en:'We\'re overstocked on this SKU.',fr:'Nous sommes en surstock sur cette référence.',ctx:'SKU = Stock Keeping Unit = référence produit.',lv:2},
    {en:'I\'ll send over the breakdown after the meeting.',fr:'Je t\'envoie la ventilation après la réunion.',ctx:'Breakdown = décomposition détaillée des chiffres.',lv:2},
    {en:'The tender was awarded to a competitor.',fr:'L\'appel d\'offres a été remporté par un concurrent.',ctx:'Tender = appel d\'offres.',lv:2},
    {en:'Net margin',fr:'Marge nette',ctx:'Profit après déduction de tous les coûts.',lv:2},
    {en:'Working capital',fr:'Besoin en fonds de roulement (BFR)',ctx:'Argent nécessaire au fonctionnement quotidien.',lv:2},
    {en:'Asset allocation',fr:'Allocation d\'actifs',ctx:'Répartition d\'un portefeuille d\'investissement.',lv:2},
    {en:'Churn rate',fr:'Taux d\'attrition',ctx:'Pourcentage de clients perdus sur une période.',lv:2},
    {en:'Pipeline',fr:'Portefeuille de prospects / projets',ctx:'"What\'s in your pipeline?" = quels projets as-tu en cours ?',lv:2},
    {en:'Pain point',fr:'Point de friction / problème récurrent',ctx:'Ce qui gêne le client ou bloque un processus.',lv:2},
    {en:'Leverage',fr:'Levier (avantage stratégique)',ctx:'"We have leverage in this negotiation" = nous avons un avantage.',lv:2},
    {en:'Outstanding invoice',fr:'Facture impayée',ctx:'Outstanding = en souffrance / non réglé.',lv:2},
    // NIVEAU 3
    {en:'We need to backfill this position urgently.',fr:'Il faut pourvoir ce poste de toute urgence.',ctx:'Backfill = remplacer quelqu\'un qui part.',lv:3},
    {en:'The project is within scope and on budget.',fr:'Le projet est dans le périmètre et dans le budget.',ctx:'Within scope = dans le périmètre défini.',lv:3},
    {en:'The quarterly earnings beat expectations.',fr:'Les résultats trimestriels ont dépassé les attentes.',ctx:'Beat expectations = dépasser les prévisions des analystes.',lv:3},
    {en:'We\'re scaling up operations in the region.',fr:'Nous développons les opérations dans la région.',ctx:'Scale up = monter en puissance.',lv:3},
    {en:'We need to de-risk the supply chain.',fr:'Il faut réduire les risques dans la chaîne d\'approvisionnement.',ctx:'De-risk = atténuer les risques.',lv:3},
    {en:'The KPIs are trending in the right direction.',fr:'Les indicateurs évoluent dans le bon sens.',ctx:'Trending = montrant une tendance.',lv:3},
    {en:'We\'re looking to consolidate our vendor base.',fr:'Nous cherchons à rationaliser notre base de fournisseurs.',ctx:'Consolidate = regrouper / réduire le nombre.',lv:3},
    {en:'Runway',fr:'Durée de vie de la trésorerie',ctx:'"6 months of runway" = argent disponible pour 6 mois.',lv:3},
    {en:'Yield',fr:'Rendement (financier)',ctx:'Return generated on an investment.',lv:3},
    {en:'We need to align incentives across teams.',fr:'Nous devons aligner les incitations entre les équipes.',ctx:'Align incentives = faire en sorte que les intérêts convergent.',lv:3},
    {en:'The deal fell through at the last minute.',fr:'La transaction a échoué à la dernière minute.',ctx:'Fall through = échouer / ne pas aboutir.',lv:3},
    {en:'We\'re exposed to significant counterparty risk.',fr:'Nous sommes exposés à un risque de contrepartie significatif.',ctx:'Counterparty risk = risque lié à l\'autre partie dans un contrat.',lv:3},
    {en:'Benchmark',fr:'Référence comparative / étalon',ctx:'Used to compare performance against industry standards.',lv:3},
    {en:'To sanity-check the figures',fr:'Vérifier rapidement que les chiffres ont du sens',ctx:'"Can you sanity-check this?" = est-ce que ça tient la route ?',lv:3},
    {en:'The margin compression is a concern.',fr:'La compression des marges est préoccupante.',ctx:'Margin compression = réduction des marges sous pression des coûts.',lv:3},
  ]
},
idioms:{
  label:'Expressions idiomatiques',icon:'🗣️',color:'#FEF9E7',tc:'#7d6608',
  cards:[
    // NIVEAU 1
    {en:'To get the ball rolling',fr:'Lancer les choses / démarrer',ctx:'"Let\'s get the ball rolling on this project."',lv:1},
    {en:'To be on the same page',fr:'Être sur la même longueur d\'onde',ctx:'"Are we on the same page about the deadline?"',lv:1},
    {en:'To call it a day',fr:'S\'arrêter pour aujourd\'hui',ctx:'"It\'s late, let\'s call it a day."',lv:1},
    {en:'To miss the boat',fr:'Rater le coche',ctx:'"We missed the boat on that opportunity."',lv:1},
    {en:'To bite the bullet',fr:'Prendre son courage à deux mains',ctx:'"We\'ll just have to bite the bullet and do it."',lv:1},
    {en:'To cut corners',fr:'Faire les choses à moitié / bâcler',ctx:'"Don\'t cut corners on safety."',lv:1},
    {en:'To go back to square one',fr:'Repartir de zéro',ctx:'"The plan failed, so we\'re back to square one."',lv:1},
    {en:'To read between the lines',fr:'Lire entre les lignes',ctx:'"Read between the lines — he\'s not happy."',lv:1},
    {en:'To be in the loop',fr:'Être dans la boucle / au courant',ctx:'"Keep me in the loop on this."',lv:1},
    {en:'To pull someone\'s leg',fr:'Faire marcher quelqu\'un',ctx:'"Are you serious? Or are you pulling my leg?"',lv:1},
    {en:'To hit the ground running',fr:'Démarrer sur les chapeaux de roues',ctx:'Très courant pour décrire quelqu\'un d\'opérationnel rapidement.',lv:1},
    {en:'To go the extra mile',fr:'Faire un effort supplémentaire',ctx:'"She always goes the extra mile for clients."',lv:1},
    {en:'To touch base',fr:'Faire un point rapide / reprendre contact',ctx:'"Let\'s touch base on Friday."',lv:1},
    {en:'To burn bridges',fr:'Couper les ponts définitivement',ctx:'"Don\'t burn bridges when you resign."',lv:1},
    {en:'Under the weather',fr:'Pas dans son assiette / légèrement malade',ctx:'"I\'m feeling a bit under the weather today."',lv:1},
    // NIVEAU 2
    {en:'To bite off more than you can chew',fr:'Voir trop grand / s\'embarquer dans trop de choses',ctx:'"We bit off more than we could chew with this project."',lv:2},
    {en:'To sit on the fence',fr:'Ne pas prendre position / être dans le flou',ctx:'"Stop sitting on the fence — which option do you prefer?"',lv:2},
    {en:'To keep a low profile',fr:'Se faire discret',ctx:'"Keep a low profile until the situation calms down."',lv:2},
    {en:'To push the envelope',fr:'Repousser les limites',ctx:'"This design really pushes the envelope."',lv:2},
    {en:'To play hardball',fr:'Jouer dur / ne faire aucune concession',ctx:'"They\'re playing hardball in this negotiation."',lv:2},
    {en:'To pick someone\'s brain',fr:'Profiter de l\'expertise de quelqu\'un',ctx:'"Can I pick your brain about this for 10 minutes?"',lv:2},
    {en:'To face the music',fr:'Faire face aux conséquences',ctx:'"Time to face the music and admit the mistake."',lv:2},
    {en:'To pass the buck',fr:'Renvoyer la responsabilité à quelqu\'un d\'autre',ctx:'"Stop passing the buck — take ownership."',lv:2},
    {en:'To throw someone under the bus',fr:'Faire porter le chapeau à quelqu\'un',ctx:'"He threw his colleague under the bus in the meeting."',lv:2},
    {en:'To move the needle',fr:'Faire avancer les choses de façon significative',ctx:'"What will actually move the needle on our growth?"',lv:2},
    {en:'To have skin in the game',fr:'Avoir des intérêts personnels en jeu',ctx:'"Investors with skin in the game make better decisions."',lv:2},
    {en:'To drop the ball',fr:'Laisser tomber / manquer à sa mission',ctx:'"We really dropped the ball on this delivery."',lv:2},
    {en:'To be ahead of the curve',fr:'Avoir de l\'avance / être visionnaire',ctx:'"They were ahead of the curve on electric vehicles."',lv:2},
    {en:'To burn the midnight oil',fr:'Travailler tard dans la nuit',ctx:'"We\'ve been burning the midnight oil to meet the deadline."',lv:2},
    {en:'At the drop of a hat',fr:'Sans hésiter / immédiatement',ctx:'"She\'d fly to New York at the drop of a hat."',lv:2},
    // NIVEAU 3
    {en:'To cut to the chase',fr:'Aller droit au but',ctx:'"Let\'s cut to the chase — what\'s the real issue?"',lv:3},
    {en:'To steal the show',fr:'Voler la vedette',ctx:'"The intern stole the show during the presentation."',lv:3},
    {en:'To get the hang of something',fr:'Prendre le coup de main pour quelque chose',ctx:'"It takes time but you\'ll get the hang of it."',lv:3},
    {en:'To hit the nail on the head',fr:'Mettre le doigt dessus / toucher juste',ctx:'"You hit the nail on the head with that analysis."',lv:3},
    {en:'To be on thin ice',fr:'Être sur un terrain glissant',ctx:'"He\'s on thin ice after missing the third deadline."',lv:3},
    {en:'Once in a blue moon',fr:'Très rarement / une fois tous les trente-six du mois',ctx:'"We only see him once in a blue moon."',lv:3},
    {en:'To give the benefit of the doubt',fr:'Accorder le bénéfice du doute',ctx:'"Give her the benefit of the doubt — it\'s her first mistake."',lv:3},
    {en:'To think outside the box',fr:'Sortir des sentiers battus',ctx:'Overused in business, but you\'ll hear it constantly.',lv:3},
    {en:'To stay in one\'s lane',fr:'Rester dans son domaine / ne pas empiéter',ctx:'"This is a legal matter — stay in your lane."',lv:3},
    {en:'To push back',fr:'Résister / exprimer un désaccord',ctx:'"I\'m going to push back on that assumption."',lv:3},
    {en:'To get a foot in the door',fr:'Mettre le pied dans la porte / obtenir une première opportunité',ctx:'"This internship will help you get a foot in the door."',lv:3},
    {en:'To take something with a grain of salt',fr:'Prendre quelque chose avec des pincettes',ctx:'"Take his estimates with a grain of salt."',lv:3},
    {en:'To read the room',fr:'Sentir l\'atmosphère / s\'adapter au contexte',ctx:'"You need to read the room before making that joke."',lv:3},
    {en:'To run something up the flagpole',fr:'Tester une idée / la soumettre pour validation',ctx:'"Let\'s run this idea up the flagpole and see what management thinks."',lv:3},
    {en:'To open a can of worms',fr:'Ouvrir la boîte de Pandore',ctx:'"Bringing up budget at this stage opens a can of worms."',lv:3},
  ]
},
tenses:{
  label:'Temps & auxiliaires',icon:'⏱️',color:'#EAFAF1',tc:'#1a6b3a',
  cards:[
    // NIVEAU 1
    {en:'I sent the report yesterday.',fr:'J\'ai envoyé le rapport hier.',ctx:'Simple past — moment précis dans le passé. Jamais avec "yesterday" + present perfect.',lv:1},
    {en:'I\'ve already sent the report.',fr:'J\'ai déjà envoyé le rapport.',ctx:'Present perfect — résultat présent, pas de moment précis.',lv:1},
    {en:'They might be stuck in traffic.',fr:'Ils sont peut-être bloqués dans les embouteillages.',ctx:'Might = possibilité présente (incertitude).',lv:1},
    {en:'You should call him back.',fr:'Tu devrais le rappeler.',ctx:'Should = conseil ou obligation morale légère.',lv:1},
    {en:'I used to commute two hours a day.',fr:'Je faisais deux heures de trajet par jour (autrefois).',ctx:'Used to = habitude passée révolue, n\'existe plus.',lv:1},
    {en:'He must be in a meeting.',fr:'Il doit être en réunion.',ctx:'Must = déduction logique au présent.',lv:1},
    {en:'Can I leave early today?',fr:'Est-ce que je peux partir tôt aujourd\'hui ?',ctx:'Can = capacité ou permission informelle.',lv:1},
    {en:'Could you send me the file?',fr:'Pourriez-vous m\'envoyer le fichier ?',ctx:'Could = plus poli que can pour une demande.',lv:1},
    {en:'I will call you tomorrow.',fr:'Je t\'appellerai demain.',ctx:'Will = promesse / décision spontanée.',lv:1},
    {en:'I\'m going to call him later.',fr:'Je vais l\'appeler plus tard.',ctx:'Going to = intention préalable / plan.',lv:1},
    // NIVEAU 2
    {en:'I\'ve been working on this for two hours.',fr:'Je travaille là-dessus depuis deux heures.',ctx:'Present perfect continuous — action qui a commencé dans le passé et continue.',lv:2},
    {en:'She had already left when I arrived.',fr:'Elle était déjà partie quand je suis arrivé.',ctx:'Past perfect — antériorité dans le passé.',lv:2},
    {en:'If I were you, I\'d wait a bit longer.',fr:'À ta place, j\'attendrais encore un peu.',ctx:'Conditionnel 2 — conseil hypothétique. "Were" pour toutes les personnes.',lv:2},
    {en:'You should have told me sooner.',fr:'Tu aurais dû me le dire plus tôt.',ctx:'Should have + pp = reproche ou regret sur le passé.',lv:2},
    {en:'He must have missed his flight.',fr:'Il a dû rater son vol.',ctx:'Must have + pp = déduction sur le passé.',lv:2},
    {en:'She could have handled it better.',fr:'Elle aurait pu mieux gérer ça.',ctx:'Could have + pp = possibilité non réalisée dans le passé.',lv:2},
    {en:'I was about to call you.',fr:'J\'allais justement t\'appeler.',ctx:'Was about to = sur le point de faire quelque chose.',lv:2},
    {en:'I\'d rather you didn\'t mention it.',fr:'Je préférerais que tu n\'en parles pas.',ctx:'Would rather + sujet + past simple.',lv:2},
    {en:'It\'s high time we made a decision.',fr:'Il est grand temps qu\'on prenne une décision.',ctx:'It\'s high time + past simple — urgence.',lv:2},
    {en:'He tends to overcomplicate things.',fr:'Il a tendance à trop compliquer les choses.',ctx:'Tend to = avoir tendance à (habitude neutre).',lv:2},
    {en:'I wish I had more time.',fr:'J\'aimerais avoir plus de temps.',ctx:'Wish + past simple = souhait présent irréel.',lv:2},
    {en:'I wish I had studied more.',fr:'J\'aurais aimé étudier davantage.',ctx:'Wish + past perfect = regret sur le passé.',lv:2},
    // NIVEAU 3
    {en:'I would have called you if I\'d known.',fr:'Je t\'aurais appelé si j\'avais su.',ctx:'Conditionnel 3 — irréel du passé. If + past perfect / would have + pp.',lv:3},
    {en:'By the end of the year, we\'ll have launched three products.',fr:'D\'ici la fin d\'année, nous aurons lancé trois produits.',ctx:'Future perfect — action achevée avant un moment futur.',lv:3},
    {en:'I\'m having the document reviewed.',fr:'Je fais relire le document.',ctx:'Have something done = faire faire par quelqu\'un d\'autre.',lv:3},
    {en:'We\'ve been trying to reach them all morning.',fr:'On essaie de les joindre depuis ce matin.',ctx:'Present perfect continuous — durée + résultat non atteint.',lv:3},
    {en:'He\'s bound to make mistakes at first.',fr:'Il va forcément faire des erreurs au début.',ctx:'Be bound to = certitude / inévitabilité.',lv:3},
    {en:'We\'re due to meet next Thursday.',fr:'Nous sommes censés nous réunir jeudi prochain.',ctx:'Be due to = prévu officiellement.',lv:3},
    {en:'Suppose he doesn\'t show up — what then?',fr:'Et s\'il ne vient pas — qu\'est-ce qu\'on fait ?',ctx:'Suppose / supposing = envisager une hypothèse.',lv:3},
    {en:'Get it done by Friday.',fr:'Fais en sorte que ce soit fait pour vendredi.',ctx:'Get something done = impératif de résultat.',lv:3},
    {en:'Unless I\'m mistaken, the deadline is Friday.',fr:'Sauf erreur de ma part, la date limite est vendredi.',ctx:'Unless = sauf si / à moins que.',lv:3},
    {en:'I can\'t help feeling that something is wrong.',fr:'Je ne peux pas m\'empêcher de sentir que quelque chose ne va pas.',ctx:'Can\'t help + gerund = ne pas pouvoir s\'empêcher de.',lv:3},
    {en:'I\'d sooner resign than do that.',fr:'Je préférerais démissionner plutôt que de faire ça.',ctx:'Would sooner = préférence forte (registre soutenu).',lv:3},
    {en:'What with the delays and the budget cuts, it\'s been a tough quarter.',fr:'Entre les retards et les coupes budgétaires, ce trimestre a été difficile.',ctx:'What with = étant donné / vu (liste de causes).',lv:3},
  ]
},
faux:{
  label:'Faux amis & pièges',icon:'⚠️',color:'#FDF0EF',tc:'#8b2020',
  cards:[
    // NIVEAU 1
    {en:'Actually',fr:'En fait / En réalité',ctx:'≠ Actuellement → currently / nowadays. "Actually, I disagree."',lv:1},
    {en:'Eventually',fr:'Finalement / À terme',ctx:'≠ Éventuellement → possibly / if need be. "Eventually he agreed."',lv:1},
    {en:'Currently',fr:'Actuellement / En ce moment',ctx:'≠ Couramment → fluently. "We\'re currently reviewing the contract."',lv:1},
    {en:'Library',fr:'Bibliothèque',ctx:'≠ Librairie → bookshop / bookstore.',lv:1},
    {en:'Attend',fr:'Assister à / Être présent',ctx:'≠ Attendre → to wait. "I attended the conference."',lv:1},
    {en:'Demand',fr:'Exiger (avec insistance)',ctx:'≠ Demander (poliment) → to ask. Très direct en anglais.',lv:1},
    {en:'Pretend',fr:'Faire semblant',ctx:'≠ Prétendre → to claim / to argue. "He pretended to be asleep."',lv:1},
    {en:'Sensible',fr:'Raisonnable / Judicieux',ctx:'≠ Sensible → sensitive. "That\'s a sensible decision."',lv:1},
    {en:'Comprehensive',fr:'Complet / Exhaustif',ctx:'≠ Compréhensible → understandable. "A comprehensive report."',lv:1},
    {en:'Assist',fr:'Aider / Assister',ctx:'≠ Assister à → to attend. "Can you assist me with this?"',lv:1},
    // NIVEAU 2
    {en:'Sympathetic',fr:'Compatissant / Compréhensif',ctx:'≠ Sympathique → nice / likeable. "She was very sympathetic."',lv:2},
    {en:'Issue',fr:'Problème / Point à traiter',ctx:'Issue (fr) = outcome en anglais. "We have an issue with the delivery."',lv:2},
    {en:'Consistent',fr:'Cohérent / Régulier',ctx:'≠ Consistant → substantial / thick. "Consistent results."',lv:2},
    {en:'Proper',fr:'Approprié / Véritable',ctx:'≠ Propre → clean. "A proper solution." / "Properly done."',lv:2},
    {en:'Efficient',fr:'Efficace (pour un système)',ctx:'Efficace (pour une personne) → effective. "An efficient process."',lv:2},
    {en:'Voyage',fr:'Périple en mer ou voyage long (registre soutenu)',ctx:'Voyage (fr) → trip / journey. "A voyage across the Atlantic."',lv:2},
    {en:'Phrase',fr:'Expression / Tournure',ctx:'Phrase (fr) → sentence. "A common phrase."',lv:2},
    {en:'College',fr:'Université / Établissement d\'enseignement supérieur',ctx:'Collège (fr) → middle school. "He\'s at college" = il est à la fac.',lv:2},
    {en:'Formidable',fr:'Redoutable / Impressionnant (pas forcément positif)',ctx:'En français = excellent. En anglais = qui inspire la crainte.',lv:2},
    {en:'Gentle',fr:'Doux / Délicat',ctx:'≠ Gentil → kind / nice. "A gentle reminder."',lv:2},
    // NIVEAU 3
    {en:'Brave',fr:'Courageux',ctx:'≠ Brave (fr) = good/kind → "a brave decision."',lv:3},
    {en:'Inconvenient',fr:'Peu pratique / Mal tombé',ctx:'≠ Inconvénient → drawback / downside. "Is this an inconvenient time?"',lv:3},
    {en:'Résumé',fr:'CV',ctx:'≠ Résumé (fr) → summary. "Send me your résumé."',lv:3},
    {en:'Deception',fr:'Tromperie / Mensonge',ctx:'≠ Déception → disappointment. "His deception shocked everyone."',lv:3},
    {en:'Misery',fr:'Souffrance / Détresse',ctx:'≠ Misère → poverty. "She was in misery after the loss."',lv:3},
    {en:'Sensibility',fr:'Sensibilité artistique / discernement',ctx:'≠ Sensibilité (émotionnelle) → sensitivity.',lv:3},
    {en:'Chance',fr:'Hasard / Occasion',ctx:'"By chance" = par hasard. La chance (bonne fortune) → luck.',lv:3},
    {en:'Sympathize',fr:'Comprendre / Compatir',ctx:'≠ Sympathiser → to get along with. "I sympathize with your situation."',lv:3},
    {en:'Particular',fr:'Spécifique / Précis',ctx:'Particulier (bizarre) → peculiar. "Any particular reason?"',lv:3},
    {en:'Lecture',fr:'Cours magistral / Conférence',ctx:'≠ Lecture (fr) → reading. "I attended a lecture on logistics."',lv:3},
  ]
},
travel:{
  label:'Voyage & quotidien',icon:'✈️',color:'#F0EAF8',tc:'#4a1a7a',
  cards:[
    // NIVEAU 1
    {en:'Is this seat taken?',fr:'Cette place est-elle prise ?',ctx:'Dans un train, avion, café.',lv:1},
    {en:'Can I get the bill, please?',fr:'L\'addition, s\'il vous plaît.',ctx:'Restaurant. "Check, please" aux États-Unis.',lv:1},
    {en:'I\'d like to check in, please.',fr:'Je voudrais m\'enregistrer, s\'il vous plaît.',ctx:'Aéroport / hôtel.',lv:1},
    {en:'I\'m just browsing, thank you.',fr:'Je regarde juste, merci.',ctx:'Pour éviter un vendeur trop insistant.',lv:1},
    {en:'Do you accept card payments?',fr:'Acceptez-vous les paiements par carte ?',ctx:'Partout dans le monde.',lv:1},
    {en:'How long is the wait?',fr:'Combien de temps faut-il attendre ?',ctx:'Restaurant, administration.',lv:1},
    {en:'Could you call me a cab, please?',fr:'Pourriez-vous m\'appeler un taxi ?',ctx:'Hôtel.',lv:1},
    {en:'I\'m here on a business trip.',fr:'Je suis là pour un voyage d\'affaires.',ctx:'À l\'aéroport, à la douane.',lv:1},
    {en:'Carry-on luggage',fr:'Bagage à main / bagage cabine',ctx:'≠ Checked luggage = bagage en soute.',lv:1},
    {en:'Round trip',fr:'Aller-retour',ctx:'≠ One-way = aller simple.',lv:1},
    // NIVEAU 2
    {en:'My luggage didn\'t make it.',fr:'Mes bagages ne sont pas arrivés.',ctx:'Après un vol. "Make it" = arriver à destination.',lv:2},
    {en:'I have a connecting flight in two hours.',fr:'J\'ai une correspondance dans deux heures.',ctx:'Connecting flight = vol avec escale.',lv:2},
    {en:'Is the tip included?',fr:'Le pourboire est-il inclus ?',ctx:'Essentiel aux États-Unis où le service n\'est pas inclus.',lv:2},
    {en:'I think there\'s a mistake on the bill.',fr:'Je crois qu\'il y a une erreur sur l\'addition.',ctx:'Poliment mais clairement.',lv:2},
    {en:'I\'d like a window seat if possible.',fr:'Je voudrais un siège côté hublot si possible.',ctx:'Window seat ≠ aisle seat (côté couloir).',lv:2},
    {en:'Could I have a wake-up call at 6am?',fr:'Pouvez-vous me réveiller à 6h ?',ctx:'Hôtel.',lv:2},
    {en:'I\'d like to extend my stay by one night.',fr:'Je voudrais prolonger mon séjour d\'une nuit.',ctx:'Hôtel.',lv:2},
    {en:'The exchange rate is not great right now.',fr:'Le taux de change n\'est pas terrible en ce moment.',ctx:'Utile pour négocier ou expliquer.',lv:2},
    {en:'Overbooked',fr:'Surbooké',ctx:'"The flight is overbooked" = il y a plus de passagers que de sièges.',lv:2},
    {en:'Layover',fr:'Escale (avec attente)',ctx:'A 3-hour layover in Dubai.',lv:2},
    // NIVEAU 3
    {en:'I\'ll have whatever you recommend.',fr:'Je prendrai ce que vous recommandez.',ctx:'Excellent pour montrer de la confiance et de l\'ouverture.',lv:3},
    {en:'Could you put it in a bag, please?',fr:'Pouvez-vous le mettre dans un sac ?',ctx:'Shopping.',lv:3},
    {en:'Is there a connection issue or is the flight direct?',fr:'Y a-t-il une correspondance ou le vol est-il direct ?',ctx:'"Direct flight" ≠ "non-stop" aux USA.',lv:3},
    {en:'I\'d like to flag an issue with my room.',fr:'Je voudrais signaler un problème avec ma chambre.',ctx:'Flag = signaler formellement. Plus poli que "there\'s a problem".',lv:3},
    {en:'Could you point me in the direction of…?',fr:'Pourriez-vous m\'indiquer la direction de… ?',ctx:'Plus naturel que "where is".',lv:3},
    {en:'I\'m afraid I won\'t be able to make the reservation.',fr:'Je crains de ne pas pouvoir honorer la réservation.',ctx:'Pour annuler poliment.',lv:3},
    {en:'Is there any chance of an upgrade?',fr:'Y aurait-il une possibilité de surclassement ?',ctx:'Hôtel / avion. Formulé comme une question ouverte.',lv:3},
    {en:'I\'m a frequent flyer with your airline.',fr:'Je suis membre du programme fidélité de votre compagnie.',ctx:'Fréquent flyer = voyageur régulier.',lv:3},
    {en:'The Wi-Fi in my room isn\'t working.',fr:'Le Wi-Fi dans ma chambre ne fonctionne pas.',ctx:'Hôtel.',lv:3},
    {en:'I\'d rather not be seated next to the galley.',fr:'Je préférerais ne pas être assis près de la cuisine.',ctx:'Galley = cuisine dans un avion.',lv:3},
  ]
},
natural:{
  label:'Tournures naturelles',icon:'✨',color:'#F0F0EE',tc:'#2a2a2a',
  cards:[
    // NIVEAU 1
    {en:'That works for me.',fr:'Ça me va.',ctx:'≠ "It\'s okay" trop hésitant. Confirme clairement.',lv:1},
    {en:'I\'ll keep you posted.',fr:'Je te tiens au courant.',ctx:'Keep someone posted = les informer au fur et à mesure.',lv:1},
    {en:'It slipped my mind.',fr:'Ça m\'était sorti de la tête.',ctx:'≠ "I forgot" trop direct.',lv:1},
    {en:'I\'m swamped at the moment.',fr:'Je suis débordé en ce moment.',ctx:'Swamped = submergé de travail.',lv:1},
    {en:'How does that sound?',fr:'Qu\'est-ce que tu en penses ? / Ça te va ?',ctx:'Pour clore une proposition et demander validation.',lv:1},
    {en:'Don\'t hesitate to reach out.',fr:'N\'hésite pas à me contacter.',ctx:'Reach out = contacter (email, phone). Formule de clôture.',lv:1},
    {en:'Something came up on my end.',fr:'Il s\'est passé quelque chose de mon côté.',ctx:'Pour expliquer un retard sans entrer dans les détails.',lv:1},
    {en:'Let me get back to you on that.',fr:'Je reviens vers toi là-dessus.',ctx:'≠ "I will think about it" trop vague.',lv:1},
    {en:'I appreciate you letting me know.',fr:'Merci de m\'avoir prévenu.',ctx:'≠ "Thank you for the information" trop froid.',lv:1},
    {en:'To be fair…',fr:'Pour être juste… / Soyons honnêtes…',ctx:'Pour nuancer une critique ou défendre quelqu\'un.',lv:1},
    // NIVEAU 2
    {en:'I\'m not sure I follow — could you elaborate?',fr:'Je ne suis pas sûr de suivre — tu peux développer ?',ctx:'≠ "I don\'t understand" trop abrupt.',lv:2},
    {en:'I was wondering if you\'d had a chance to look at this.',fr:'Je me demandais si tu avais eu l\'occasion de regarder ça.',ctx:'Relance polie. ≠ "Did you see my email?" trop direct.',lv:2},
    {en:'Just to make sure we\'re on the same page…',fr:'Juste pour qu\'on soit bien alignés…',ctx:'Pour reformuler et confirmer la compréhension.',lv:2},
    {en:'I\'d push back on that a little.',fr:'Je nuancerais ça légèrement / je ne suis pas totalement d\'accord.',ctx:'Désaccord poli. Push back = résister / questionner.',lv:2},
    {en:'It\'s a bit of a grey area.',fr:'C\'est un peu flou / dans une zone grise.',ctx:'Pour indiquer qu\'il n\'y a pas de réponse claire.',lv:2},

  if(D.lastNewDay!==today()){D.newToday=0;D.lastNewDay=today();sv();}
}

function fdue(due){
  const d=due-now();if(d<=0)return'<span style="color:var(--red)">à revoir</span>';
  const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(dy>=1)return'dans '+dy+'j';if(h>=1)return'dans '+h+'h';if(m>=1)return'dans '+m+'min';return'bientôt';
}

function starHTML(score){
  const colors=['','var(--red)','var(--red)','var(--orange)','var(--glite)','var(--gvif)'];
  const col=score>0?colors[score]:'var(--text3)';
  let h='<span style="color:'+col+'">';
  for(let i=1;i<=5;i++)h+=i<=score?'★':'☆';
  return h+'</span>';
}

function iV(){
  if(!window.speechSynthesis)return;
  function p(){const vs=window.speechSynthesis.getVoices();EV=vs.find(v=>v.lang==='en-US'&&v.name.includes('Samantha'))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));}
  p();window.speechSynthesis.onvoiceschanged=p;
}iV();

function spk(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;if(EV)u.voice=EV;
  window.speechSynthesis.speak(u);
}

// ─── EXPLORE ─────────────────────────────────────────────────────────────────
function getUnlockedCount(catKey){
  const cat=BANK[catKey];
  let unlocked=1;
  for(let i=0;i<cat.cards.length;i++){
    if(i===0){unlocked=1;continue;}
    const bk=catKey+'-'+(i-1);
    if(D.bankAdded[bk]){
      const addedCard=D.cards.find(c=>c.exploreKey===bk);
      if(addedCard&&addedCard.score>=4)unlocked=i+1;
      else if(D.bankAdded[bk])unlocked=Math.max(unlocked,i);
    }else break;
  }
  return Math.min(unlocked,cat.cards.length);
}

    const tot=cat.cards.length;
    const added=cat.cards.filter((_,i)=>D.bankAdded[key+'-'+i]).length;
    const unlocked=getUnlockedCount(key);
    const pct=Math.round((added/tot)*100);
    return`<div class="cat-card" style="background:${cat.color};color:${cat.tc}" onclick="bankCat='${key}';rExplore()">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.label}</div>
      <div class="cat-progress">${added}/${tot} ajoutées · ${unlocked} débloquées</div>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="explore-header">
      <div class="page-title">Explore</div>
      <div class="explore-desc">Contenu structuré en 3 niveaux. Atteins 4/5 sur une carte pour débloquer la suivante.</div>
    </div>
    <div class="cat-grid">${html}</div>
    <p style="font-size:12px;color:var(--text3);text-align:center">${addedAll} / ${totalAll} entrées ajoutées à tes decks</p>`;
}

function rExploreCat(el,key){
  const cat=BANK[key];
  const dOpts=D.decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  const unlocked=getUnlockedCount(key);
  const lvLabels={1:'Niveau 1',2:'Niveau 2',3:'Niveau 3'};
  const lvColors={1:'lv1',2:'lv2',3:'lv3'};
  let lastLv=0;
  const items=cat.cards.map((c,i)=>{
    const bk=key+'-'+i,done=!!D.bankAdded[bk],isLocked=i>=unlocked;
    const es=c.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    let lvHeader='';
    if(c.lv!==lastLv){lastLv=c.lv;lvHeader=`<div style="margin:${i>0?'18px':'4px'} 0 8px"><span class="level-badge ${lvColors[c.lv]}">${lvLabels[c.lv]}</span></div>`;}
    if(isLocked){
      return lvHeader+`<div class="bank-item" style="opacity:.4">
        <div class="bank-en" style="padding-right:30px">🔒 ${c.en}</div>
        <div class="bank-fr">${c.fr}</div>
        ${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}
      </div>`;
    }
    return lvHeader+`<div class="bank-item">
      <button class="add-btn ${done?'done':''}" onclick="addBCard('${key}',${i})" ${done?'disabled':''}>${done?'✓':'+'}</button>
      <div class="bank-en">${c.en} <button onclick="spk('${es}')" style="background:none;border:none;cursor:pointer;font-size:13px;vertical-align:middle">🔊</button></div>
      <div class="bank-fr">${c.fr}</div>
      ${c.ctx?`<div class="bank-note">${c.ctx}</div>`:''}
    </div>`;
  }).join('');
  el.innerHTML=`
    <button class="back-btn" onclick="bankCat=null;rExplore()">← Retour</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><span style="font-size:24px">${cat.icon}</span><span style="font-size:17px;font-weight:700">${cat.label}</span></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Obtiens 4/5 sur une carte pour débloquer la suivante.</p>
    <div class="form-row" style="margin-bottom:1rem"><label>Ajouter dans le deck</label><select id="bds">${dOpts}</select></div>
    ${items}`;
}

function addBCard(catKey,idx){
  resetDailyIfNeeded();
  if(D.newToday>=MAX_NEW_PER_DAY){alert('Limite quotidienne atteinte ('+MAX_NEW_PER_DAY+' nouvelles cartes). Reviens demain !');return;}
  const c=BANK[catKey].cards[idx],bk=catKey+'-'+idx;
  if(D.bankAdded[bk])return;
  const deckId=parseInt(document.getElementById('bds')?.value)||D.decks[0]?.id;
  D.cards.push({id:D.nextCardId++,deckId,a:c.en,b:c.fr,ctx:c.ctx||'',type:c.en.split(' ').length<=3?'mot':'phrase',dir:'en-fr',score:0,mult:1,due:0,fromBank:true,exploreKey:bk});
  D.bankAdded[bk]=true;D.newToday++;sv();
  rExploreCat(document.getElementById('s-explore'),bankCat);
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function rQuizTab(){
  const el=document.getElementById('s-quiz');
  if(!D.decks.length){el.innerHTML='<div class="empty">Crée un deck d\'abord.</div>';return;}
  el.innerHTML=`<div class="pill-row">${dPills(qDeck,'sQD',true)}</div><div id="qa"></div>`;
  stQuiz();
}
function sQD(id){qDeck=id;rQuizTab();}

function stQuiz(){
  const all=qDeck===null?D.cards:D.cards.filter(c=>c.deckId===qDeck);
  if(!all.length){document.getElementById('qa').innerHTML='<div class="empty">Aucune carte dans ce deck.</div>';return;}
  const due=all.filter(c=>c.due<=now()).sort(()=>Math.random()-.5);
  const nd=all.filter(c=>c.due>now()).sort((a,b)=>a.score-b.score);
  qCards=[...due,...nd.slice(0,Math.max(3,10-due.length))];
  qIdx=0;qScores=[];rQCard();
}

function enText(card){return card.dir==='fr-en'?card.b:card.a;}

function rQCard(){
  const area=document.getElementById('qa');if(!area)return;
  if(qIdx>=qCards.length){
    const avg=qScores.length?(qScores.reduce((a,b)=>a+b,0)/qScores.length).toFixed(1):'—';
    const t=today(),last=new Date(D.lastSession||0).toDateString(),yest=new Date(now()-86400000).toDateString();
    if(last!==t){D.streak=last===yest?(D.streak||0)+1:1;D.lastSession=now();sv();}
    area.innerHTML=`<div class="result"><div class="result-score">${avg}<span style="font-size:28px;font-weight:400">/5</span></div><div class="result-sub">${qScores.length} carte${qScores.length!==1?'s':''} révisée${qScores.length!==1?'s':''}</div><button class="btn-main" onclick="stQuiz()">Recommencer</button></div>`;
    return;
  }
  const card=qCards[qIdx],pct=Math.round((qIdx/qCards.length)*100);
  const duc=qCards.filter(c=>c.due<=now()).length;
  const isEF=card.dir!=='fr-en',q=isEF?card.a:card.b,ans=isEF?card.b:card.a;
  const safe=enText(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const tp=`<span class="tp ${card.fromBank?'tp-b':card.type==='mot'?'tp-m':'tp-p'}" style="font-size:11px">${card.fromBank?'Explore':card.type}</span>`;
  area.innerHTML=`
    <div class="quiz-stats">
      <div class="qs"><div class="qs-n">${qIdx}</div><div class="qs-l">Vues</div></div>
      <div class="qs"><div class="qs-n">${qCards.length-qIdx}</div><div class="qs-l">Restantes</div></div>
      <div class="qs"><div class="qs-n" style="color:${duc>0?'var(--red)':'var(--gvif)'}">${duc}</div><div class="qs-l">Dues</div></div>
    </div>
    <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-dir">${isEF?'Traduire en français':'Traduire en anglais'} · ${tp}</div>
      <div class="quiz-q">${q}</div>
      <button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button>
      <div id="az"></div>
    </div>
    <div id="qb" class="reveal-wrap"><button class="btn-main" style="max-width:240px;margin:0 auto" onclick="rvl()">Voir la réponse</button></div>`;
}

function rvl(){
  const card=qCards[qIdx];
  const isEF=card.dir!=='fr-en',ans=isEF?card.b:card.a;
  const safe=enText(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const ctxHtml=card.ctx?`<div class="quiz-ctx">${card.ctx}</div>`:'';
  document.getElementById('az').innerHTML=`<div class="quiz-ans">${ans}</div>${ctxHtml}<button class="audio-btn" style="margin-top:6px" onclick="spk('${safe}')">🔊 Réécouter</button>`;
  document.getElementById('qb').innerHTML=`<p class="score-hint">C'est acquis à quel niveau ?</p><div class="score-grid">${[1,2,3,4,5].map(s=>`<button class="score-btn sc${s}" onclick="rate(${s})"><span>${s}</span><span class="score-sub">${IL[s]}</span></button>`).join('')}</div>`;
}

function rate(s){
  const card=qCards[qIdx],real=D.cards.find(c=>c.id===card.id);
  if(real){
    real.score=s;
    const base=IV[s],mult=s>=4?(real.mult||1):1;
    real.due=now()+base*mult;
    real.mult=s>=4?Math.min((real.mult||1)*1.6,12):1;
  }
  qScores.push(s);sv();qIdx++;rQCard();
}

rHome();
</script>
