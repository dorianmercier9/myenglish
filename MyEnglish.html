<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyEnglish"/>
<title>MyEnglish</title>
<style>
:root{
  --accent:#1a5c38;--accent2:#2a7a4e;--accent-light:#e6f2eb;--accent-text:#0d3d24;
  --bg:#faf9f7;--bg2:#f2f1ee;--bg3:#e8e6e1;
  --text:#111111;--text2:#4a4a4a;--text3:#8a8a8a;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --r:11px;--rsm:7px;
  --red:#c0392b;--redbg:#fdf0ef;
  --orange:#c45c0a;--orangebg:#fef3e8;
  --gl:#27ae60;--glbg:#eafaf1;
  --gv:#0f7a30;--gvbg:#d4f0de;
  --blue:#1a4a7a;--bluebg:#eaf0f8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0e0c;--bg2:#181816;--bg3:#222220;
  --text:#f2f0ec;--text2:#9a9890;--text3:#555450;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#2a7a4e;--accent-light:#0a2018;--accent-text:#6dd49a;
  --redbg:#2a0f0d;--orangebg:#2a1400;--glbg:#0a2018;--gvbg:#082010;--bluebg:#0a1828;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem 1rem 0.5rem}
.nav{display:flex;border-top:0.5px solid var(--border2);background:var(--bg);padding-bottom:var(--safe-bottom);position:relative}
.nb{flex:1;background:none;border:none;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text3);font-size:9px;letter-spacing:.03em;text-transform:uppercase;font-weight:500;position:relative}
.nb.active{color:var(--accent)}
.nb svg{width:21px;height:21px;stroke-width:1.6;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.nb-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;pointer-events:none}
.screen{display:none}.screen.active{display:block}
.page-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
h1{font-size:24px;font-weight:700;letter-spacing:-.4px;line-height:1.2}
.home-hero{padding:.5rem 0 1rem}
.home-greeting{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:12px 8px;text-align:center;border:0.5px solid var(--border);cursor:default}
.stat.clickable{cursor:pointer}
.stat.clickable:active{opacity:.8}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.streak-card{background:var(--accent-light);border-radius:var(--r);padding:14px 16px;margin-bottom:1rem;border:0.5px solid rgba(26,92,56,.12);display:flex;align-items:center;gap:14px}
.streak-fire{font-size:32px;line-height:1}
.streak-info{flex:1}
.streak-n{font-size:26px;font-weight:700;color:var(--accent);line-height:1}
.streak-l{font-size:12px;color:var(--accent-text);margin-top:2px}
.streak-days{display:flex;gap:5px;margin-top:10px}
.streak-dot{width:26px;height:6px;border-radius:99px;background:var(--bg3)}
.streak-dot.done{background:var(--accent)}
.streak-dot.today{background:var(--accent2)}
.daily-goal{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;border:0.5px solid var(--border)}
.daily-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.daily-label{font-size:13px;color:var(--text);font-weight:500}
.daily-count{font-size:13px;color:var(--accent);font-weight:600}
.dbar{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden}
.dbar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.global-prog{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;border:0.5px solid var(--border)}
.gp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.gp-label{font-size:13px;color:var(--text);font-weight:500}
.gp-pct{font-size:13px;color:var(--text3)}
.gp-bar{background:var(--bg3);border-radius:99px;height:4px;overflow:hidden;margin-bottom:6px}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}
.gp-sub{font-size:11px;color:var(--text3)}
.notif-banner{background:var(--bluebg);border:0.5px solid var(--blue);border-radius:var(--r);padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.notif-banner-text{flex:1;font-size:13px;color:var(--blue)}
.notif-banner-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-main{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:9px}
.btn-main:active{opacity:.85}
.btn-sec{width:100%;background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:7px}
.btn-sec:active{opacity:.8}
.btn{border:none;border-radius:var(--rsm);padding:9px 15px;font-size:14px;font-weight:500;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}.btn-p:active{opacity:.85}
.btn-g{background:var(--bg3);color:var(--text2)}
.btn-sm{border:none;border-radius:var(--rsm);padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text2)}
.mastered-detail{background:var(--bg2);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.mastered-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)}
.mastered-row:last-child{border-bottom:none}
.mastered-cat{font-size:13px;color:var(--text2)}
.mastered-val{font-size:14px;font-weight:600;color:var(--accent)}
.theme-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.theme-item{background:var(--bg2);border-radius:var(--r);padding:13px 15px;cursor:pointer;border:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.theme-item:active{opacity:.8}
.theme-item-icon{width:36px;height:36px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg3)}
.theme-item-info{flex:1;min-width:0}
.theme-item-name{font-size:14px;font-weight:600}
.theme-item-meta{font-size:12px;color:var(--text3);margin-top:2px}
.theme-item-right{text-align:right;flex-shrink:0}
.due-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--redbg);color:var(--red);font-weight:600}
.ok-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--glbg);color:var(--gv);font-weight:600}
.dir-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--bg3);color:var(--text3);margin-left:4px}
.add-theme-btn{background:none;border:1px dashed var(--border2);border-radius:var(--r);padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);width:100%}
.form-box{background:var(--bg2);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;border:0.5px solid var(--border)}
.form-title{font-size:13px;font-weight:700;margin-bottom:13px;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;padding:10px 11px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.form-row textarea{height:52px;resize:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:6px}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:99px;padding:6px 13px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500}
.pill.active{background:var(--accent);color:#fff;border-color:transparent}
.section-header{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section-header-line{flex:1;height:0.5px;background:var(--border2)}
.card-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.card-item{background:var(--bg2);border-radius:var(--rsm);padding:11px 13px;display:flex;align-items:center;gap:9px;border:0.5px solid var(--border)}
.card-texts{flex:1;min-width:0}
.card-a{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-b{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-ctx{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-style:italic}
.card-right{text-align:right;white-space:nowrap;flex-shrink:0}
.card-due{font-size:10px;color:var(--text3);margin-top:3px}
.del-btn{background:none;border:none;font-size:14px;color:var(--text3);padding:4px 5px;cursor:pointer;flex-shrink:0}
.tp{display:inline-block;font-size:9px;padding:1px 6px;border-radius:99px;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.tp-p{background:var(--bluebg);color:var(--blue)}.tp-m{background:var(--orangebg);color:var(--orange)}.tp-b{background:var(--accent-light);color:var(--accent-text)}
.search-box{width:100%;font-size:14px;padding:9px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);outline:none;font-family:inherit;margin-bottom:10px}
.search-box:focus{border-color:var(--accent)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
.quiz-selector{margin-bottom:1rem}
.quiz-sel-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.quiz-sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.qsel-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2)}
.qsel-btn.active{background:var(--accent);color:#fff;border-color:transparent}
.qsel-btn:active{opacity:.8}
.qsel-icon{font-size:18px;margin-bottom:4px}
.quiz-stats{display:flex;gap:7px;margin-bottom:11px}
.qs{background:var(--bg2);border-radius:var(--rsm);padding:9px;flex:1;text-align:center;border:0.5px solid var(--border)}
.qs-n{font-size:19px;font-weight:700}
.qs-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.prog{background:var(--bg3);border-radius:99px;height:3px;margin-bottom:1.2rem;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.quiz-card{background:var(--bg2);border-radius:var(--r);padding:1.75rem 1.25rem;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:11px;margin-bottom:1rem;border:0.5px solid var(--border)}
.quiz-dir{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.quiz-q{font-size:21px;font-weight:600;line-height:1.4}
.quiz-ans{font-size:18px;font-weight:500;color:var(--accent);margin-top:5px;line-height:1.4}
.quiz-ctx{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px;padding:0 .75rem;line-height:1.5}
.discovery-badge{background:#fff3cd;color:#856404;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px;text-transform:uppercase;letter-spacing:.04em}
.audio-btn{background:none;border:0.5px solid var(--border2);border-radius:99px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px}
.audio-btn:active{background:var(--bg3)}
.write-input{width:100%;font-size:16px;padding:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);outline:none;font-family:inherit;text-align:center;margin-top:4px}
.write-input:focus{border-color:var(--accent)}
.write-compare{background:var(--bg3);border-radius:var(--rsm);padding:10px 14px;margin-top:8px;width:100%;text-align:left}
.write-yours{font-size:13px;color:var(--text2);margin-bottom:4px}
.write-correct{font-size:13px;color:var(--accent);font-weight:500}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:.5rem}
.score-btn{border-radius:var(--rsm);padding:10px 3px;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.score-btn:active{opacity:.75}
.score-sub{font-size:9px;font-weight:500;opacity:.8}
.sc1{background:var(--redbg);color:var(--red)}.sc2{background:#fef0e8;color:#b94a00}.sc3{background:var(--orangebg);color:var(--orange)}.sc4{background:var(--glbg);color:var(--gl)}.sc5{background:var(--gvbg);color:var(--gv)}
.score-hint{font-size:12px;color:var(--text2);margin-bottom:9px;text-align:center}
.reveal-wrap{text-align:center}
.result{text-align:center;padding:2.5rem 1rem}
.result-score{font-size:58px;font-weight:700;color:var(--accent)}
.result-sub{font-size:14px;color:var(--text2);margin:7px 0 1.5rem}
.explore-intro{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6;padding:12px 14px;background:var(--accent-light);border-radius:var(--r);border:0.5px solid rgba(26,92,56,.1)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:1.25rem}
.cat-card{border-radius:var(--r);padding:14px;cursor:pointer;border:none;text-align:left}
.cat-card:active{opacity:.85}
.cat-icon{font-size:20px;margin-bottom:7px}
.cat-name{font-size:13px;font-weight:600;line-height:1.3}
.cat-sub{font-size:11px;opacity:.7;margin-top:3px}
.level-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.lv1{background:#e8f4fd;color:#1a5276}.lv2{background:#fef9e7;color:#7d6608}.lv3{background:#fdf2f8;color:#76448a}
.bank-item{background:var(--bg2);border-radius:var(--rsm);padding:12px 13px;margin-bottom:7px;border:0.5px solid var(--border);position:relative}
.bank-en{font-size:14px;font-weight:500;padding-right:52px;line-height:1.4}
.bank-fr{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.bank-note{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic;line-height:1.4}
.add-btn{position:absolute;top:11px;right:10px;background:var(--accent);color:#fff;border:none;border-radius:99px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.add-btn.done{background:var(--bg3);color:var(--text3);cursor:default}
.locked-item{filter:blur(3px);pointer-events:none;user-select:none;opacity:.6}
.locked-section{text-align:center;padding:14px;background:var(--bg2);border-radius:var(--r);border:0.5px dashed var(--border2);margin-top:8px;font-size:13px;color:var(--text3)}
.back-btn{background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1rem;padding:0;display:flex;align-items:center;gap:5px;font-weight:500}
.plus-one{position:fixed;font-size:18px;font-weight:700;color:var(--accent);pointer-events:none;z-index:9999;animation:floatUp .8s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
.settings-section{margin-bottom:1.5rem}
.settings-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.settings-row{background:var(--bg2);border-radius:var(--rsm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--border)}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="content">
    <div id="s-home" class="screen active"></div>
    <div id="s-themes" class="screen"></div>
    <div id="s-fiches" class="screen"></div>
    <div id="s-quiz" class="screen"></div>
    <div id="s-explore" class="screen"></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="T('home')" id="n-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="nb" onclick="T('themes')" id="n-themes">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/></svg>
      <span>Thèmes</span>
    </button>
    <button class="nb" onclick="T('fiches')" id="n-fiches">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><rect x="6" y="3" width="12" height="5" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
      <span>Fiches</span>
    </button>
    <button class="nb" onclick="T('quiz')" id="n-quiz">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>Quiz</span>
    </button>
    <button class="nb" onclick="T('explore')" id="n-explore">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Explore</span>
    </button>
  </nav>
</div>
<script>
const SK='myenglish_v4';
const DAILY_GOAL=10;
const EXPLORE_DECK_ID=9999;
const IV_FLASH={1:600000,2:1800000,3:7200000,4:21600000,5:43200000};
const IV_MID={1:1800000,2:7200000,3:21600000,4:64800000,5:129600000};
const IV_NORM={1:3600000,2:10800000,3:28800000,4:86400000,5:172800000};
const IL_FLASH={1:'10min',2:'30min',3:'2h',4:'6h',5:'12h'};
const IL_MID={1:'30min',2:'2h',3:'6h',4:'18h',5:'36h'};
const IL_NORM={1:'1h',2:'3h',3:'8h',4:'1j',5:'2j'};

const BANK={
pro:{label:'Vocabulaire pro',icon:'💼',color:'#EAF2FF',tc:'#1a3a5c',cards:[
// LV1 — usage quotidien immédiat
{en:'The shipment has been delayed.',fr:'L\'expédition a été retardée.',ctx:'Due to customs / bad weather. Logistique de base.',lv:1},
{en:'Can you action this by end of day?',fr:'Tu peux t\'en occuper d\'ici fin de journée ?',ctx:'Action (verbe) = traiter / s\'occuper de. Typique des emails anglophones.',lv:1},
{en:'We need to align on the deliverables.',fr:'Nous devons nous aligner sur les livrables.',ctx:'Align on = se mettre d\'accord sur.',lv:1},
{en:'Let\'s circle back on this next week.',fr:'Revenons là-dessus la semaine prochaine.',ctx:'Circle back = revenir sur un sujet plus tard.',lv:1},
{en:'I\'ll follow up with the client.',fr:'Je relance le client.',ctx:'Follow up ≠ juste suivre — action proactive.',lv:1},
{en:'The invoice is pending approval.',fr:'La facture est en attente de validation.',ctx:'Pending = en attente de.',lv:1},
{en:'We\'re running behind schedule.',fr:'Nous avons du retard sur le planning.',ctx:'Behind schedule = en retard sur le calendrier.',lv:1},
{en:'Can we get a status update?',fr:'Peut-on avoir un point de situation ?',ctx:'Status update = état d\'avancement.',lv:1},
{en:'We need to escalate this to management.',fr:'Il faut remonter ça à la direction.',ctx:'Escalate = remonter dans la hiérarchie.',lv:1},
{en:'Let\'s take this offline.',fr:'Parlons-en en dehors de la réunion.',ctx:'Offline = en aparté, hors réunion.',lv:1},
{en:'Stakeholder',fr:'Partie prenante',ctx:'Personne impactée par ou impliquée dans un projet.',lv:1},
{en:'Milestone',fr:'Jalon / Étape clé',ctx:'Point de contrôle dans un projet.',lv:1},
{en:'Deliverable',fr:'Livrable',ctx:'Ce qu\'on s\'engage à remettre.',lv:1},
{en:'Bandwidth',fr:'Disponibilité (d\'une personne)',ctx:'"Do you have bandwidth?" = as-tu du temps disponible ?',lv:1},
{en:'Bottleneck',fr:'Goulot d\'étranglement',ctx:'Point de blocage qui ralentit tout.',lv:1},
{en:'Turnaround time',fr:'Délai d\'exécution',ctx:'Temps entre réception d\'une demande et livraison.',lv:1},
{en:'Headcount',fr:'Effectif',ctx:'Nombre de personnes dans une équipe.',lv:1},
{en:'I\'ll loop you in on the email.',fr:'Je t\'inclus dans l\'email.',ctx:'Loop in = inclure quelqu\'un dans la communication.',lv:1},
{en:'We\'re on track to meet the deadline.',fr:'Nous sommes en bonne voie pour respecter la date limite.',ctx:'On track = dans les temps.',lv:1},
{en:'Let\'s debrief after the call.',fr:'Faisons un point après l\'appel.',ctx:'Debrief = compte-rendu à chaud.',lv:1},
{en:'The figures don\'t add up.',fr:'Les chiffres ne sont pas cohérents.',ctx:'Don\'t add up = ne pas être logique / cohérent.',lv:1},
{en:'We need to get sign-off from legal.',fr:'Nous devons obtenir la validation du juridique.',ctx:'Sign-off = validation / approbation formelle.',lv:1},
{en:'This is a blocker for us.',fr:'C\'est un point bloquant pour nous.',ctx:'Blocker = obstacle qui empêche d\'avancer.',lv:1},
{en:'Going forward',fr:'Désormais / à l\'avenir',ctx:'"Going forward, all requests must go through the portal."',lv:1},
{en:'For the time being',fr:'Pour l\'instant / provisoirement',ctx:'"For the time being, keep using the old process."',lv:1},
// LV2 — registre professionnel intermédiaire
{en:'We need to streamline the approval process.',fr:'Il faut simplifier le processus de validation.',ctx:'Streamline = rendre plus fluide, éliminer les étapes inutiles.',lv:2},
{en:'The procurement team is renegotiating the terms.',fr:'L\'équipe achats renégocie les conditions.',ctx:'Procurement = achats / approvisionnement.',lv:2},
{en:'We\'re looking at a tight margin on this contract.',fr:'On est sur une marge serrée pour ce contrat.',ctx:'Tight margin = peu de marge financière.',lv:2},
{en:'The audit flagged several discrepancies.',fr:'L\'audit a relevé plusieurs écarts.',ctx:'Flag = signaler / relever un problème.',lv:2},
{en:'The cash flow forecast looks tight this month.',fr:'Les prévisions de trésorerie sont serrées ce mois-ci.',ctx:'Cash flow = flux de trésorerie.',lv:2},
{en:'The SLA was breached on three occasions.',fr:'Le SLA a été enfreint à trois reprises.',ctx:'SLA = Service Level Agreement.',lv:2},
{en:'We need to hedge against currency fluctuations.',fr:'Il faut se couvrir contre les fluctuations de devises.',ctx:'Hedge = se couvrir (terme financier).',lv:2},
{en:'I\'ll send over the breakdown after the meeting.',fr:'Je t\'envoie la ventilation après la réunion.',ctx:'Breakdown = décomposition détaillée des chiffres.',lv:2},
{en:'The tender was awarded to a competitor.',fr:'L\'appel d\'offres a été remporté par un concurrent.',ctx:'Tender = appel d\'offres.',lv:2},
{en:'Net margin',fr:'Marge nette',ctx:'Profit après déduction de tous les coûts.',lv:2},
{en:'Working capital',fr:'Besoin en fonds de roulement (BFR)',ctx:'Argent nécessaire au fonctionnement quotidien.',lv:2},
{en:'Churn rate',fr:'Taux d\'attrition',ctx:'Pourcentage de clients perdus sur une période.',lv:2},
{en:'Pain point',fr:'Point de friction / problème récurrent',ctx:'"What are the client\'s pain points?"',lv:2},
{en:'Leverage',fr:'Levier (avantage stratégique)',ctx:'"We have leverage in this negotiation."',lv:2},
{en:'Outstanding invoice',fr:'Facture impayée',ctx:'Outstanding = en souffrance / non réglé.',lv:2},
{en:'Pipeline',fr:'Portefeuille de prospects / projets',ctx:'"What\'s in your pipeline?"',lv:2},
{en:'We\'re seeing pushback from the client.',fr:'Nous rencontrons une résistance de la part du client.',ctx:'Pushback = résistance / opposition.',lv:2},
{en:'Let\'s put a pin in that for now.',fr:'Laissons ça de côté pour l\'instant.',ctx:'Put a pin in it = mettre en pause temporairement.',lv:2},
{en:'The project scope has been creeping.',fr:'Le périmètre du projet a dérivé.',ctx:'Scope creep = dérive non prévue du périmètre.',lv:2},
{en:'We need to get our ducks in a row.',fr:'Nous devons tout préparer / nous organiser.',ctx:'Get your ducks in a row = tout préparer avant de lancer.',lv:2},
{en:'We\'re firefighting at the moment.',fr:'Nous gérons des urgences en ce moment.',ctx:'Firefighting = gérer des crises urgentes en permanence.',lv:2},
{en:'The project is gaining momentum.',fr:'Le projet prend de l\'élan.',ctx:'Gaining momentum = accélérer / prendre de la vitesse.',lv:2},
{en:'Let\'s fast-track this.',fr:'Accélérons le processus.',ctx:'Fast-track = traiter en priorité.',lv:2},
{en:'We need to manage the fallout.',fr:'Nous devons gérer les répercussions.',ctx:'Fallout = conséquences négatives d\'une décision.',lv:2},
{en:'We need a hard stop at 3pm.',fr:'Nous devons impérativement terminer à 15h.',ctx:'Hard stop = fin absolue, pas de dépassement.',lv:2},
{en:'In due course',fr:'En temps voulu / le moment venu',ctx:'"You will be informed in due course."',lv:2},
{en:'At your discretion',fr:'À votre discrétion / selon votre jugement',ctx:'"The timeline is at your discretion."',lv:2},
{en:'To the best of my knowledge',fr:'À ma connaissance / pour autant que je sache',ctx:'"To the best of my knowledge, the contract is still valid."',lv:2},
{en:'Subject to board approval',fr:'Sous réserve de l\'approbation du conseil',ctx:'Subject to = conditionné par.',lv:2},
{en:'As of Monday',fr:'À compter de lundi / depuis lundi',ctx:'"As of Monday, the new policy is in effect."',lv:2},
// LV3 — registre avancé, expressions de haut niveau
{en:'We need to backfill this position urgently.',fr:'Il faut pourvoir ce poste de toute urgence.',ctx:'Backfill = remplacer quelqu\'un qui part.',lv:3},
{en:'The quarterly earnings beat expectations.',fr:'Les résultats trimestriels ont dépassé les attentes.',ctx:'Beat expectations = dépasser les prévisions.',lv:3},
{en:'We\'re scaling up operations in the region.',fr:'Nous développons les opérations dans la région.',ctx:'Scale up = monter en puissance.',lv:3},
{en:'We need to de-risk the supply chain.',fr:'Il faut réduire les risques dans la chaîne logistique.',ctx:'De-risk = atténuer les risques.',lv:3},
{en:'Runway',fr:'Durée de vie de la trésorerie',ctx:'"6 months of runway" = argent disponible pour 6 mois.',lv:3},
{en:'The deal fell through at the last minute.',fr:'La transaction a échoué à la dernière minute.',ctx:'Fall through = ne pas aboutir.',lv:3},
{en:'To sanity-check the figures',fr:'Vérifier que les chiffres tiennent la route',ctx:'"Can you sanity-check this?"',lv:3},
{en:'The margin compression is a concern.',fr:'La compression des marges est préoccupante.',ctx:'Margin compression = réduction des marges sous pression.',lv:3},
{en:'We need to build a business case for this.',fr:'Nous devons construire un argumentaire économique.',ctx:'Business case = dossier justifiant un investissement.',lv:3},
{en:'The ROI on this initiative is unclear.',fr:'Le retour sur investissement n\'est pas clair.',ctx:'ROI = Return on Investment.',lv:3},
{en:'This is a moving target.',fr:'C\'est une cible mouvante.',ctx:'Moving target = objectif qui change constamment.',lv:3},
{en:'We need to future-proof this solution.',fr:'Nous devons pérenniser cette solution.',ctx:'Future-proof = concevoir pour résister aux évolutions futures.',lv:3},
{en:'This needs to be stress-tested.',fr:'Cela doit être mis à l\'épreuve / testé en conditions extrêmes.',ctx:'Stress-test = tester la robustesse sous pression.',lv:3},
{en:'We\'re looking at a greenfield opportunity.',fr:'Nous sommes face à une opportunité vierge de tout héritage.',ctx:'Greenfield = projet entièrement nouveau, sans contraintes héritées.',lv:3},
{en:'Pursuant to our agreement',fr:'Conformément à notre accord / en vertu de notre accord',ctx:'Pursuant to = conformément à. Très formel, contrats.',lv:3},
{en:'Please treat this matter with the utmost urgency.',fr:'Veuillez traiter cette affaire avec la plus grande urgence.',ctx:'Utmost = extrême / le plus grand.',lv:3},
{en:'We\'re in the weeds on this.',fr:'Nous sommes perdus dans les détails.',ctx:'In the weeds = trop dans le détail, on perd la vue d\'ensemble.',lv:3},
]},
idioms:{label:'Expressions idiomatiques',icon:'🗣️',color:'#FEF9E7',tc:'#7d6608',cards:[
// LV1 — expressions très courantes
{en:'To get the ball rolling',fr:'Lancer les choses / démarrer',ctx:'"Let\'s get the ball rolling on this project."',lv:1},
{en:'To be on the same page',fr:'Être sur la même longueur d\'onde',ctx:'"Are we on the same page about the deadline?"',lv:1},
{en:'To call it a day',fr:'S\'arrêter pour aujourd\'hui',ctx:'"It\'s late, let\'s call it a day."',lv:1},
{en:'To miss the boat',fr:'Rater le coche',ctx:'"We missed the boat on that opportunity."',lv:1},
{en:'To bite the bullet',fr:'Prendre son courage à deux mains',ctx:'"We\'ll just have to bite the bullet and do it."',lv:1},
{en:'To cut corners',fr:'Faire les choses à moitié / bâcler',ctx:'"Don\'t cut corners on safety."',lv:1},
{en:'To go back to square one',fr:'Repartir de zéro',ctx:'"The plan failed — we\'re back to square one."',lv:1},
{en:'To read between the lines',fr:'Lire entre les lignes',ctx:'"Read between the lines — he\'s not happy."',lv:1},
{en:'To be in the loop',fr:'Être dans la boucle / au courant',ctx:'"Keep me in the loop on this."',lv:1},
{en:'To hit the ground running',fr:'Démarrer sur les chapeaux de roues',ctx:'Très courant pour quelqu\'un d\'opérationnel rapidement.',lv:1},
{en:'To go the extra mile',fr:'Faire un effort supplémentaire',ctx:'"She always goes the extra mile for clients."',lv:1},
{en:'To touch base',fr:'Faire un point rapide',ctx:'"Let\'s touch base on Friday." Très courant en pro.',lv:1},
{en:'To burn bridges',fr:'Couper les ponts définitivement',ctx:'"Don\'t burn bridges when you resign."',lv:1},
{en:'Under the weather',fr:'Pas dans son assiette / légèrement malade',ctx:'"I\'m feeling a bit under the weather today."',lv:1},
{en:'The ball is in your court',fr:'La balle est dans ton camp',ctx:'"I\'ve made my offer. The ball is in your court."',lv:1},
{en:'It\'s not rocket science',fr:'Ce n\'est pas sorcier',ctx:'"It\'s not rocket science — just follow the process."',lv:1},
{en:'To spill the beans',fr:'Vendre la mèche / révéler un secret',ctx:'"Who spilled the beans about the surprise?"',lv:1},
{en:'To see eye to eye',fr:'Être du même avis',ctx:'"We don\'t always see eye to eye on strategy."',lv:1},
// LV2 — expressions courantes mais moins évidentes
{en:'To bite off more than you can chew',fr:'Voir trop grand / s\'embarquer dans trop de choses',ctx:'"We bit off more than we could chew."',lv:2},
{en:'To sit on the fence',fr:'Ne pas prendre position',ctx:'"Stop sitting on the fence — which option?"',lv:2},
{en:'To play hardball',fr:'Jouer dur / ne faire aucune concession',ctx:'"They\'re playing hardball in this negotiation."',lv:2},
{en:'To pick someone\'s brain',fr:'Profiter de l\'expertise de quelqu\'un',ctx:'"Can I pick your brain about this for 10 minutes?"',lv:2},
{en:'To face the music',fr:'Faire face aux conséquences',ctx:'"Time to face the music and admit the mistake."',lv:2},
{en:'To pass the buck',fr:'Renvoyer la responsabilité à quelqu\'un d\'autre',ctx:'"Stop passing the buck — take ownership."',lv:2},
{en:'To throw someone under the bus',fr:'Faire porter le chapeau à quelqu\'un',ctx:'"He threw his colleague under the bus."',lv:2},
{en:'To move the needle',fr:'Faire avancer les choses de façon significative',ctx:'"What will actually move the needle on our growth?"',lv:2},
{en:'To drop the ball',fr:'Laisser tomber / manquer à sa mission',ctx:'"We really dropped the ball on this delivery."',lv:2},
{en:'To be ahead of the curve',fr:'Avoir de l\'avance / être visionnaire',ctx:'"They were ahead of the curve on electric vehicles."',lv:2},
{en:'To burn the midnight oil',fr:'Travailler tard dans la nuit',ctx:'"We\'ve been burning the midnight oil to meet the deadline."',lv:2},
{en:'To let the cat out of the bag',fr:'Vendre la mèche',ctx:'"He let the cat out of the bag about the merger."',lv:2},
{en:'To weather the storm',fr:'Surmonter la tempête / tenir bon',ctx:'"We managed to weather the storm during the crisis."',lv:2},
{en:'To get cold feet',fr:'Avoir le trac / reculer au dernier moment',ctx:'"He got cold feet before signing the contract."',lv:2},
{en:'To jump the gun',fr:'Brûler les étapes / agir prématurément',ctx:'"We jumped the gun announcing the partnership."',lv:2},
{en:'To throw in the towel',fr:'Jeter l\'éponge / abandonner',ctx:'"After months of trying, they threw in the towel."',lv:2},
{en:'To push back',fr:'Résister / exprimer un désaccord',ctx:'"I\'m going to push back on that assumption."',lv:2},
{en:'To cut someone some slack',fr:'Être indulgent / laisser un peu de marge',ctx:'"Cut him some slack — it\'s his first week."',lv:2},
{en:'To take the bull by the horns',fr:'Prendre le taureau par les cornes',ctx:'"We need to take the bull by the horns."',lv:2},
{en:'To add fuel to the fire',fr:'Jeter de l\'huile sur le feu',ctx:'"His comments just added fuel to the fire."',lv:2},
// LV3 — idiomes sophistiqués, niveau natif
{en:'To cut to the chase',fr:'Aller droit au but',ctx:'"Let\'s cut to the chase — what\'s the real issue?"',lv:3},
{en:'To get the hang of something',fr:'Prendre le coup de main',ctx:'"It takes time but you\'ll get the hang of it."',lv:3},
{en:'To hit the nail on the head',fr:'Mettre le doigt dessus / toucher juste',ctx:'"You hit the nail on the head with that analysis."',lv:3},
{en:'To be on thin ice',fr:'Être sur un terrain glissant',ctx:'"He\'s on thin ice after missing the third deadline."',lv:3},
{en:'Once in a blue moon',fr:'Très rarement',ctx:'"We only see him once in a blue moon."',lv:3},
{en:'To give the benefit of the doubt',fr:'Accorder le bénéfice du doute',ctx:'"Give her the benefit of the doubt."',lv:3},
{en:'To stay in one\'s lane',fr:'Rester dans son domaine / ne pas empiéter',ctx:'"This is a legal matter — stay in your lane."',lv:3},
{en:'To read the room',fr:'Sentir l\'atmosphère / s\'adapter au contexte',ctx:'"You need to read the room before making that joke."',lv:3},
{en:'To open a can of worms',fr:'Ouvrir la boîte de Pandore',ctx:'"Bringing up budget now opens a can of worms."',lv:3},
{en:'To take something with a grain of salt',fr:'Prendre quelque chose avec des pincettes',ctx:'"Take his estimates with a grain of salt."',lv:3},
{en:'To keep one\'s cards close to one\'s chest',fr:'Jouer serré / ne pas dévoiler ses intentions',ctx:'"She kept her cards close to her chest in negotiations."',lv:3},
{en:'To have a lot on one\'s plate',fr:'Avoir beaucoup à gérer / être débordé',ctx:'"I can\'t take this on — I have a lot on my plate."',lv:3},
{en:'To be barking up the wrong tree',fr:'Faire fausse piste',ctx:'"If you think I\'m responsible, you\'re barking up the wrong tree."',lv:3},
{en:'To bite the hand that feeds you',fr:'Mordre la main qui te nourrit',ctx:'"Be careful — don\'t bite the hand that feeds you."',lv:3},
{en:'To steal someone\'s thunder',fr:'Voler la vedette / couper l\'herbe sous le pied',ctx:'"She stole my thunder by announcing it first."',lv:3},
{en:'To speak volumes',fr:'En dire long / être très révélateur',ctx:'"His silence spoke volumes."',lv:3},
{en:'To walk a fine line',fr:'Marcher sur des œufs / trouver un équilibre délicat',ctx:'"We\'re walking a fine line between honesty and diplomacy."',lv:3},
{en:'To separate the wheat from the chaff',fr:'Séparer le bon grain de l\'ivraie',ctx:'"The interview process helps separate the wheat from the chaff."',lv:3},
]},
tenses:{label:'Temps & auxiliaires',icon:'⏱️',color:'#EAFAF1',tc:'#1a6b3a',cards:[
// LV1 — erreurs classiques des Français
{en:'I sent the report yesterday.',fr:'J\'ai envoyé le rapport hier.',ctx:'Simple past — moment précis dans le passé. JAMAIS "yesterday" + present perfect.',lv:1},
{en:'I\'ve already sent the report.',fr:'J\'ai déjà envoyé le rapport.',ctx:'Present perfect — résultat présent, sans moment précis.',lv:1},
{en:'They might be stuck in traffic.',fr:'Ils sont peut-être bloqués dans les embouteillages.',ctx:'Might = possibilité présente (incertitude).',lv:1},
{en:'You should call him back.',fr:'Tu devrais le rappeler.',ctx:'Should = conseil ou obligation morale légère.',lv:1},
{en:'I used to commute two hours a day.',fr:'Je faisais deux heures de trajet par jour autrefois.',ctx:'Used to = habitude passée révolue, n\'existe plus.',lv:1},
{en:'He must be in a meeting.',fr:'Il doit être en réunion.',ctx:'Must = déduction logique au présent.',lv:1},
{en:'Could you send me the file?',fr:'Pourriez-vous m\'envoyer le fichier ?',ctx:'Could = plus poli que "can" pour une demande.',lv:1},
{en:'I will call you tomorrow.',fr:'Je t\'appellerai demain.',ctx:'Will = promesse / décision spontanée au moment où on parle.',lv:1},
{en:'I\'m going to call him later.',fr:'Je vais l\'appeler plus tard.',ctx:'Going to = intention préalable / plan déjà décidé.',lv:1},
{en:'I\'ve just spoken to the client.',fr:'Je viens de parler au client.',ctx:'Present perfect + just = action très récente.',lv:1},
{en:'They\'ve been waiting for over an hour.',fr:'Ils attendent depuis plus d\'une heure.',ctx:'Present perfect continuous — durée en cours.',lv:1},
{en:'I was about to call you.',fr:'J\'allais justement t\'appeler.',ctx:'Was about to = sur le point de faire quelque chose.',lv:1},
// LV2 — structures intermédiaires mal maîtrisées
{en:'I\'ve been working on this for two hours.',fr:'Je travaille là-dessus depuis deux heures.',ctx:'Present perfect continuous — action commencée dans le passé et qui continue.',lv:2},
{en:'She had already left when I arrived.',fr:'Elle était déjà partie quand je suis arrivé.',ctx:'Past perfect — antériorité dans le passé.',lv:2},
{en:'If I were you, I\'d wait a bit longer.',fr:'À ta place, j\'attendrais encore un peu.',ctx:'Conditionnel 2 — conseil hypothétique. "Were" pour TOUTES les personnes.',lv:2},
{en:'You should have told me sooner.',fr:'Tu aurais dû me le dire plus tôt.',ctx:'Should have + pp = reproche ou regret sur le passé.',lv:2},
{en:'He must have missed his flight.',fr:'Il a dû rater son vol.',ctx:'Must have + pp = déduction sur le passé.',lv:2},
{en:'She could have handled it better.',fr:'Elle aurait pu mieux gérer ça.',ctx:'Could have + pp = possibilité non réalisée dans le passé.',lv:2},
{en:'I\'d rather you didn\'t mention it.',fr:'Je préférerais que tu n\'en parles pas.',ctx:'Would rather + sujet + past simple.',lv:2},
{en:'It\'s high time we made a decision.',fr:'Il est grand temps qu\'on prenne une décision.',ctx:'It\'s high time + past simple — urgence.',lv:2},
{en:'I wish I had more time.',fr:'J\'aimerais avoir plus de temps.',ctx:'Wish + past simple = souhait présent irréel.',lv:2},
{en:'I wish I had studied more.',fr:'J\'aurais aimé étudier davantage.',ctx:'Wish + past perfect = regret sur le passé.',lv:2},
{en:'He tends to overcomplicate things.',fr:'Il a tendance à trop compliquer les choses.',ctx:'Tend to = avoir tendance à (habitude neutre).',lv:2},
{en:'He\'ll be retiring next year.',fr:'Il prendra sa retraite l\'année prochaine.',ctx:'Will + continuous = futur presque certain, déjà prévu.',lv:2},
{en:'We should be seeing results within two weeks.',fr:'Nous devrions voir des résultats dans deux semaines.',ctx:'Should be + ing = attente raisonnée.',lv:2},
{en:'I\'m due to present the findings tomorrow.',fr:'Je suis censé présenter les conclusions demain.',ctx:'Be due to = prévu officiellement.',lv:2},
// LV3 — structures avancées
{en:'I would have called you if I\'d known.',fr:'Je t\'aurais appelé si j\'avais su.',ctx:'Conditionnel 3 — irréel du passé. If + past perfect / would have + pp.',lv:3},
{en:'By the end of the year, we\'ll have launched three products.',fr:'D\'ici fin d\'année, nous aurons lancé trois produits.',ctx:'Future perfect — action achevée avant un moment futur.',lv:3},
{en:'I\'m having the document reviewed.',fr:'Je fais relire le document.',ctx:'Have something done = faire faire par quelqu\'un d\'autre.',lv:3},
{en:'He\'s bound to make mistakes at first.',fr:'Il va forcément faire des erreurs au début.',ctx:'Be bound to = certitude / inévitabilité.',lv:3},
{en:'I can\'t help feeling that something is wrong.',fr:'Je ne peux pas m\'empêcher de sentir que quelque chose ne va pas.',ctx:'Can\'t help + gerund = ne pas pouvoir s\'empêcher de.',lv:3},
{en:'Unless I\'m mistaken, the deadline is Friday.',fr:'Sauf erreur de ma part, la date limite est vendredi.',ctx:'Unless = sauf si / à moins que.',lv:3},
{en:'Had I known earlier, I would have acted differently.',fr:'Si j\'avais su plus tôt, j\'aurais agi différemment.',ctx:'Inversion conditionnelle — structure avancée sans "if".',lv:3},
{en:'The report is to be submitted by Friday.',fr:'Le rapport doit être soumis avant vendredi.',ctx:'Is to be = obligation formelle / instruction officielle.',lv:3},
{en:'He is said to be the best in the field.',fr:'On dit qu\'il est le meilleur dans le domaine.',ctx:'Is said to be = on dit que / il est réputé.',lv:3},
{en:'I\'d sooner resign than do that.',fr:'Je préférerais démissionner plutôt que de faire ça.',ctx:'Would sooner = préférence forte (registre soutenu).',lv:3},
{en:'Were it not for your help, we would have failed.',fr:'N\'eût été votre aide, nous aurions échoué.',ctx:'Were it not for = sans / n\'eût été. Très formel.',lv:3},
{en:'No sooner had she arrived than the problems started.',fr:'À peine était-elle arrivée que les problèmes ont commencé.',ctx:'No sooner… than = à peine… que. Structure inversée.',lv:3},
]},
faux:{label:'Faux amis & pièges',icon:'⚠️',color:'#FDF0EF',tc:'#8b2020',cards:[
// LV1 — faux amis ultra-courants
{en:'Actually',fr:'En fait / En réalité',ctx:'≠ Actuellement → currently / nowadays. Erreur très fréquente.',lv:1},
{en:'Eventually',fr:'Finalement / À terme',ctx:'≠ Éventuellement → possibly / if need be. Piège classique.',lv:1},
{en:'Currently',fr:'Actuellement / En ce moment',ctx:'≠ Couramment → fluently.',lv:1},
{en:'Library',fr:'Bibliothèque',ctx:'≠ Librairie → bookshop / bookstore.',lv:1},
{en:'Attend',fr:'Assister à / Être présent',ctx:'≠ Attendre → to wait.',lv:1},
{en:'Demand',fr:'Exiger (avec insistance)',ctx:'≠ Demander → to ask. Demand est très direct en anglais.',lv:1},
{en:'Pretend',fr:'Faire semblant',ctx:'≠ Prétendre → to claim / to argue.',lv:1},
{en:'Sensible',fr:'Raisonnable / Judicieux',ctx:'≠ Sensible → sensitive.',lv:1},
{en:'Comprehensive',fr:'Complet / Exhaustif',ctx:'≠ Compréhensible → understandable.',lv:1},
{en:'Assist',fr:'Aider / Assister',ctx:'≠ Assister à → to attend.',lv:1},
{en:'Agenda',fr:'Ordre du jour',ctx:'≠ Agenda (planning) → schedule. "What\'s on the agenda?"',lv:1},
{en:'Delay',fr:'Retard',ctx:'≠ Délai → deadline / timeframe. Attention : "delay" est toujours négatif.',lv:1},
{en:'Realize',fr:'Se rendre compte',ctx:'≠ Réaliser (faire/accomplir) → to carry out / to achieve.',lv:1},
{en:'Lecture',fr:'Cours magistral / Conférence',ctx:'≠ Lecture (fr = action de lire) → reading.',lv:1},
{en:'Phrase',fr:'Expression / Tournure',ctx:'≠ Phrase (fr) → sentence.',lv:1},
// LV2 — faux amis intermédiaires
{en:'Sympathetic',fr:'Compatissant / Compréhensif',ctx:'≠ Sympathique → nice / likeable.',lv:2},
{en:'Issue',fr:'Problème / Point à traiter',ctx:'Issue (fr) = outcome en anglais. "We have an issue" ≠ "we have an outcome".',lv:2},
{en:'Consistent',fr:'Cohérent / Régulier',ctx:'≠ Consistant → substantial / thick.',lv:2},
{en:'Efficient',fr:'Efficace (pour un système)',ctx:'Efficace (pour une personne) → effective. Nuance importante.',lv:2},
{en:'Voyage',fr:'Périple long / voyage en mer',ctx:'Voyage (fr) = trip / journey. En anglais très spécifique.',lv:2},
{en:'College',fr:'Université / Établissement supérieur',ctx:'Collège (fr) → middle school. "He\'s at college" = il est à la fac.',lv:2},
{en:'Formidable',fr:'Redoutable / Impressionnant',ctx:'En français = excellent. En anglais = intimidant / impressionnant (pas forcément positif).',lv:2},
{en:'Gentle',fr:'Doux / Délicat',ctx:'≠ Gentil → kind / nice.',lv:2},
{en:'Important',fr:'Important / Significatif',ctx:'≠ Important (gros) → large / big.',lv:2},
{en:'Argument',fr:'Argument / Raisonnement',ctx:'≠ Argument (dispute) → quarrel / disagreement.',lv:2},
{en:'Concentration',fr:'Concentration (attention)',ctx:'≠ Concentration (entreprise) → merger / consolidation.',lv:2},
{en:'Proper',fr:'Approprié / Véritable',ctx:'≠ Propre → clean. "A proper solution."',lv:2},
{en:'Responsible',fr:'Responsable (accountable)',ctx:'≠ Responsable (personne en charge) → person in charge / manager.',lv:2},
// LV3 — faux amis subtils
{en:'Brave',fr:'Courageux',ctx:'≠ Brave (fr) = kind/good → "a brave decision."',lv:3},
{en:'Inconvenient',fr:'Peu pratique / Mal tombé',ctx:'≠ Inconvénient → drawback.',lv:3},
{en:'Résumé',fr:'CV',ctx:'≠ Résumé (fr) → summary.',lv:3},
{en:'Deception',fr:'Tromperie / Mensonge',ctx:'≠ Déception → disappointment.',lv:3},
{en:'Commodity',fr:'Matière première / produit de base',ctx:'≠ Commodité → convenience / comfort.',lv:3},
{en:'Sensibility',fr:'Sensibilité artistique / discernement',ctx:'≠ Sensibilité (émotionnelle) → sensitivity.',lv:3},
{en:'Sympathize',fr:'Comprendre / Compatir',ctx:'≠ Sympathiser → to get along with.',lv:3},
{en:'Chance',fr:'Hasard / Occasion',ctx:'"By chance" = par hasard. La chance (bonne fortune) = luck.',lv:3},
{en:'Misery',fr:'Souffrance / Détresse',ctx:'≠ Misère → poverty.',lv:3},
{en:'Particular',fr:'Spécifique / Précis',ctx:'Particulier (bizarre) → peculiar.',lv:3},
{en:'Distraction',fr:'Source d\'inattention',ctx:'≠ Distraction (divertissement) → entertainment / leisure.',lv:3},
{en:'Formation',fr:'Formation / Entraînement',ctx:'Training en anglais pro. "Formation" existe mais très formel.',lv:3},
]},
travel:{label:'Voyage & quotidien',icon:'✈️',color:'#F0EAF8',tc:'#4a1a7a',cards:[
// LV1 — situations de base
{en:'Is this seat taken?',fr:'Cette place est-elle prise ?',ctx:'Dans un train, avion, café.',lv:1},
{en:'Can I get the bill, please?',fr:'L\'addition, s\'il vous plaît.',ctx:'"Check, please" aux États-Unis.',lv:1},
{en:'I\'d like to check in, please.',fr:'Je voudrais m\'enregistrer, s\'il vous plaît.',ctx:'Aéroport / hôtel.',lv:1},
{en:'I\'m just browsing, thank you.',fr:'Je regarde juste, merci.',ctx:'Pour éviter un vendeur insistant.',lv:1},
{en:'Do you accept card payments?',fr:'Acceptez-vous les paiements par carte ?',ctx:'Partout dans le monde.',lv:1},
{en:'How long is the wait?',fr:'Combien de temps faut-il attendre ?',ctx:'Restaurant, administration.',lv:1},
{en:'I\'m here on a business trip.',fr:'Je suis là pour un voyage d\'affaires.',ctx:'À l\'aéroport, à la douane.',lv:1},
{en:'Carry-on luggage',fr:'Bagage à main / bagage cabine',ctx:'≠ Checked luggage = bagage en soute.',lv:1},
{en:'Round trip',fr:'Aller-retour',ctx:'≠ One-way = aller simple.',lv:1},
{en:'Could you call me a cab, please?',fr:'Pourriez-vous m\'appeler un taxi ?',ctx:'Hôtel.',lv:1},
{en:'What time does check-out start?',fr:'À partir de quelle heure commence le départ ?',ctx:'Check-out = départ de l\'hôtel.',lv:1},
{en:'What\'s the local emergency number?',fr:'Quel est le numéro d\'urgence local ?',ctx:'Essentiel à l\'étranger.',lv:1},
{en:'Could you recommend a good restaurant nearby?',fr:'Pourriez-vous recommander un bon restaurant à proximité ?',ctx:'Hôtel / auprès d\'un local.',lv:1},
// LV2 — situations intermédiaires
{en:'My luggage didn\'t make it.',fr:'Mes bagages ne sont pas arrivés.',ctx:'"Make it" = arriver à destination.',lv:2},
{en:'I have a connecting flight in two hours.',fr:'J\'ai une correspondance dans deux heures.',ctx:'Connecting flight = vol avec correspondance.',lv:2},
{en:'Is the tip included?',fr:'Le pourboire est-il inclus ?',ctx:'Essentiel aux États-Unis où le service n\'est pas inclus.',lv:2},
{en:'I think there\'s a mistake on the bill.',fr:'Je crois qu\'il y a une erreur sur l\'addition.',ctx:'Poliment mais clairement.',lv:2},
{en:'I\'d like a window seat if possible.',fr:'Je voudrais un siège côté hublot si possible.',ctx:'Window seat ≠ aisle seat (côté couloir).',lv:2},
{en:'Could I have a wake-up call at 6am?',fr:'Pouvez-vous me réveiller à 6h ?',ctx:'Hôtel.',lv:2},
{en:'I\'d like to extend my stay by one night.',fr:'Je voudrais prolonger mon séjour d\'une nuit.',ctx:'Hôtel.',lv:2},
{en:'Overbooked',fr:'Surbooké',ctx:'"The flight is overbooked." = plus de passagers que de sièges.',lv:2},
{en:'Layover',fr:'Escale (avec attente)',ctx:'"A 3-hour layover in Dubai."',lv:2},
{en:'I need to change my return flight.',fr:'Je dois modifier mon vol retour.',ctx:'Return flight = vol retour.',lv:2},
{en:'Is there a shuttle service to the airport?',fr:'Y a-t-il une navette pour l\'aéroport ?',ctx:'Shuttle = navette.',lv:2},
{en:'The exchange rate is not great right now.',fr:'Le taux de change n\'est pas terrible en ce moment.',ctx:'Utile pour négocier ou expliquer.',lv:2},
{en:'Can I store my luggage here until my room is ready?',fr:'Puis-je laisser mes bagages ici jusqu\'à ce que ma chambre soit prête ?',ctx:'Hôtel — arrivée anticipée.',lv:2},
{en:'In the event of a delay, please notify us immediately.',fr:'Dans le cas d\'un retard, veuillez nous en informer immédiatement.',ctx:'In the event of = dans le cas où / en cas de.',lv:2},
// LV3 — situations avancées / registre soutenu
{en:'I\'ll have whatever you recommend.',fr:'Je prendrai ce que vous recommandez.',ctx:'Excellent pour montrer de la confiance.',lv:3},
{en:'I\'d like to flag an issue with my room.',fr:'Je voudrais signaler un problème avec ma chambre.',ctx:'Flag = signaler formellement. Plus poli que "there\'s a problem".',lv:3},
{en:'Could you point me in the direction of…?',fr:'Pourriez-vous m\'indiquer la direction de… ?',ctx:'Plus naturel que "where is".',lv:3},
{en:'I\'m afraid I won\'t be able to make the reservation.',fr:'Je crains de ne pas pouvoir honorer la réservation.',ctx:'Pour annuler poliment.',lv:3},
{en:'Is there any chance of an upgrade?',fr:'Y aurait-il une possibilité de surclassement ?',ctx:'Hôtel / avion. Formulé comme une question ouverte.',lv:3},
{en:'I\'d like to lodge a complaint.',fr:'Je voudrais déposer une réclamation.',ctx:'Lodge a complaint = formuler une plainte officielle.',lv:3},
{en:'The flight has been diverted to another airport.',fr:'Le vol a été dérouté vers un autre aéroport.',ctx:'Diverted = dérouté.',lv:3},
{en:'Is there a non-stop flight or will there be a stopover?',fr:'Y a-t-il un vol direct ou y aura-t-il une escale ?',ctx:'Non-stop = sans escale. "Direct" peut avoir une escale aux USA.',lv:3},
{en:'I\'d rather not be seated next to the galley.',fr:'Je préférerais ne pas être assis près de la cuisine.',ctx:'Galley = cuisine dans un avion.',lv:3},
{en:'I\'m a frequent flyer with your airline.',fr:'Je suis membre du programme fidélité de votre compagnie.',ctx:'Frequent flyer = voyageur régulier.',lv:3},
]},
natural:{label:'Tournures naturelles',icon:'✨',color:'#F2F2F0',tc:'#2a2a2a',cards:[
// LV1 — tournures très courantes mal connues
{en:'That works for me.',fr:'Ça me va.',ctx:'≠ "It\'s okay" trop hésitant. Confirme clairement.',lv:1},
{en:'I\'ll keep you posted.',fr:'Je te tiens au courant.',ctx:'Keep someone posted = informer régulièrement.',lv:1},
{en:'It slipped my mind.',fr:'Ça m\'était sorti de la tête.',ctx:'≠ "I forgot" trop direct.',lv:1},
{en:'I\'m swamped at the moment.',fr:'Je suis débordé en ce moment.',ctx:'Swamped = submergé de travail.',lv:1},
{en:'How does that sound?',fr:'Qu\'est-ce que tu en penses ? Ça te va ?',ctx:'Pour clore une proposition et demander validation.',lv:1},
{en:'Don\'t hesitate to reach out.',fr:'N\'hésite pas à me contacter.',ctx:'Reach out = contacter. Formule de clôture email.',lv:1},
{en:'Something came up on my end.',fr:'Il s\'est passé quelque chose de mon côté.',ctx:'Pour expliquer un retard sans entrer dans les détails.',lv:1},
{en:'Let me get back to you on that.',fr:'Je reviens vers toi là-dessus.',ctx:'≠ "I will think about it" trop vague.',lv:1},
{en:'I appreciate you letting me know.',fr:'Merci de m\'avoir prévenu.',ctx:'≠ "Thank you for the information" trop froid.',lv:1},
{en:'I hear you.',fr:'Je comprends ce que tu veux dire.',ctx:'Exprime l\'empathie / la compréhension. ≠ "Je t\'entends".',lv:1},
{en:'Fair enough.',fr:'C\'est juste. / D\'accord.',ctx:'Pour concéder un point de façon décontractée.',lv:1},
{en:'What\'s your take on this?',fr:'Quel est ton avis là-dessus ?',ctx:'Take = point de vue / opinion.',lv:1},
{en:'That makes sense.',fr:'Ça a du sens. / Je comprends.',ctx:'Pour valider un raisonnement.',lv:1},
{en:'To be fair…',fr:'Pour être juste… / Soyons honnêtes…',ctx:'Pour nuancer une critique.',lv:1},
{en:'That\'s worth looking into.',fr:'Ça vaut la peine d\'y jeter un œil.',ctx:'Pour exprimer un intérêt modéré.',lv:1},
// LV2 — tournures professionnelles élaborées
{en:'I\'m not sure I follow — could you elaborate?',fr:'Je ne suis pas sûr de suivre — tu peux développer ?',ctx:'≠ "I don\'t understand" trop abrupt.',lv:2},
{en:'I was wondering if you\'d had a chance to look at this.',fr:'Je me demandais si tu avais eu l\'occasion de regarder ça.',ctx:'Relance polie. ≠ "Did you see my email?" trop direct.',lv:2},
{en:'Just to make sure we\'re on the same page…',fr:'Juste pour qu\'on soit bien alignés…',ctx:'Pour reformuler et confirmer la compréhension.',lv:2},
{en:'I\'d push back on that a little.',fr:'Je nuancerais ça légèrement.',ctx:'Désaccord poli. Push back = résister / questionner.',lv:2},
{en:'It\'s a bit of a grey area.',fr:'C\'est un peu flou / dans une zone grise.',ctx:'Pour indiquer qu\'il n\'y a pas de réponse claire.',lv:2},
{en:'I\'m not in a position to commit to that right now.',fr:'Je ne suis pas en mesure de m\'engager là-dessus.',ctx:'Refus professionnel poli sans fermer la porte.',lv:2},
{en:'That\'s not really my call to make.',fr:'Ce n\'est pas vraiment à moi de décider ça.',ctx:'Pour renvoyer une décision à qui de droit.',lv:2},
{en:'Can we take a step back?',fr:'Peut-on prendre un peu de recul ?',ctx:'Pour recadrer une discussion qui dérive.',lv:2},
{en:'That\'s a fair point.',fr:'C\'est un point valable.',ctx:'Pour concéder sans tout abandonner.',lv:2},
{en:'I\'ll take your word for it.',fr:'Je te crois sur parole.',ctx:'Accord sans vérification.',lv:2},
{en:'We\'ll have to play it by ear.',fr:'On verra au fur et à mesure.',ctx:'Play it by ear = improviser selon la situation.',lv:2},
{en:'It\'s not that I don\'t want to — I just can\'t right now.',fr:'Ce n\'est pas que je ne veux pas — je ne peux pas là.',ctx:'Pour refuser sans vexer.',lv:2},
{en:'Broadly speaking…',fr:'En termes généraux… / Grosso modo…',ctx:'Pour introduire une généralité.',lv:2},
{en:'Off the top of my head…',fr:'Comme ça de mémoire / sans vérifier…',ctx:'Pour donner une réponse approximative.',lv:2},
{en:'To put it bluntly…',fr:'Pour le dire sans détour…',ctx:'Pour annoncer quelque chose de direct.',lv:2},
{en:'That\'s beside the point.',fr:'C\'est hors sujet.',ctx:'Pour recentrer une conversation qui dévie.',lv:2},
{en:'I\'ll have to get back to you on the specifics.',fr:'Je devrai te revenir sur les détails.',ctx:'Pour ne pas s\'engager sans vérifier.',lv:2},
{en:'With that in mind…',fr:'En gardant cela à l\'esprit…',ctx:'Pour enchaîner sur une conséquence logique.',lv:2},
// LV3 — tournures de haut niveau
{en:'I might be wrong, but…',fr:'Je me trompe peut-être, mais…',ctx:'Introduire une opinion avec précaution (très anglais).',lv:3},
{en:'All things considered…',fr:'Tout bien réfléchi / Dans l\'ensemble…',ctx:'Pour conclure en tenant compte de tout.',lv:3},
{en:'At the end of the day…',fr:'En fin de compte…',ctx:'Très courant à l\'oral pour conclure.',lv:3},
{en:'I\'d be remiss not to mention…',fr:'Je manquerais à mon devoir si je ne mentionnais pas…',ctx:'Formule élégante pour soulever un point important.',lv:3},
{en:'I\'m going to have to level with you.',fr:'Je vais devoir être honnête avec toi.',ctx:'Level with someone = parler franchement.',lv:3},
{en:'Let\'s not beat around the bush.',fr:'Ne tournons pas autour du pot.',ctx:'Beat around the bush = éviter le sujet principal.',lv:3},
{en:'Let me caveat that by saying…',fr:'Je nuancerai cela en disant…',ctx:'Caveat = réserve / mise en garde. Très courant en business.',lv:3},
{en:'I\'d be inclined to agree.',fr:'Je serais enclin à être d\'accord.',ctx:'Formulation prudente pour exprimer un accord partiel.',lv:3},
{en:'Let\'s not lose sight of the bigger picture.',fr:'Ne perdons pas de vue la vue d\'ensemble.',ctx:'Bigger picture = vision globale / objectif général.',lv:3},
{en:'I defer to your judgment on this.',fr:'Je m\'en remets à ton jugement sur ce point.',ctx:'Defer to = s\'en remettre à.',lv:3},
{en:'That\'s a moot point.',fr:'C\'est un point discutable / sans objet.',ctx:'Moot point = point sans importance ou très débattu.',lv:3},
{en:'With all due respect…',fr:'Avec tout le respect que je vous dois…',ctx:'Précède souvent un désaccord fort.',lv:3},
]},
phrasal:{label:'Phrasal verbs',icon:'🔀',color:'#E8F8F5',tc:'#0e4d3a',cards:[
// LV1 — phrasal verbs essentiels
{en:'To follow up on something',fr:'Donner suite à / relancer',ctx:'"I\'ll follow up on this after the meeting."',lv:1},
{en:'To bring up a topic',fr:'Aborder / soulever un sujet',ctx:'"I\'d like to bring up a concern." ≠ "say".',lv:1},
{en:'To put off a meeting',fr:'Reporter une réunion',ctx:'"Can we put off the call until Thursday?"',lv:1},
{en:'To take on a project',fr:'Prendre en charge un projet',ctx:'"She took on too much work."',lv:1},
{en:'To come up with an idea',fr:'Trouver / proposer une idée',ctx:'"Can you come up with a solution by Friday?"',lv:1},
{en:'To look into a problem',fr:'Examiner / investiguer un problème',ctx:'"I\'ll look into this and get back to you."',lv:1},
{en:'To go over the details',fr:'Passer en revue les détails',ctx:'"Let\'s go over the numbers one more time."',lv:1},
{en:'To set up a meeting',fr:'Organiser une réunion',ctx:'"Can you set up a call for next week?"',lv:1},
{en:'To back down',fr:'Reculer / abandonner sa position',ctx:'"He backed down after the pushback."',lv:1},
{en:'To stand out',fr:'Se démarquer / ressortir',ctx:'"Her presentation really stood out."',lv:1},
{en:'To call off a meeting',fr:'Annuler une réunion',ctx:'"The meeting was called off."',lv:1},
{en:'To cut back on expenses',fr:'Réduire les dépenses',ctx:'"We need to cut back on travel costs."',lv:1},
{en:'To bring about a change',fr:'Provoquer / entraîner un changement',ctx:'"The new policy brought about significant changes."',lv:1},
{en:'To hand over responsibilities',fr:'Transmettre / céder des responsabilités',ctx:'"She handed over her role to a colleague."',lv:1},
{en:'To check in on someone',fr:'Prendre des nouvelles de quelqu\'un',ctx:'"I\'ll check in on you after the presentation."',lv:1},
// LV2 — phrasal verbs intermédiaires
{en:'To talk someone into something',fr:'Convaincre quelqu\'un de faire quelque chose',ctx:'"He talked me into attending the conference."',lv:2},
{en:'To talk someone out of something',fr:'Dissuader quelqu\'un de faire quelque chose',ctx:'"She talked him out of resigning."',lv:2},
{en:'To figure out a solution',fr:'Trouver / comprendre une solution',ctx:'"Let me figure out the best approach."',lv:2},
{en:'To run out of time',fr:'Manquer de temps',ctx:'"We ran out of time before covering everything."',lv:2},
{en:'To fall behind on deliverables',fr:'Prendre du retard sur les livrables',ctx:'"We\'re falling behind — we need more resources."',lv:2},
{en:'To pull off a deal',fr:'Réussir à conclure un accord',ctx:'"They pulled off an impressive deal."',lv:2},
{en:'To wrap up a meeting',fr:'Conclure / terminer une réunion',ctx:'"Let\'s wrap up — any final questions?"',lv:2},
{en:'To turn down an offer',fr:'Refuser une offre',ctx:'"We turned down their initial proposal."',lv:2},
{en:'To carry out a task',fr:'Exécuter / mener à bien une tâche',ctx:'"The team carried out the audit successfully."',lv:2},
{en:'To narrow down the options',fr:'Réduire le nombre d\'options',ctx:'"Let\'s narrow down to three candidates."',lv:2},
{en:'To kick off a project',fr:'Lancer / démarrer un projet',ctx:'"We\'ll kick off the new initiative next Monday."',lv:2},
{en:'To pick up the pace',fr:'Accélérer le rythme',ctx:'"We need to pick up the pace."',lv:2},
{en:'To run by someone',fr:'Soumettre une idée à quelqu\'un pour avis',ctx:'"Let me run this by the team before we decide."',lv:2},
{en:'To sort out a problem',fr:'Régler / résoudre un problème',ctx:'"Can you sort out the technical issues?"',lv:2},
{en:'To tie up loose ends',fr:'Régler les derniers détails en suspens',ctx:'"There are a few loose ends to tie up."',lv:2},
{en:'To step up to the plate',fr:'Se montrer à la hauteur',ctx:'"We need someone to step up to the plate on this."',lv:2},
{en:'To work around a constraint',fr:'Contourner une contrainte',ctx:'"We\'ll have to work around the budget limitation."',lv:2},
{en:'To draw up a contract',fr:'Rédiger un contrat',ctx:'"The lawyers are drawing up the agreement."',lv:2},
// LV3 — phrasal verbs avancés
{en:'To phase out a product',fr:'Supprimer progressivement un produit',ctx:'"We\'re phasing out the old model by Q4."',lv:3},
{en:'To roll out a new policy',fr:'Déployer une nouvelle politique',ctx:'"The new process will be rolled out next month."',lv:3},
{en:'To iron out the details',fr:'Régler les derniers détails',ctx:'"We still need to iron out a few things."',lv:3},
{en:'To head off a problem',fr:'Anticiper / prévenir un problème',ctx:'"Let\'s head off this issue before it escalates."',lv:3},
{en:'To come across as confident',fr:'Paraître / donner l\'impression d\'être confiant',ctx:'"You came across as very professional."',lv:3},
{en:'To live up to expectations',fr:'Être à la hauteur des attentes',ctx:'"The product didn\'t live up to the hype."',lv:3},
{en:'To tap into a market',fr:'Exploiter / pénétrer un marché',ctx:'"We need to tap into the Asian market."',lv:3},
{en:'To sign off on a decision',fr:'Donner son approbation finale',ctx:'"The board needs to sign off on this."',lv:3},
{en:'To weigh up the options',fr:'Peser / évaluer les options',ctx:'"We need to weigh up all the options before deciding."',lv:3},
{en:'To zero in on a target',fr:'Se concentrer précisément sur une cible',ctx:'"Let\'s zero in on the most profitable segment."',lv:3},
{en:'To shore up a position',fr:'Consolider / renforcer une position',ctx:'"They\'re trying to shore up their market position."',lv:3},
{en:'To account for a discrepancy',fr:'Expliquer / justifier un écart',ctx:'"How do you account for the 15% variance?"',lv:3},
{en:'To back up claims with data',fr:'Étayer ses arguments avec des données',ctx:'"Can you back up that claim with data?"',lv:3},
{en:'To wind down operations',fr:'Réduire progressivement les activités',ctx:'"They\'re winding down operations in the region."',lv:3},
{en:'To trigger a clause',fr:'Déclencher une clause',ctx:'"Missing the deadline would trigger the penalty clause."',lv:3},
]},
emails:{label:'Emails & registres',icon:'✉️',color:'#FEF4E8',tc:'#7a3a0a',cards:[
// LV1 — formules d'email de base
{en:'I hope this email finds you well.',fr:'J\'espère que vous allez bien.',ctx:'Ouverture email formelle standard. Très utilisée.',lv:1},
{en:'Please find attached the document you requested.',fr:'Veuillez trouver ci-joint le document demandé.',ctx:'Find attached = ci-joint.',lv:1},
{en:'I am writing to follow up on my previous email.',fr:'Je vous écris pour donner suite à mon email précédent.',ctx:'Pour relancer sans agressivité.',lv:1},
{en:'Could you please let me know your thoughts?',fr:'Pourriez-vous me faire part de votre avis ?',ctx:'Pour demander un retour.',lv:1},
{en:'I will get back to you as soon as possible.',fr:'Je reviendrai vers vous dès que possible.',ctx:'Engagement de réponse.',lv:1},
{en:'Thank you for your prompt response.',fr:'Merci pour votre réponse rapide.',ctx:'Prompt = rapide, sans délai.',lv:1},
{en:'Please do not hesitate to contact me.',fr:'N\'hésitez pas à me contacter.',ctx:'Formule de clôture standard.',lv:1},
{en:'As per our conversation earlier today…',fr:'Comme convenu lors de notre échange de ce jour…',ctx:'As per = conformément à / comme convenu.',lv:1},
{en:'I look forward to hearing from you.',fr:'Dans l\'attente de votre retour.',ctx:'Formule de clôture très courante.',lv:1},
{en:'Thank you for reaching out.',fr:'Merci de nous avoir contactés.',ctx:'Pour répondre à une prise de contact entrante.',lv:1},
{en:'I\'m writing on behalf of…',fr:'J\'écris au nom de…',ctx:'On behalf of = au nom de / pour le compte de.',lv:1},
{en:'Please see my comments in red below.',fr:'Veuillez trouver mes commentaires en rouge ci-dessous.',ctx:'Courant lors de révisions de documents partagés.',lv:1},
// LV2 — formules intermédiaires
{en:'Just a gentle reminder that the deadline is approaching.',fr:'Un petit rappel que la date limite approche.',ctx:'Gentle reminder = rappel poli, non agressif.',lv:2},
{en:'I\'m reaching out regarding the proposal we discussed.',fr:'Je vous contacte au sujet de la proposition dont nous avons discuté.',ctx:'Reaching out = prendre contact.',lv:2},
{en:'Please advise on the best way to proceed.',fr:'Merci de m\'indiquer la meilleure façon de procéder.',ctx:'Please advise = formule formelle pour demander une direction.',lv:2},
{en:'I wanted to flag a potential issue with the timeline.',fr:'Je voulais signaler un problème potentiel avec le calendrier.',ctx:'Flag = signaler de façon proactive.',lv:2},
{en:'Could we schedule a call at your earliest convenience?',fr:'Pourrait-on planifier un appel dès que possible ?',ctx:'At your earliest convenience = dès que vous le pouvez.',lv:2},
{en:'I\'m looping in [name] who will be handling this going forward.',fr:'J\'inclus [nom] qui prendra en charge cela à l\'avenir.',ctx:'Loop in = inclure quelqu\'un dans la boucle.',lv:2},
{en:'Apologies for the delayed response.',fr:'Toutes mes excuses pour la réponse tardive.',ctx:'Ouverture pour une réponse en retard.',lv:2},
{en:'I\'m copying [name] for visibility.',fr:'Je mets [nom] en copie pour information.',ctx:'For visibility = pour que tout le monde soit au courant.',lv:2},
{en:'As a heads-up, the deadline has moved.',fr:'Pour information, la date limite a changé.',ctx:'Heads-up = avertissement préventif.',lv:2},
{en:'Happy to jump on a call if that\'s easier.',fr:'Je peux faire un appel rapide si c\'est plus simple.',ctx:'Jump on a call = passer un coup de fil.',lv:2},
{en:'Please disregard my previous email.',fr:'Veuillez ignorer mon email précédent.',ctx:'Pour corriger une erreur d\'envoi.',lv:2},
{en:'I trust you received my previous message.',fr:'Je suppose que vous avez bien reçu mon message précédent.',ctx:'Pour une relance formelle.',lv:2},
{en:'I wanted to circle back on the points raised in our last meeting.',fr:'Je voulais revenir sur les points soulevés lors de notre dernière réunion.',ctx:'Circle back = revenir sur un sujet.',lv:2},
{en:'Could you please confirm receipt of this email?',fr:'Pourriez-vous confirmer la réception de cet email ?',ctx:'Confirm receipt = accuser réception.',lv:2},
{en:'I hope I\'m not catching you at a bad time.',fr:'J\'espère que je ne vous contacte pas à un mauvais moment.',ctx:'Pour des appels ou messages impromptu.',lv:2},
// LV3 — registre très formel / avancé
{en:'Further to my email below, I would like to add…',fr:'En complément de mon email ci-dessous…',ctx:'Further to = en complément de. Courant en UK.',lv:3},
{en:'I trust this is in order.',fr:'Je suppose que tout est en ordre.',ctx:'Formule de clôture formelle.',lv:3},
{en:'Please be advised that…',fr:'Veuillez noter que…',ctx:'Formule officielle pour annoncer un changement.',lv:3},
{en:'I would be grateful if you could…',fr:'Je vous serais reconnaissant de bien vouloir…',ctx:'Très formel. Degré de politesse élevé.',lv:3},
{en:'As discussed, I have actioned the following points.',fr:'Comme convenu, j\'ai traité les points suivants.',ctx:'As discussed = comme convenu.',lv:3},
{en:'I\'ll escalate this matter if I do not hear back by end of week.',fr:'Je ferai remonter ce sujet si je n\'ai pas de retour d\'ici vendredi.',ctx:'Pour formaliser une relance avec une conséquence.',lv:3},
{en:'Further to our call this morning, please find the agreed actions below.',fr:'Suite à notre appel de ce matin, veuillez trouver les actions convenues ci-dessous.',ctx:'Pour formaliser par écrit ce qui a été dit oralement.',lv:3},
{en:'I would appreciate your earliest response.',fr:'Je vous serais reconnaissant de bien vouloir répondre rapidement.',ctx:'Très poli mais implique une certaine urgence.',lv:3},
{en:'I am afraid we are unable to accommodate your request at this time.',fr:'Je crains que nous ne soyons pas en mesure d\'accéder à votre demande.',ctx:'Accommodate = accéder à / satisfaire.',lv:3},
{en:'With immediate effect',fr:'Avec effet immédiat',ctx:'"The change applies with immediate effect."',lv:3},
{en:'Henceforth',fr:'Désormais / dorénavant (très formel)',ctx:'"Henceforth, all invoices must be approved in advance."',lv:3},
{en:'In lieu of a meeting, let\'s do a written update.',fr:'En lieu et place d\'une réunion, faisons une mise à jour écrite.',ctx:'In lieu of = à la place de.',lv:3},
]},
collocations:{label:'Collocations & grammaire',icon:'🔗',color:'#EAF2FF',tc:'#1a3a6a',cards:[
// LV1 — collocations très courantes
{en:'Make a decision',fr:'Prendre une décision',ctx:'≠ Take a decision (moins courant en anglais américain).',lv:1},
{en:'Make progress',fr:'Faire des progrès',ctx:'"We\'re making good progress on the project."',lv:1},
{en:'Take responsibility',fr:'Prendre ses responsabilités',ctx:'"He took full responsibility for the mistake."',lv:1},
{en:'Pay attention',fr:'Faire attention / être attentif',ctx:'"Pay attention to the details."',lv:1},
{en:'Meet a deadline',fr:'Respecter une deadline',ctx:'"We need to meet the Friday deadline."',lv:1},
{en:'Raise a concern',fr:'Soulever une préoccupation',ctx:'"I\'d like to raise a concern about the timeline."',lv:1},
{en:'Run a meeting',fr:'Animer / diriger une réunion',ctx:'"She runs the weekly team meeting."',lv:1},
{en:'Set a goal',fr:'Fixer un objectif',ctx:'"Let\'s set clear goals for Q3."',lv:1},
{en:'Keep in touch',fr:'Rester en contact',ctx:'"Let\'s keep in touch after the project."',lv:1},
{en:'Take the initiative',fr:'Prendre l\'initiative',ctx:'"Don\'t wait to be asked — take the initiative."',lv:1},
{en:'Give a presentation',fr:'Faire une présentation',ctx:'≠ Make a presentation (moins courant).',lv:1},
{en:'Provide feedback',fr:'Donner un retour / un feedback',ctx:'"Could you provide feedback on the draft?"',lv:1},
{en:'Build a relationship',fr:'Construire une relation',ctx:'"It takes time to build a solid relationship."',lv:1},
{en:'Address a concern',fr:'Répondre à / traiter une préoccupation',ctx:'"I\'d like to address the concerns raised earlier."',lv:1},
{en:'Not only… but also…',fr:'Non seulement… mais aussi…',ctx:'"Not only did we miss the deadline, but we also went over budget."',lv:1},
{en:'The more… the more…',fr:'Plus… plus…',ctx:'"The more data we have, the more accurate our model."',lv:1},
// LV2 — collocations et structures intermédiaires
{en:'Draw a conclusion',fr:'Tirer une conclusion',ctx:'"It\'s too early to draw any conclusions."',lv:2},
{en:'Reach an agreement',fr:'Parvenir à un accord',ctx:'"Both parties reached an agreement."',lv:2},
{en:'Handle a situation',fr:'Gérer une situation',ctx:'"How do you plan to handle this situation?"',lv:2},
{en:'Strike a balance',fr:'Trouver un équilibre',ctx:'"We need to strike a balance between quality and speed."',lv:2},
{en:'Bridge a gap',fr:'Combler un écart / une lacune',ctx:'"This training will help bridge the skills gap."',lv:2},
{en:'Drive results',fr:'Produire des résultats',ctx:'"He\'s known for driving results under pressure."',lv:2},
{en:'Gain traction',fr:'Prendre de l\'élan',ctx:'"The new product is gaining traction in the market."',lv:2},
{en:'Lay the groundwork',fr:'Poser les bases',ctx:'"We spent months laying the groundwork for this launch."',lv:2},
{en:'Break even',fr:'Atteindre le seuil de rentabilité',ctx:'"We expect to break even by Q2."',lv:2},
{en:'Exceed expectations',fr:'Dépasser les attentes',ctx:'"The results exceeded our initial expectations."',lv:2},
{en:'Manage expectations',fr:'Gérer les attentes',ctx:'"It\'s important to manage client expectations early."',lv:2},
{en:'Close a deal',fr:'Conclure un accord',ctx:'"The sales team closed three deals this week."',lv:2},
{en:'Allocate resources',fr:'Allouer des ressources',ctx:'"We need to allocate more resources to this project."',lv:2},
{en:'Despite + noun',fr:'Malgré + nom',ctx:'"Despite the setbacks, we delivered on time."',lv:2},
{en:'Provided that / As long as',fr:'À condition que / tant que',ctx:'"We\'ll proceed, provided that the budget is approved."',lv:2},
{en:'Rather than',fr:'Plutôt que de',ctx:'"Rather than complaining, let\'s find a solution."',lv:2},
{en:'Due to / Owing to',fr:'En raison de / dû à',ctx:'"Due to the storm, flights were cancelled."',lv:2},
{en:'Whereas',fr:'Alors que / tandis que (contraste)',ctx:'"Sales went up, whereas costs remained stable."',lv:2},
// LV3 — collocations avancées et structures complexes
{en:'Optimize a process',fr:'Optimiser un processus',ctx:'"We\'re looking to optimize the onboarding process."',lv:3},
{en:'Streamline operations',fr:'Rationaliser les opérations',ctx:'"The merger will help streamline our operations."',lv:3},
{en:'Mitigate risk',fr:'Atténuer / limiter un risque',ctx:'"We need to mitigate the operational risk."',lv:3},
{en:'Foster collaboration',fr:'Favoriser la collaboration',ctx:'"Leadership should foster collaboration across teams."',lv:3},
{en:'Unlock value',fr:'Créer / libérer de la valeur',ctx:'"The merger is expected to unlock significant value."',lv:3},
{en:'Articulate a vision',fr:'Formuler / exprimer une vision',ctx:'"A good leader can articulate a clear vision."',lv:3},
{en:'Calibrate expectations',fr:'Ajuster / cadrer les attentes',ctx:'"Let\'s calibrate expectations before the client call."',lv:3},
{en:'Capitalize on an opportunity',fr:'Tirer parti d\'une opportunité',ctx:'"We need to capitalize on this market window."',lv:3},
{en:'Demonstrate value',fr:'Démontrer sa valeur',ctx:'"This project is our chance to demonstrate value."',lv:3},
{en:'It goes without saying that',fr:'Il va sans dire que',ctx:'"It goes without saying that quality is non-negotiable."',lv:3},
{en:'Needless to say',fr:'Inutile de dire / cela va sans dire',ctx:'"Needless to say, we were disappointed."',lv:3},
{en:'Be that as it may',fr:'Quoi qu\'il en soit',ctx:'"Be that as it may, we still need a solution."',lv:3},
{en:'To the extent that',fr:'Dans la mesure où',ctx:'"To the extent that resources allow, we will expand."',lv:3},
{en:'In so far as',fr:'Dans la mesure où / pour autant que',ctx:'"Insofar as I know, the deal is still on the table."',lv:3},
{en:'By virtue of',fr:'En vertu de / grâce à',ctx:'"By virtue of his experience, he was promoted."',lv:3},
]},

nuances:{label:'Nuances & registres',icon:'🎭',color:'#F9EAFB',tc:'#5a1a7a',cards:[
// LV1 — désaccord et formulations de base
{en:'I disagree.',fr:'Je ne suis pas d\'accord.',ctx:'Direct. Correct mais peut sembler abrupt en contexte pro.',lv:1},
{en:'I\'m not sure I agree.',fr:'Je ne suis pas sûr d\'être d\'accord.',ctx:'Plus doux — ouvre le débat sans confronter.',lv:1},
{en:'I see your point, but…',fr:'Je vois ce que tu veux dire, mais…',ctx:'Reconnaît l\'argument avant de le nuancer.',lv:1},
{en:'Can you?',fr:'Tu peux ?',ctx:'Très informel. Réservé aux collègues proches.',lv:1},
{en:'Would you mind…?',fr:'Cela vous dérangerait-il de… ?',ctx:'Très poli. Attend une réponse positive.',lv:1},
