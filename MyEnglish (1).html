{en:'Reach an agreement',fr:'Parvenir à un accord',ctx:'"Both parties reached an agreement."',lv:2},
{en:'Handle a situation',fr:'Gérer une situation',ctx:'"How do you plan to handle this situation?"',lv:2},
{en:'Strike a balance',fr:'Trouver un équilibre',ctx:'"We need to strike a balance between quality and speed."',lv:2},
{en:'Bridge a gap',fr:'Combler un écart / une lacune',ctx:'"This training will help bridge the skills gap."',lv:2},
{en:'Drive results',fr:'Produire des résultats',ctx:'"He\'s known for driving results under pressure."',lv:2},
{en:'Gain traction',fr:'Prendre de l\'élan',ctx:'"The new product is gaining traction in the market."',lv:2},
{en:'Lay the groundwork',fr:'Poser les bases',ctx:'"We spent months laying the groundwork for this launch."',lv:2},
{en:'Break even',fr:'Atteindre le seuil de rentabilité',ctx:'"We expect to break even by Q2."',lv:2},
{en:'Exceed expectations',fr:'Dépasser les attentes',ctx:'"The results exceeded our initial expectations."',lv:2},
{en:'Manage expectations',fr:'Gérer les attentes',ctx:'"It\'s important to manage client expectations early."',lv:2},
{en:'Close a deal',fr:'Conclure un accord',ctx:'"The sales team closed three deals this week."',lv:2},
{en:'Allocate resources',fr:'Allouer des ressources',ctx:'"We need to allocate more resources to this project."',lv:2},
{en:'Despite + noun',fr:'Malgré + nom',ctx:'"Despite the setbacks, we delivered on time."',lv:2},
{en:'Provided that / As long as',fr:'À condition que / tant que',ctx:'"We\'ll proceed, provided that the budget is approved."',lv:2},

nuances:{label:'Nuances & registres',icon:'🎭',color:'#F9EAFB',tc:'#5a1a7a',cards:[
// LV1 — désaccord et formulations de base
{en:'I disagree.',fr:'Je ne suis pas d\'accord.',ctx:'Direct. Correct mais peut sembler abrupt en contexte pro.',lv:1},
{en:'I\'m not sure I agree.',fr:'Je ne suis pas sûr d\'être d\'accord.',ctx:'Plus doux — ouvre le débat sans confronter.',lv:1},
{en:'I see your point, but…',fr:'Je vois ce que tu veux dire, mais…',ctx:'Reconnaît l\'argument avant de le nuancer.',lv:1},
{en:'Can you?',fr:'Tu peux ?',ctx:'Très informel. Réservé aux collègues proches.',lv:1},
{en:'Would you mind…?',fr:'Cela vous dérangerait-il de… ?',ctx:'Très poli. Attend une réponse positive.',lv:1},
{en:'I\'m afraid I can\'t make it.',fr:'Je crains de ne pas pouvoir venir.',ctx:'Poli pour décliner une invitation ou une réunion.',lv:1},
{en:'Sorry, can\'t make it.',fr:'Désolé, je ne peux pas venir.',ctx:'Très informel. Entre amis ou collègues proches.',lv:1},
{en:'Regrettably, I will be unable to attend.',fr:'Malheureusement, il m\'est impossible d\'assister.',ctx:'Très formel. Email officiel.',lv:1},
{en:'I need this done.',fr:'J\'ai besoin que ça soit fait.',ctx:'Direct. Ton assertif, légèrement autoritaire.',lv:1},
{en:'It would be great if you could…',fr:'Ce serait super si tu pouvais…',ctx:'Informel mais positif. Bon entre collègues.',lv:1},
{en:'That\'s interesting — I\'d look at it differently.',fr:'C\'est intéressant — je l\'envisagerais différemment.',ctx:'Désaccord très poli et ouvert.',lv:1},
// LV2 — nuances professionnelles
{en:'If I may, I\'d like to raise a point.',fr:'Si vous me le permettez, je voudrais soulever un point.',ctx:'Formel. Pour interrompre poliment en réunion.',lv:2},
{en:'It might be worth considering…',fr:'Il pourrait valoir la peine d\'envisager…',ctx:'Très poli, suggère sans imposer.',lv:2},
{en:'Have you considered…?',fr:'Avez-vous envisagé… ?',ctx:'Invite à la réflexion sans dicter une réponse.',lv:2},
{en:'We can\'t do that.',fr:'Nous ne pouvons pas faire ça.',ctx:'Direct. Peut paraître dur selon le contexte.',lv:2},
{en:'That may not be feasible at this stage.',fr:'Cela ne semble pas faisable à ce stade.',ctx:'Doux et professionnel. Laisse une porte ouverte.',lv:2},
{en:'I\'m afraid that\'s outside the scope of what we can offer.',fr:'Je crains que ce soit en dehors de ce que nous pouvons offrir.',ctx:'Refus formel et poli.',lv:2},
{en:'I think there may be a misunderstanding.',fr:'Je pense qu\'il y a peut-être un malentendu.',ctx:'Très diplomatique. Corrige sans confronter.',lv:2},
{en:'The data tells a slightly different story.',fr:'Les données racontent une histoire légèrement différente.',ctx:'Contredire avec des faits, pas des opinions.',lv:2},
{en:'Do you have a moment? I\'d like to discuss something.',fr:'Tu as un moment ? Je voudrais discuter de quelque chose.',ctx:'Plus doux que "We need to talk".',lv:2},
{en:'I think we should…',fr:'Je pense qu\'on devrait…',ctx:'Direct mais inclusif. Bon en réunion d\'équipe.',lv:2},
{en:'I expected a different outcome.',fr:'Je m\'attendais à un résultat différent.',ctx:'Exprime la déception sans accusation.',lv:2},
{en:'Let me be direct.',fr:'Laissez-moi être direct.',ctx:'Annonce une vérité difficile. Prépare l\'interlocuteur.',lv:2},
// LV3 — registre très élaboré
{en:'It seems there may have been a miscommunication on our end.',fr:'Il semblerait qu\'il y ait eu un problème de communication de notre côté.',ctx:'Très diplomatique. Assume une responsabilité partagée.',lv:3},
{en:'I have significant concerns about this approach.',fr:'J\'ai de sérieuses réserves concernant cette approche.',ctx:'Formel et sérieux sans être agressif.',lv:3},
{en:'With respect, I think we\'re missing the bigger picture.',fr:'Avec tout le respect que je vous dois, je pense qu\'on passe à côté.',ctx:'Désaccord fort mais respectueux.',lv:3},
{en:'I hear what you\'re saying, and I\'d push back on that.',fr:'Je comprends ce que tu dis, et je nuancerais ça.',ctx:'Écoute active + désaccord articulé.',lv:3},
{en:'To put it diplomatically, the results were underwhelming.',fr:'Pour le dire diplomatiquement, les résultats étaient décevants.',ctx:'Sous-entendu clair derrière la formulation polie.',lv:3},
{en:'I\'m not in a position to speak to that.',fr:'Je ne suis pas en mesure de me prononcer là-dessus.',ctx:'Pour refuser de commenter sans mentir.',lv:3},
]},
connectors:{label:'Connecteurs & structures',icon:'🔄',color:'#F5F0FF',tc:'#3a1a7a',cards:[
// LV1 — connecteurs de base
{en:'Therefore',fr:'Donc / par conséquent',ctx:'"The data is incomplete. Therefore, we cannot proceed."',lv:1},
{en:'However',fr:'Cependant / toutefois',ctx:'"The plan is solid. However, the budget is a concern."',lv:1},
{en:'Furthermore',fr:'De plus / qui plus est',ctx:'"Furthermore, the timeline is too aggressive."',lv:1},
{en:'Nevertheless',fr:'Néanmoins / malgré tout',ctx:'"It was risky. Nevertheless, we proceeded."',lv:1},
{en:'Moreover',fr:'De plus / en outre',ctx:'"The product is excellent. Moreover, it\'s competitively priced."',lv:1},
{en:'In other words',fr:'En d\'autres termes / autrement dit',ctx:'"In other words, we\'re out of time."',lv:1},
{en:'For instance',fr:'Par exemple',ctx:'Slightly more formal than "for example".',lv:1},
{en:'On the other hand',fr:'D\'un autre côté',ctx:'"On the other hand, the risks are significant."',lv:1},
{en:'To sum up',fr:'Pour résumer / en résumé',ctx:'"To sum up, we need to act fast."',lv:1},
{en:'In short',fr:'En bref / bref',ctx:'"In short, the plan didn\'t work."',lv:1},
{en:'In contrast',fr:'En contraste / à l\'inverse',ctx:'"In contrast, our European division performed well."',lv:1},
{en:'In addition to',fr:'En plus de / outre',ctx:'"In addition to the delays, we faced quality issues."',lv:1},
{en:'Above all',fr:'Surtout / avant tout',ctx:'"Above all, we need to maintain quality."',lv:1},
{en:'As a result',fr:'Par conséquent / en conséquence',ctx:'"Sales dropped. As a result, we had to cut costs."',lv:1},
{en:'Not only… but also…',fr:'Non seulement… mais aussi…',ctx:'"Not only did we miss the deadline, but we also went over budget."',lv:1},
// LV2 — connecteurs intermédiaires
{en:'As such',fr:'En tant que tel / à ce titre',ctx:'"It\'s a pilot project. As such, we expect some issues."',lv:2},
{en:'Accordingly',fr:'Par conséquent / en conséquence',ctx:'"The budget was cut. Accordingly, the team was reduced."',lv:2},
{en:'Conversely',fr:'À l\'inverse / inversement',ctx:'"Sales rose in Q1. Conversely, Q2 saw a decline."',lv:2},
{en:'In turn',fr:'En retour / à son tour',ctx:'"Trust builds loyalty. Loyalty, in turn, drives retention."',lv:2},
{en:'To this end',fr:'À cette fin / dans ce but',ctx:'"We need to cut costs. To this end, we\'re reviewing all contracts."',lv:2},
{en:'On balance',fr:'Tout compte fait / dans l\'ensemble',ctx:'"On balance, the benefits outweigh the risks."',lv:2},
{en:'Broadly speaking',fr:'En termes généraux',ctx:'"Broadly speaking, the strategy is sound."',lv:2},
{en:'Strictly speaking',fr:'À proprement parler / strictement',ctx:'"Strictly speaking, this falls outside our remit."',lv:2},
{en:'At first glance',fr:'À première vue',ctx:'"At first glance, the numbers look good."',lv:2},
{en:'With this in mind',fr:'En gardant cela à l\'esprit',ctx:'"With this in mind, let me explain our approach."',lv:2},
{en:'With regard to',fr:'En ce qui concerne / concernant',ctx:'"With regard to your proposal, we have a few questions."',lv:2},
{en:'In light of',fr:'À la lumière de / compte tenu de',ctx:'"In light of recent events, we need to reassess."',lv:2},
{en:'As opposed to',fr:'Par opposition à / contrairement à',ctx:'"We\'re focusing on quality, as opposed to volume."',lv:2},
{en:'That is to say',fr:'C\'est-à-dire',ctx:'More formal version of "in other words".',lv:2},
{en:'In the interim',fr:'Dans l\'intervalle / entre-temps',ctx:'"In the interim, please use the old system."',lv:2},
// LV3 — connecteurs avancés
{en:'In the final analysis',fr:'En dernière analyse / au bout du compte',ctx:'"In the final analysis, it comes down to execution."',lv:3},
{en:'To put it another way',fr:'Autrement dit / pour le dire autrement',ctx:'"To put it another way, we\'re running out of runway."',lv:3},
{en:'In essence',fr:'En substance / pour l\'essentiel',ctx:'"In essence, the proposal is sound."',lv:3},
{en:'Taken as a whole',fr:'Dans l\'ensemble / pris globalement',ctx:'"Taken as a whole, the results are encouraging."',lv:3},

function getMode(){const t=D.totalReviewed||0;return t<30?'flash':t<100?'mid':'norm';}
const BASE_IV={1:5*60000,2:30*60000,3:12*3600000,4:24*3600000,5:3*24*3600000};
const BASE_IL={1:'5min',2:'30min',3:'12h',4:'1j',5:'3j'};
function getIV(s,card){
  if(!card||!card.totalRatings)return Math.min(BASE_IV[s],BASE_IV[3]);
  if(s>=4)return BASE_IV[s]*(card.mult||1);
  return BASE_IV[s];
}
function getIL(s,card){
  if(!card||!card.totalRatings){return s>=4?'12h (1ère vue)':BASE_IL[s];}
  if(s>=4){
    const ms=BASE_IV[s]*(card.mult||1);
    const dy=Math.round(ms/86400000);
    if(dy>=1)return dy+'j';
    return Math.round(ms/3600000)+'h';
  }
  return BASE_IL[s];
}

function fdue(due){
  const d=due-now();if(d<=0)return'<span style="color:var(--red)">à revoir</span>';
  const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(dy>=1)return'dans '+dy+'j';if(h>=1)return'dans '+h+'h';if(m>=1)return'dans '+m+'min';return'bientôt';
}
function stars(s){
  const c=s===0?'var(--text3)':s<=2?'var(--red)':s===3?'var(--orange)':s===4?'var(--green)':'#15803d';
  return`<span class="stars" style="color:${c}">${'★'.repeat(s)+'☆'.repeat(5-s)}</span>`;
}

function spk(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.88;if(EV)u.voice=EV;window.speechSynthesis.speak(u);}
function spkCtx(ctx){
  if(!ctx)return;
  const q=ctx.match(/[""]([^""]+)[""]/);if(q){spk(q[1]);return;}
  const q2=ctx.match(/'([^']{10,})'/);if(q2){spk(q2[1]);return;}
  spk(ctx.split(/[≠→]|= /)[0].trim());
}

function getEligiblePool(){

    if(c.due<now_-7*86400000)return false;

}
function getComposedDesc(){

function getQuizCards(){
  if(qMode==='all')return D.cards;
  if(qMode==='themes')return qDeck?D.cards.filter(c=>c.deckId===qDeck):D.cards.filter(c=>!c.fromBank);
  if(qMode==='explore'){
    if(qExploreCat){
      if(qExploreCat.startsWith('meta_')){
        const mk=qExploreCat.slice(5);
        const cats=META[mk]?.cats||[];
        return D.cards.filter(c=>c.exploreKey&&cats.some(k=>c.exploreKey.startsWith(k+'-')));
      }
      if(qExploreCat.startsWith('ox_')){
        const k=qExploreCat.slice(3);
        return D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith('ox_'+k+'-'));
      }
      return D.cards.filter(c=>c.exploreKey&&c.exploreKey.startsWith(qExploreCat+'-')&&!c.exploreKey.startsWith('ox_'));
    }
    return D.cards.filter(c=>c.fromBank);
  }
  return D.cards;
}

let composedQueue=[];
let composedGenPending=false;
async function startSession(){
  // Composed-only mode
  if(trainMode==='composed'){
    qCards=[];qIdx=0;qScores=[];
    composedQueue=getComposedDue();
    if(composedQueue.length===0&&shouldGenerateComposed()){
      // Show loading state
      const qa=document.getElementById('qa');
      if(qa)qa.innerHTML='<div class="composed-loader"><div style="font-size:32px;margin-bottom:8px">&#129302;</div><div>Génération de ton Défi IA...</div><div class="composed-loader-dots"><span></span><span></span><span></span></div></div>';
      composedGenPending=true;
      await generateComposed();
      composedGenPending=false;
      composedQueue=getComposedDue();
    }
    if(composedQueue.length===0){
      const qa=document.getElementById('qa');
      if(qa)qa.innerHTML='<div class="empty"><div class="empty-icon">&#129302;</div>Aucun Défi IA disponible.<br><br>Valide plus de fiches en révision pour générer des défis !</div>';
      return;
    }
    rQCard();
    return;
  }
  // Normal revision mode
  const all=getQuizCards();
  if(!all.length){document.getElementById('qa').innerHTML='<div class="empty"><div class="empty-icon">&#128219;</div>Aucune fiche dans cette sélection.</div>';return;}
  const due=all.filter(c=>c.due<=now()).sort(()=>Math.random()-.5);
  const nd=all.filter(c=>c.due>now()).sort((a,b)=>a.score-b.score);
  qCards=[...due,...nd.slice(0,Math.max(3,10-due.length))];
  qIdx=0;qScores=[];
  composedQueue=getComposedDue();
  if(shouldGenerateComposed()&&!composedGenPending){
    composedGenPending=true;
    generateComposed().then(()=>{composedGenPending=false;composedQueue=getComposedDue();});
  }
  rQCard();
}
function enTxt(c){return c.dir==='fr-en'?c.b:c.a;}

function getCatBadge(card){
  // Oxford or Contexte explore card — show category icon
  if(card.exploreKey){
    if(card.exploreKey.startsWith('ox_')){
      const k=card.exploreKey.split('-')[0].slice(3);
      return{type:'icon',val:OXFORD[k]?.icon||''};
    }
    const k=card.exploreKey.split('-')[0];
    return{type:'icon',val:BANK[k]?.icon||''};
  }
  // Personal theme card — show theme name
  const deck=D.decks.find(d=>d.id===card.deckId);
  if(deck&&!deck.isExplore)return{type:'name',val:deck.name};
  return{type:'',val:''};
}
function rQCard(){
  const area=document.getElementById('qa');if(!area)return;
  if(trainMode==='composed'){
    if(composedQueue.length>0){const cp=composedQueue.shift();rComposedCard(area,cp);return;}
    // All composed done - show result
    const avg=qScores.length?(qScores.reduce((a,b)=>a+b,0)/qScores.length).toFixed(1):'0';
    const emoji=parseFloat(avg)>=4?'&#127942;':parseFloat(avg)>=3?'&#128170;':'&#129302;';
    area.innerHTML='<div class="result"><div class="result-emoji">'+emoji+'</div><div class="result-score">'+avg+'<span style="font-size:28px;font-weight:500">/5</span></div><div class="result-sub">'+qScores.length+' Défi'+(qScores.length!==1?'s':'')+' IA relevé'+(qScores.length!==1?'s':'')+'</div><button class="btn-primary" onclick="startSession()">Recommencer</button></div>';
    return;
  }
  if(qIdx>0&&qIdx%5===0&&composedQueue.length>0){
    const cp=composedQueue.shift();
    rComposedCard(area,cp);return;
  }
  if(qIdx>=qCards.length){
    if(composedQueue.length>0){const cp=composedQueue.shift();rComposedCard(area,cp);return;}
    const avg=qScores.length?(qScores.reduce((a,b)=>a+b,0)/qScores.length).toFixed(1):'—';
    const t=tod(),last=new Date(D.lastSession||0).toDateString(),yest=new Date(now()-86400000).toDateString();
    if(last!==t){D.streak=last===yest?(D.streak||0)+1:1;D.lastSession=now();sv();}
    checkDueNotif();
    const emoji=parseFloat(avg)>=4?'🏆':parseFloat(avg)>=3?'💪':'📖';
    area.innerHTML=`<div class="result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${avg}<span style="font-size:28px;font-weight:500">/5</span></div>
      <div class="result-sub">${qScores.length} fiche${qScores.length!==1?'s':''} révisée${qScores.length!==1?'s':''}</div>
      <button class="btn-primary" onclick="startSession()">Recommencer</button>
    </div>`;
    return;
  }
  const card=qCards[qIdx],pct=Math.round((qIdx/qCards.length)*100);
  const duc=qCards.filter(c=>c.due<=now()).length;
  const isEF=card.dir!=='fr-en',q=isEF?card.a:card.b;
  const safe=enTxt(card).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const tp=card.fromBank?'tc-explore':card.type==='mot'?'tc-mot':'tc-phrase';
  const tpLabel=card.fromBank?'Explore':card.type;
  const discBadge=card.isHard?`<div class="disc-badge" style="background:var(--redbg);color:var(--red)">🔁 Difficile</div>`:'';

  const catBadge=getCatBadge(card);
  const catBadgeHTML=catBadge.type==='icon'&&catBadge.val?`<span style="font-size:18px;opacity:.75">${catBadge.val}</span>`:catBadge.type==='name'&&catBadge.val?`<span style="font-size:10px;font-weight:700;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:99px">${catBadge.val}</span>`:'';
  area.innerHTML=`<div class="quiz-stats">
    <div class="qs"><div class="qs-n">${qIdx}</div><div class="qs-l">Vues</div></div>
    <div class="qs"><div class="qs-n">${qCards.length-qIdx}</div><div class="qs-l">Restantes</div></div>
    <div class="qs"><div class="qs-n" style="color:${duc>0?'var(--red)':'var(--green)'}">${duc}</div><div class="qs-l">Dues</div></div>
  </div>
  <div class="qprog"><div class="qprog-fill" style="width:${pct}%"></div></div>
  <div class="quiz-card">
    <div class="quiz-dir" style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <span>${isEF?'EN → FR':'FR → EN'} · <span class="type-chip ${tp}">${tpLabel}</span></span>
      <span style="display:flex;align-items:center;gap:5px">${discBadge}${catBadgeHTML}</span>
    </div>
    <div class="quiz-q">${q}</div>
    <button class="audio-btn" onclick="spk('${safe}')">🔊 Écouter</button>
    <div class="write-wrap">
      <input class="write-input" id="wa" type="text" placeholder="Écris ta réponse…" autocomplete="off" autocapitalize="sentences" spellcheck="true"/>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>

}

function rate(s){
  const card=qCards[qIdx],real=D.cards.find(c=>c.id===card.id);
  if(real){
    real.totalRatings=(real.totalRatings||0)+1;
    real.score=s;
    real.due=now()+getIV(s,real);
    if(s>=4)real.mult=Math.min((real.mult||1)*1.5,16);
    else if(s<=2)real.mult=1;
    if(s<=2)real.hardStreak=(real.hardStreak||0)+1;
    else real.hardStreak=0;
    real.isHard=(real.hardStreak||0)>=3;
  }
  qScores.push(s);D.reviewedToday=(D.reviewedToday||0)+1;D.totalReviewed=(D.totalReviewed||0)+1;
  sv();qIdx++;updateDot();rQCard();
}

// Mic
function toggleMic(){
  const btn=document.getElementById('mic-btn'),inp=document.getElementById('wa');
  if(!btn||!inp)return;
  if(recognition){recognition.stop();recognition=null;btn.textContent='🎤';btn.classList.remove('recording');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Reconnaissance vocale non disponible.');return;}
  recognition=new SR();
  recognition.lang=qCards[qIdx]?.dir==='fr-en'?'en-US':'fr-FR';
  recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{btn.textContent='⏹';btn.classList.add('recording');};
  recognition.onresult=e=>{let t='';for(let r of e.results)t+=r[0].transcript;inp.value=t;};
  recognition.onend=()=>{btn.textContent='🎤';btn.classList.remove('recording');recognition=null;};
  recognition.onerror=e=>{btn.textContent='🎤';btn.classList.remove('recording');recognition=null;};
  recognition.start();
}

// ─── EXPLORE ─────────────────────────────────────────────────
function getUnlocked(catKey){
  const cat=BANK[catKey];let u=1;
  for(let i=0;i<cat.cards.length-1;i++){
    const bk=catKey+'-'+i;
    if(D.bankAdded[bk]){const c=D.cards.find(x=>x.exploreKey===bk);if(c&&c.score>=4)u=i+2;else break;}
    else break;
  }
  return Math.min(u,cat.cards.length);
}
function getUnlockedOx(key){
  const cat=OXFORD[key];let u=1;
  for(let i=0;i<cat.cards.length-1;i++){
    const bk='ox_'+key+'-'+i;
    if(D.bankAdded[bk]){const c=D.cards.find(x=>x.exploreKey===bk);if(c&&c.score>=4)u=i+2;else break;}
    else break;
  }
  return Math.min(u,cat.cards.length);
}

function rExplore(){
  const el=document.getElementById('s-explore');
  if(bankCat){
    const isOx=OXFORD_KEYS.includes(bankCat);
    isOx?rOxCat(el,bankCat):rCtxCat(el,bankCat);
    return;
  }
  if(exploreMeta){rMeta(el,exploreMeta);return;}

  const addedCtx=CAT_KEYS.reduce((s,k)=>s+BANK[k].cards.filter((_,i)=>D.bankAdded[k+'-'+i]).length,0);
  const addedOx=OXFORD_KEYS.reduce((s,k)=>s+OXFORD[k].cards.filter((_,i)=>D.bankAdded['ox_'+k+'-'+i]).length,0);
  const totalOx=OXFORD_KEYS.reduce((s,k)=>s+OXFORD[k].cards.length,0);

  el.innerHTML=`<div class="explore-wrap">
    <div class="page-title">Explorer</div>
    <div class="exp-tabs">
      <button class="exp-tab ${exploreTab==='context'?'active':''}" onclick="exploreTab='context';rExplore()">📘 Contexte</button>

    </div>
    ${exploreTab==='context'?renderCtxTab(addedCtx):renderOxTab(addedOx,totalOx)}
  </div>`;
}

function renderCtxTab(added){
  const html=Object.keys(META).map(mk=>{
    const m=META[mk];
    const total=m.cats.reduce((s,k)=>s+(BANK[k]?BANK[k].cards.length:0),0);
    const a=m.cats.reduce((s,k)=>s+(BANK[k]?BANK[k].cards.filter((_,i)=>D.bankAdded[k+'-'+i]).length:0),0);
    const names=m.cats.filter(k=>BANK[k]).map(k=>BANK[k].label).join(', ');
    // Find next available across all cats in meta
    let nextCat=null,nextIdx=-1;
    for(const k of m.cats.filter(c=>BANK[c])){
      const u=getUnlocked(k);
      const i=BANK[k].cards.findIndex((_,j)=>!D.bankAdded[k+'-'+j]&&j<u);
      if(i>=0){nextCat=k;nextIdx=i;break;}
    }
    const hasNext=nextCat!==null;
    return`<div class="meta-card" onclick="exploreMeta='${mk}';rExplore()" style="flex-direction:column;align-items:flex-start;gap:0;padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;width:100%">

        <div class="meta-arrow">›</div>
      </div>
      ${hasNext?`<button class="cat-quick-add-ctx" onclick="event.stopPropagation();quickAddCtx('${nextCat}',${nextIdx})">+ Ajouter la prochaine fiche</button>`:a>=total?`<div style="padding:8px 16px 12px;font-size:11px;color:var(--green);font-weight:600">✓ Tout ajouté</div>`:''}
    </div>`;
  }).join('');
  return`<div class="meta-list">${html}</div><p style="font-size:12px;color:var(--text3);text-align:center;margin-top:12px">${added} / ${totalEntries} entrées ajoutées</p>`;
}

function rWords(){
  const el=document.getElementById('s-words');
  if(aDeck!==null){rDeckView(el,aDeck);return;}
  const ICONS=['📺','🗓️','📖','💼','🎵','🎬','📝','🌍','🎭','🏋️'];
  const html=D.decks.filter(d=>!d.isExplore).map((d,i)=>{
    const tot=D.cards.filter(c=>c.deckId===d.id).length;
    const due=D.cards.filter(c=>c.deckId===d.id&&c.due<=now()).length;
    const dl=d.dir==='en-fr'?'EN→FR':d.dir==='fr-en'?'FR→EN':'Les deux';
    return`<div class="theme-item" onclick="aDeck=${d.id};rWords()">
      <div class="theme-emoji">${ICONS[i%ICONS.length]}</div>
      <div class="theme-info"><div class="theme-name">${d.name}</div><div class="theme-meta">${tot} fiche${tot!==1?'s':''} · ${dl}</div></div>
      <div class="theme-right">${due>0?`<span class="due-chip">${due} dues</span>`:`<span class="ok-chip">À jour</span>`}</div>
    </div>`;
  }).join('');
  const form=newDeckForm?`<div class="form-box">
    <div class="form-title">Nouveau thème</div>
    <div class="form-row"><label>Nom</label><input type="text" id="dni" placeholder="ex. Peaky Blinders, Finance…"/></div>
    <div class="form-row"><label>Direction</label><select id="ddi"><option value="en-fr">Anglais → Français</option><option value="fr-en">Français → Anglais</option><option value="both">Les deux</option></select></div>
    <div class="form-row"><label>Type</label><select id="dti"><option value="phrase">Phrases</option><option value="mot">Vocabulaire</option><option value="mixed">Les deux</option></select></div>
    <div class="form-actions"><button class="btn btn-g" onclick="newDeckForm=false;rWords()">Annuler</button><button class="btn btn-p" onclick="mkDeck()">Créer</button></div>
  </div>`:'';
  el.innerHTML=`<div class="words-wrap">
    <div class="page-title">Mes thèmes</div>
    <div class="theme-list">
      ${html}
      <div class="add-theme-btn" onclick="newDeckForm=true;rWords()">+ Nouveau thème</div>
    </div>
    ${form}
    <div style="height:20px"></div>
  </div>`;
  if(newDeckForm)setTimeout(()=>document.getElementById('dni')?.focus(),80);
}
function mkDeck(){
  const name=document.getElementById('dni')?.value.trim();if(!name)return;
  D.decks.push({id:D.nextDeckId++,name,dir:document.getElementById('ddi').value,type:document.getElementById('dti').value});
  sv();newDeckForm=false;rWords();
}

function rDeckView(el,deckId){
  const deck=D.decks.find(d=>d.id===deckId);
  const all=D.cards.filter(c=>c.deckId===deckId);
  const filtered=ficheSearch?all.filter(c=>c.a.toLowerCase().includes(ficheSearch.toLowerCase())||c.b.toLowerCase().includes(ficheSearch.toLowerCase())):all;
  const personal=filtered.filter(c=>!c.fromBank);
  const explore=filtered.filter(c=>c.fromBank);
  const due=all.filter(c=>c.due<=now()).length;
  const mastered=all.filter(c=>c.score>=4).length;

  const dirOpts=!deck||deck.dir==='both'?'<option value="en-fr">EN→FR</option><option value="fr-en">FR→EN</option>':deck.dir==='en-fr'?'<option value="en-fr">EN→FR</option>':'<option value="fr-en">FR→EN</option>';
  const typeOpts=!deck||deck.type==='mixed'?'<option value="phrase">Phrase</option><option value="mot">Mot</option>':deck.type==='mot'?'<option value="mot">Mot</option>':'<option value="phrase">Phrase</option>';

  function cHTML(c){return`<div class="card-item">
    <div class="card-texts">
      <div class="card-a">${c.a}</div><div class="card-b">${c.b}</div>
      ${c.ctx?`<div class="card-ctx">${c.ctx}</div>`:''}
      <span class="type-chip ${c.fromBank?'tc-explore':c.type==='mot'?'tc-mot':'tc-phrase'}">${c.fromBank?'Explore':c.type}</span>
    </div>
    <div class="card-right"><div>${stars(c.score)}</div><div class="card-due">${fdue(c.due)}</div></div>
    <button class="del-btn" onclick="delCard(${c.id})">✕</button>
  </div>`;}

  el.innerHTML=`<div class="words-wrap">
    <button class="back-btn" onclick="aDeck=null;ficheSearch='';rWords()">← Mes thèmes</button>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">${deck?.name}</div>
    <div class="section-summary">
      <span class="sum-chip" style="background:var(--redbg);color:var(--red)">${due} à revoir</span>
      <span class="sum-chip" style="background:var(--greenbg);color:var(--green)">${mastered} maîtrisées</span>
      <span class="sum-chip" style="background:var(--bg3);color:var(--text3)">${all.length} total</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-box" type="text" placeholder="Rechercher…" value="${ficheSearch}" oninput="ficheSearch=this.value;rDeckView(document.getElementById('s-words'),${deckId})"/>
    </div>
    <div class="section-label">Mes fiches (${personal.length})</div>
    <div class="card-list">${personal.length?personal.map(cHTML).join(''):'<div style="font-size:13px;color:var(--text3);padding:8px 0">Aucune fiche personnelle.</div>'}</div>
    ${explore.length?`<div class="section-label">Explore (${explore.length})</div><div class="card-list">${explore.map(cHTML).join('')}</div>`:''}
    <div class="form-box">
      <div class="form-title">Ajouter une fiche</div>
      <div class="form-row"><label>Direction</label><select id="idir" onchange="uLbls()">${dirOpts}</select></div>
      <div class="form-row"><label id="la">Anglais</label>
        <div class="trans-row">
          <input type="text" id="ia" placeholder="ex. Overwhelming"/>
          <button class="trans-btn" onclick="autoTranslate()">🔄 Traduire</button>
        </div>
        <div id="trans-result" style="display:none" class="trans-result"></div>
      </div>
      <div class="form-row"><label id="lb">Français</label><input type="text" id="ib" placeholder="ex. Écrasant"/></div>
      <div class="form-row"><label>Contexte <span style="font-weight:400;text-transform:none">(optionnel)</span></label><textarea id="ictx" placeholder="ex. Used in formal emails."></textarea></div>
      <div class="form-row"><label>Type</label><select id="ityp">${typeOpts}</select></div>
      <div class="form-actions"><button class="btn btn-p" onclick="addCard(${deckId})">Ajouter</button></div>
    </div>
    <div style="height:20px"></div>
  </div>`;
  uLbls();
}

function uLbls(){
  const dir=document.getElementById('idir')?.value||'en-fr';
  const la=document.getElementById('la'),lb=document.getElementById('lb');
  const ia=document.getElementById('ia'),ib=document.getElementById('ib');
  if(dir==='en-fr'){if(la)la.textContent='Anglais';if(lb)lb.textContent='Français';if(ia)ia.placeholder='ex. Overwhelming';if(ib)ib.placeholder='ex. Écrasant';}
  else{if(la)la.textContent='Français';if(lb)lb.textContent='Anglais';if(ia)ia.placeholder='ex. Je rentre tard.';if(ib)ib.placeholder='ex. I\'m coming home late.';}
}

async function autoTranslate(){
  const inp=document.getElementById('ia');if(!inp?.value.trim())return;
  const dir=document.getElementById('idir')?.value||'en-fr';
  const langpair=dir==='fr-en'?'fr|en':'en|fr';
  const res=document.getElementById('trans-result');
  if(res){res.style.display='block';res.textContent='⏳ Traduction…';}
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inp.value.trim())}&langpair=${langpair}&de=myenglish@app.fr`);
    const d=await r.json();
    const t=d.responseData?.translatedText;
    if(t&&t!=='NO QUERY SPECIFIED'&&res){
      res.style.display='block';res.textContent='→ '+t;
      const ib=document.getElementById('ib');if(ib&&!ib.value)ib.value=t;
    } else if(res)res.style.display='none';
  }catch(e){if(res)res.style.display='none';}
}

function addCard(deckId){
  resetDaily();const mx=D.maxNew||15;
  if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte. Change-la dans Paramètres.');return;}
  const a=document.getElementById('ia')?.value.trim(),b=document.getElementById('ib')?.value.trim();
  const ctx=document.getElementById('ictx')?.value.trim()||'';
  const type=document.getElementById('ityp')?.value||'phrase';
  const dir=document.getElementById('idir')?.value||'en-fr';
  if(!a||!b)return;
  D.cards.push({id:D.nextCardId++,deckId,a,b,ctx,type,dir,score:0,mult:1,due:0});
  D.newToday++;sv();rDeckView(document.getElementById('s-words'),deckId);
}
function delCard(id){
  if(!confirm('Supprimer cette fiche ?'))return;
  D.cards=D.cards.filter(c=>c.id!==id);sv();
  rDeckView(document.getElementById('s-words'),aDeck);
}

function quickAddOx(key){
  resetDaily();const mx=D.maxNew||20;if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte.');return;}
  const cat=OXFORD[key];
  const u=getUnlockedOx(key);
  const idx=cat.cards.findIndex((_,i)=>!D.bankAdded['ox_'+key+'-'+i]&&i<u);
  if(idx<0)return;
  const c=cat.cards[idx],bk='ox_'+key+'-'+idx;
  D.cards.push({id:D.nextCardId++,deckId:EXPLORE_DECK_ID,a:c.en,b:c.fr,ctx:c.ctx||'',
    type:'mot',dir:'en-fr',score:0,mult:1,due:0,fromBank:true,exploreKey:bk});
  D.bankAdded[bk]=true;D.newToday++;sv();animatePlus();updateDot();
  rExplore();
}
function quickAddCtx(catKey,idx){
  resetDaily();const mx=D.maxNew||20;if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte.');return;}
  const c=BANK[catKey].cards[idx],bk=catKey+'-'+idx;if(D.bankAdded[bk])return;
  D.cards.push({id:D.nextCardId++,deckId:EXPLORE_DECK_ID,a:c.en,b:c.fr,ctx:c.ctx||'',
    type:c.en.split(' ').length<=3?'mot':'phrase',dir:'en-fr',score:0,mult:1,due:0,fromBank:true,exploreKey:bk});
  D.bankAdded[bk]=true;D.newToday++;sv();animatePlus();updateDot();
  rExplore();
}

// ─── QUICK CAPTURE ───────────────────────────────────────────
let qcDir='fr-en'; // default FR→EN

function openQC(){
  const overlay=document.getElementById('qc-overlay');
  overlay.style.display='block';
  overlay.innerHTML=`<div class="qc-sheet">
    <div class="qc-backdrop" onclick="closeQC()"></div>
    <div class="qc-panel">
      <div class="qc-handle"></div>
      <div class="qc-title">Capture rapide ⚡</div>
      <div class="qc-dir-row">
        <button class="qc-dir-btn ${qcDir==='fr-en'?'active':''}" onclick="setQcDir('fr-en')">FR → EN</button>
        <button class="qc-dir-btn ${qcDir==='en-fr'?'active':''}" onclick="setQcDir('en-fr')">EN → FR</button>
      </div>
      <input class="qc-field" id="qc-a" type="text"
        placeholder="${qcDir==='fr-en'?'Ta phrase en français…':'Your phrase in English…'}"
        autocapitalize="sentences" autocomplete="off"
        oninput="qcClearTrans()"
        onkeydown="if(event.key==='Enter')qcTranslate()"/>
      <div class="qc-trans-result" id="qc-tr"></div>
      <input class="qc-field" id="qc-b" type="text"
        placeholder="${qcDir==='fr-en'?'Traduction anglaise…':'Traduction française…'}"
        autocapitalize="sentences" autocomplete="off"/>
      <div class="qc-actions">
        <button class="qc-btn-cancel" onclick="closeQC()">Annuler</button>
        <button class="qc-btn-add" onclick="qcTranslate()">🔄 Traduire</button>
        <button class="qc-btn-add" onclick="qcSave()" style="background:var(--green)">✓ Ajouter</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('qc-a')?.focus(),100);
}

function closeQC(){
  const overlay=document.getElementById('qc-overlay');
  overlay.style.display='none';
  overlay.innerHTML='';
}

function setQcDir(dir){
  qcDir=dir;openQC();
}

function qcClearTrans(){
  const tr=document.getElementById('qc-tr');
  if(tr){tr.style.display='none';tr.textContent='';}
}

async function qcTranslate(){
  const a=document.getElementById('qc-a')?.value.trim();
  if(!a)return;
  const tr=document.getElementById('qc-tr');
  if(tr){tr.style.display='block';tr.textContent='⏳ Traduction…';}
  const langpair=qcDir==='fr-en'?'fr|en':'en|fr';
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(a)}&langpair=${langpair}&de=myenglish@app.fr`);
    const d=await r.json();
    const t=d.responseData?.translatedText;
    if(t&&t!=='NO QUERY SPECIFIED'){
      if(tr){tr.style.display='block';tr.textContent='→ '+t;}
      const b=document.getElementById('qc-b');
      if(b&&!b.value)b.value=t;
    } else if(tr)tr.style.display='none';
  }catch(e){if(tr)tr.style.display='none';}
}

function qcSave(){
  resetDaily();
  const mx=D.maxNew||20;
  if(D.newToday>=mx){alert('Limite de '+mx+' nouvelles fiches atteinte.');return;}
  const a=document.getElementById('qc-a')?.value.trim();
  const b=document.getElementById('qc-b')?.value.trim();
  if(!a||!b){alert('Remplis les deux champs.');return;}
  // Find or create "Capture" deck
  let deck=D.decks.find(d=>d.name==='Capture' && !d.isExplore);
  if(!deck){
    deck={id:D.nextDeckId++,name:'Capture',dir:'both',type:'mixed'};
    D.decks.push(deck);
  }
  D.cards.push({
    id:D.nextCardId++,
    deckId:deck.id,
    a:qcDir==='fr-en'?b:a,   // always store EN as 'a'
    b:qcDir==='fr-en'?a:b,   // always store FR as 'b'
    ctx:'',type:'phrase',
    dir:qcDir,
    score:0,mult:1,due:0,
    captured:true
  });
  D.newToday++;sv();
  animatePlus();updateDot();
  closeQC();
  // Refresh current tab
  if(curTab==='home')rHome();
}

// ─── INIT ─────────────────────────────────────────────────────
// Force clean init — fix display bug on reopen
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){resetDaily();updateDot();if(curTab==='home')rHome();}
});
resetDaily();updateDot();scheduleDaily();rHome();
</script>
